<style>
  /* ========================================================== */
  /* TaskWidgets — shared widget-kit atoms for LibraryView packs */
  /* Source patterns copied from ManagerDashboardView_v2 +       */
  /* AdminCampaignsView per jlmops/CLAUDE.md UI conventions.     */
  /* ========================================================== */

  /* Status pill */
  .tw-status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
    background: #e9ecef;
    color: #495057;
  }
  .tw-status-pill.new { background: #e3f2fd; color: #1565c0; }
  .tw-status-pill.assigned { background: #fff3cd; color: #856404; }
  .tw-status-pill.in-progress { background: #d1ecf1; color: #0c5460; }
  .tw-status-pill.review { background: #f8d7da; color: #721c24; }
  .tw-status-pill.done { background: #d4edda; color: #155724; }

  /* Priority badge */
  .tw-priority-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }
  .tw-priority-badge.critical { background: #dc3545; color: #fff; }
  .tw-priority-badge.high { background: #fd7e14; color: #fff; }
  .tw-priority-badge.normal { background: transparent; color: #6c757d; }
  .tw-priority-badge.low { background: transparent; color: #adb5bd; }

  /* Due chip */
  .tw-due-chip {
    display: inline-block;
    font-size: 12px;
    color: #495057;
  }
  .tw-due-chip.overdue { color: #dc3545; font-weight: 600; }
  .tw-due-chip.soon { color: #856404; }

  /* Topic / entity-type chip (filter + inline display) */
  .tw-chip {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: #f1f3f5;
    color: #495057;
    border: 1px solid #dee2e6;
  }
  .tw-chip.active { background: #495057; color: #fff; border-color: #495057; }

  /* File-link chip — shows attached Drive Doc / WP / external URL on a task pack */
  .tw-file-link {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(74,122,62,0.08);
    color: #4a7a3e;
    border: 1px solid rgba(74,122,62,0.25);
    text-decoration: none;
    line-height: 1.5;
  }
  .tw-file-link:hover { text-decoration: underline; color: #0a58ca; background: #d9e9ff; }
  .tw-file-link.empty { background: #f8f9fa; color: #6c757d; border-color: #dee2e6; font-style: italic; }

  /* Filter bar */
  .tw-filter-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .tw-filter-bar select, .tw-filter-bar input {
    font-size: 12px;
    height: 28px;
    border: 1px solid #ced4da;
    border-radius: 4px;
    padding: 0 8px;
  }
  /* Native dropdown arrow needs room — increase right padding on selects only */
  .tw-filter-bar select { padding-right: 24px; }

  /* Notes textarea */
  .tw-notes {
    width: 100%;
    min-height: 80px;
    border: 1px solid #ced4da;
    border-radius: 4px;
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
  }

  /* Toast (success / failure feedback) */
  .tw-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 16px;
    border-radius: 4px;
    background: #495057;
    color: #fff;
    font-size: 13px;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .tw-toast.show { opacity: 1; }
  .tw-toast.error { background: #dc3545; }
  .tw-toast.warning { background: #ffc107; color: #212529; }
  .tw-toast.info { background: #0d6efd; }
  /* success keeps the neutral base background */

  /* Confirm dialog (in-page — replaces native confirm(); NOTIFICATION_UX_PLAN) */
  .tw-confirm-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 1100;
  }
  .tw-confirm-box {
    background: #fff; border-radius: 6px; padding: 20px;
    max-width: 360px; width: calc(100% - 40px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .tw-confirm-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
  .tw-confirm-msg { font-size: 14px; color: #333; margin-bottom: 16px; line-height: 1.4; }
  .tw-confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .tw-confirm-actions .btn { min-width: 84px; }
  .tw-confirm-danger { background: #dc3545; color: #fff; }
  @media (max-width: 768px) {
    .tw-confirm-actions .btn { min-height: 44px; }
  }

  /* Inline validation message */
  .tw-inline-error {
    color: #dc3545;
    font-size: 12px;
    margin-top: 4px;
  }

  /* Mobile overrides */
  @media (max-width: 768px) {
    .tw-filter-bar select, .tw-filter-bar input {
      font-size: 16px;
      height: 40px;
      flex: 1 1 100%;
    }
    .tw-notes { font-size: 16px; min-height: 100px; }
  }
</style>

<script>
  // ============================================================== //
  // TaskWidgets — shared UI helpers (included by most views).       //
  // NOTIFICATION STANDARD (see plans/NOTIFICATION_UX_PLAN.md):       //
  //   • Never use native alert()/confirm() — the iframe adds an ugly //
  //     un-styleable browser header. Use the helpers below.          //
  //   • Messages: action-first, ONE short line, no long titles,      //
  //     no "Are you sure you want to…", no \n\n walls.               //
  //   • TaskWidgets.toast(msg, 'success'|'error'|'warning'|'info')   //
  //   • TaskWidgets.confirm(msg, onConfirm, {title,okLabel,danger})  //
  // ============================================================== //
  window.TaskWidgets = window.TaskWidgets || {};

  // Toast — transient feedback. type: 'success'|'error'|'warning'|'info'
  // (default 'success'). Back-compat: legacy boolean isError (true) → 'error'.
  TaskWidgets.toast = function(message, type) {
    if (type === true) type = 'error';
    else if (type === false || type == null) type = 'success';
    if (['success', 'error', 'warning', 'info'].indexOf(type) === -1) type = 'success';
    var t = document.getElementById('tw-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'tw-toast';
      t.className = 'tw-toast';
      document.body.appendChild(t);
    }
    t.textContent = message;
    t.className = 'tw-toast show ' + type;
    setTimeout(function() { t.className = 'tw-toast'; }, 3000);
  };

  // Confirm — in-page replacement for native confirm() (no iframe header).
  // Cancel is default-focused and Esc/backdrop cancel, so a reflex Enter/tap
  // can't blow through a destructive action. opts: { title, okLabel, danger }.
  TaskWidgets.confirm = function(message, onConfirm, opts) {
    opts = opts || {};
    var overlay = document.getElementById('tw-confirm-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'tw-confirm-overlay';
      overlay.className = 'tw-confirm-overlay';
      overlay.innerHTML =
        '<div class="tw-confirm-box">' +
          '<div class="tw-confirm-title" id="tw-confirm-title"></div>' +
          '<div class="tw-confirm-msg" id="tw-confirm-msg"></div>' +
          '<div class="tw-confirm-actions">' +
            '<button type="button" class="btn" id="tw-confirm-cancel">Cancel</button>' +
            '<button type="button" class="btn" id="tw-confirm-ok">Confirm</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
    }
    var titleEl = overlay.querySelector('#tw-confirm-title');
    var msgEl = overlay.querySelector('#tw-confirm-msg');
    var okBtn = overlay.querySelector('#tw-confirm-ok');
    var cancelBtn = overlay.querySelector('#tw-confirm-cancel');

    if (opts.title) { titleEl.textContent = opts.title; titleEl.style.display = 'block'; }
    else { titleEl.style.display = 'none'; }
    msgEl.textContent = message;
    okBtn.textContent = opts.okLabel || 'Confirm';
    okBtn.className = 'btn' + (opts.danger ? ' tw-confirm-danger' : '');

    function close() {
      overlay.style.display = 'none';
      okBtn.onclick = null; cancelBtn.onclick = null; overlay.onclick = null;
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    okBtn.onclick = function() { close(); if (typeof onConfirm === 'function') onConfirm(); };
    cancelBtn.onclick = close;
    overlay.onclick = function(e) { if (e.target === overlay) close(); };
    document.addEventListener('keydown', onKey);
    overlay.style.display = 'flex';
    cancelBtn.focus();
  };

  TaskWidgets.statusClass = function(status) {
    if (!status) return '';
    return String(status).toLowerCase().replace(/\s+/g, '-');
  };

  // Task-derived three-tier status (CALENDAR_LIBRARY_LOOP_PLAN Phase 5) — replaces
  // slb_State everywhere (Library rows, entity drawer, Calendar rows). Computed
  // live from task status, never persisted: "not started" (open tasks exist, all
  // still New), "in progress" (an open task is Assigned/Review), "done" (every
  // task Done/Cancelled, or no tasks at all — vacuously done). Feed statusClass()
  // the result for a pill CSS class ("in progress" -> .in-progress, etc). Takes
  // a task array already scoped to the entity/entities in question — callers
  // filter by entityId themselves (some already have a pre-scoped list, e.g.
  // the drawer's attached_tasks; others filter a flat state.tasks by slug).
  TaskWidgets.deriveStatus = function(tasksForEntity) {
    var open = (tasksForEntity || []).filter(function(t) {
      return t.status !== 'Done' && t.status !== 'Cancelled';
    });
    if (!open.length) return 'done';
    var active = open.some(function(t) { return t.status === 'Assigned' || t.status === 'Review'; });
    return active ? 'in progress' : 'not started';
  };

  TaskWidgets.priorityClass = function(priority) {
    if (!priority) return 'normal';
    return String(priority).toLowerCase();
  };

  // Overdue = the due DATE is strictly before today (date-only). A task due TODAY is on-time until
  // the day ends; comparing the due date's midnight against the current moment (the old behaviour)
  // wrongly flagged due-today tasks overdue all day (fixed 2026-06-08). Excludes terminal statuses.
  TaskWidgets.isOverdue = function(dueDate, status) {
    if (!dueDate || status === 'Done' || status === 'Cancelled' || status === 'Closed') return false;
    var d = new Date(dueDate);
    if (isNaN(d.getTime())) return false;
    var today = new Date(); today.setHours(0, 0, 0, 0);
    d.setHours(0, 0, 0, 0);
    return d < today;
  };

  TaskWidgets.dueClass = function(dueDateIso, status) {
    if (!dueDateIso || status === 'Done' || status === 'Cancelled') return '';
    var d = new Date(dueDateIso);
    if (isNaN(d.getTime())) return '';
    if (TaskWidgets.isOverdue(dueDateIso, status)) return 'overdue';
    // 'soon' = due within the next ~3 days (date-based; today counts as soon, not overdue)
    var today = new Date(); today.setHours(0, 0, 0, 0);
    d.setHours(0, 0, 0, 0);
    var diffDays = (d - today) / (1000 * 60 * 60 * 24);
    if (diffDays >= 0 && diffDays < 3) return 'soon';
    return '';
  };

  TaskWidgets.formatDate = function(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return String(iso);
    return d.toISOString().slice(0, 10);
  };

  TaskWidgets.formatDateShort = function(iso) {
    if (!iso) return '-';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return String(iso);
    return d.getDate() + '/' + (d.getMonth() + 1);
  };

  TaskWidgets.formatDateFull = function(iso) {
    if (!iso) return '-';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return String(iso);
    return d.toLocaleDateString('en-GB');
  };

  TaskWidgets.escape = function(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, function(c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  };

  // ========================================================== //
  // ModalOverlay (CCP-UI-8) — shared controller for the project's //
  // modal-overlay pattern. Adds the focus management Bootstrap     //
  // modals gave for free but plain modal-overlays lack:            //
  //   - focus first interactive element on open, restore to the    //
  //     trigger element on close                                   //
  //   - Esc closes the topmost modal                               //
  //   - Tab/Shift+Tab trapped within the topmost modal             //
  //   - body scroll-lock while any modal is open                   //
  //   - z-index stacking for nested modals                         //
  // Usage: ModalOverlay.open('my-modal') / ModalOverlay.close('my-modal'). //
  // The element keeps the existing markup (.modal-overlay with     //
  // display:none); this just toggles display + manages focus.      //
  // ========================================================== //
  window.ModalOverlay = (function() {
    var stack = [];            // ids of open modals, bottom -> top
    var BASE_Z = 1050;
    var keydownBound = false;
    var FOCUSABLE = 'button, [href], input:not([type=hidden]):not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';

    function visibleFocusables(el) {
      return Array.prototype.filter.call(el.querySelectorAll(FOCUSABLE), function(n) {
        return n.offsetParent !== null;  // skip hidden elements
      });
    }

    function onKeydown(e) {
      if (!stack.length) return;
      var el = document.getElementById(stack[stack.length - 1]);
      if (!el) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        ModalOverlay.close(el.id);
        return;
      }
      if (e.key === 'Tab') {
        var list = visibleFocusables(el);
        if (!list.length) return;
        var first = list[0], last = list[list.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      }
    }

    return {
      open: function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        if (stack.indexOf(id) === -1) {
          el._twTrigger = document.activeElement;  // remember trigger to restore on close
          stack.push(id);
        }
        el.style.zIndex = BASE_Z + (stack.indexOf(id) * 10);
        el.style.display = 'flex';
        el.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';   // scroll-lock
        if (!keydownBound) {
          document.addEventListener('keydown', onKeydown);
          keydownBound = true;
        }
        var f = visibleFocusables(el)[0];
        if (f) f.focus();
      },
      close: function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.style.display = 'none';
        el.setAttribute('aria-hidden', 'true');
        var i = stack.indexOf(id);
        if (i !== -1) stack.splice(i, 1);
        if (!stack.length) {
          document.body.style.overflow = '';        // release scroll-lock
          if (keydownBound) {
            document.removeEventListener('keydown', onKeydown);
            keydownBound = false;
          }
        }
        var t = el._twTrigger;                        // restore focus to trigger
        if (t && typeof t.focus === 'function') t.focus();
        el._twTrigger = null;
      }
    };
  })();
</script>
