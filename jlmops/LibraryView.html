<style>
  /* LibraryView — layout */
  .lv-container { padding: 0 10px; }

  .lv-panel { display: none; }
  .lv-panel.active { display: block; }

  /* Library list */
  .lv-library-presets {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .lv-library-table-wrap {
    border: 1px solid #dee2e6;
    border-radius: 4px;
    max-height: calc(100vh - 280px);
    overflow-y: auto;
  }
  .lv-library-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .lv-library-table th, .lv-library-table td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid #f1f3f5;
  }
  .lv-library-table thead th {
    background: #f8f9fa;
    font-weight: 600;
    font-size: 12px;
    color: #495057;
    position: sticky;
    top: 0;
  }
  .lv-library-table tr:hover td { background: #f8f9fa; }

  .lv-empty { padding: 24px; text-align: center; color: #6c757d; font-style: italic; }

  /* Mobile */
  @media (max-width: 768px) {
    /* Drawer header: single column on phone so the 8-10 label/value pairs get full width */
    .lv-drawer-header { grid-template-columns: 1fr; gap: 8px; }

    /* Library list on mobile: compact, flat, one clear divider. Scoped to
       LibraryView so Orders/Products responsive-stack cards are unaffected. */
    .lv-library-table.responsive-stack tr {
      border: none;
      border-bottom: 1px solid #ced4da;
      border-radius: 0;
      margin-bottom: 0;
      padding: 8px 4px;
      background: transparent;
    }
    .lv-library-table.responsive-stack td { padding: 1px 0; }
  }

  /* Entity detail drawer (phase 9a) — centered modal-overlay
     (corrected from right-side slide-in 2026-05-27 after smoke feedback;
     matches the rest of the view's modal precedent.) */
  .lv-drawer-panel {
    background: #fff;
    width: 560px;
    max-width: 95vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .lv-drawer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #dee2e6;
    background: #f8f9fa;
  }
  .lv-drawer-toolbar h6 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lv-drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .lv-drawer-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e9ecef;
  }
  .lv-drawer-header label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #6c757d;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .lv-drawer-header .field-value { font-size: 13px; color: #212529; }
  .lv-drawer-header .field-value.mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; }
  .lv-drawer-section {
    padding: 10px 0;
    border-bottom: 1px solid #f1f3f5;
    font-size: 12px;
  }
  .lv-drawer-section h6 {
    margin: 0 0 6px 0;
    font-size: 13px;
    font-weight: 600;
    color: #495057;
  }
  .lv-drawer-section .placeholder { color: #adb5bd; font-style: italic; }

  /* Clickable entity title in the library list */
  .lv-entity-title-link {
    color: #4a7a3e;
    cursor: pointer;
    text-decoration: none;
  }
  .lv-entity-title-link:hover { text-decoration: underline; }

  /* Drawer action button row (phase 9d) — sits below entity header */
  .lv-drawer-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e9ecef;
  }
  .lv-drawer-actions:empty { display: none; }

  /* Drawer attached-task row + activity row */
  .lv-drawer-task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid #f8f9fa;
    font-size: 12px;
  }
  .lv-drawer-task-row:last-child { border-bottom: none; }
  .lv-drawer-task-title { flex: 1; color: #212529; }
</style>

<div class="lv-container">

  <!-- LIBRARY (catalog only). The task-list lens lives in AdminTasksView (admin)
       and the dashboard queue (manager) — the convergence end-state surface map. -->
  <div class="lv-panel active" id="lv-panel-library">
    <div class="lv-library-toolbar mb-2" data-roles="admin">
      <button class="btn btn-sm" id="lv-btn-open-content-stream">Create Content Tasks</button>
    </div>
    <div class="lv-library-presets">
      <button class="tw-chip active" data-preset="all" onclick="LibraryView.switchPreset('all')">Library</button>
      <button class="tw-chip" data-preset="deficiency" onclick="LibraryView.switchPreset('deficiency')" title="Pieces due soon or overdue — the demand view">Deficiency</button>
      <button class="tw-chip" data-preset="blog" onclick="LibraryView.switchPreset('blog')">Blog</button>
      <button class="tw-chip" data-preset="campaigns" onclick="LibraryView.switchPreset('campaigns')">Campaigns</button>
      <button class="tw-chip" data-preset="template" onclick="LibraryView.switchPreset('template')">Templates</button>
      <button class="tw-chip" data-preset="image" onclick="LibraryView.switchPreset('image')">Images</button>
    </div>
    <div class="tw-filter-bar">
      <input type="search" id="lv-search-library" placeholder="Search title / slug..." />
      <select id="lv-sort-library">
        <option value="last_touched">Sort: last touched</option>
        <option value="created">Sort: created</option>
        <option value="title">Sort: title</option>
      </select>
    </div>
    <div class="lv-library-table-wrap" id="lv-library-table-wrap">
      <div class="lv-empty">Loading…</div>
    </div>
  </div>

</div>

<!-- Entity detail drawer — right-side slide-in panel. Header fields + action
     buttons (Open Doc, Attach new version, Create Content Tasks, etc.) + one
     content section, Attached tasks (CALENDAR_LIBRARY_LOOP_PLAN Phase 5 —
     Family/Files & URLs/References/State history/Activity log all dropped,
     "tasks tell the action story, library holds entities, calendar is king"). -->
<div class="modal-overlay" id="lvEntityDrawer" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1050;justify-content:center;align-items:center;">
  <div class="lv-drawer-panel">
    <div class="lv-drawer-toolbar">
      <button type="button" class="btn btn-sm btn-light" id="lv-drawer-back" style="display:none;margin-right:8px" onclick="LibraryView.backEntityDrawer()" title="Back to previous entity">← Back</button>
      <h6 id="lv-drawer-title">Entity</h6>
      <button type="button" class="btn btn-sm btn-light" onclick="LibraryView.closeEntityDrawer()">Close</button>
    </div>
    <div class="lv-drawer-body">
      <div class="lv-drawer-header">
        <div><label>Slug</label><div class="field-value mono" id="lv-drawer-slug">—</div></div>
        <div><label>Type</label><div class="field-value" id="lv-drawer-type">—</div></div>
        <div><label>Language</label><div class="field-value" id="lv-drawer-language">—</div></div>
        <div><label>Status</label><div class="field-value" id="lv-drawer-state">—</div></div>
        <div><label>Last touched</label><div class="field-value" id="lv-drawer-lasttouched">—</div></div>
      </div>
      <div class="lv-drawer-actions" id="lv-drawer-actions"></div>
      <div class="lv-drawer-section"><h6>Attached tasks</h6><div id="lv-drawer-attached-tasks"><span class="placeholder">—</span></div></div>
    </div>
  </div>
</div>

<!-- Attach new version modal (drawer-scoped) — replaces the entity's current
     Doc with a new Drive file, reached directly from the library card with one
     click (no task required). Placed AFTER the entity drawer in the DOM: both
     are raw-toggled .modal-overlay elements at the same static z-index, and the
     entity drawer isn't run through ModalOverlay's stack (it's shown via a
     direct style.display flip), so paint order — not z-index — decides which
     one is on top. Keep this block below the drawer's closing tag. -->
<div class="modal-overlay" id="lvDrawerAttachModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1050;justify-content:center;align-items:center;">
  <div style="background:white;border-radius:4px;max-width:520px;width:90%;">
    <div style="padding:15px;border-bottom:1px solid #dee2e6;">
      <h6 class="mb-0">Attach new version</h6>
    </div>
    <div style="padding:15px;">
      <p class="mb-2 small">Paste the Drive URL of the new Doc for <strong id="lv-drawer-attach-slug"></strong>. The current Doc is archived and superseded.</p>
      <input type="url" class="form-control form-control-sm" id="lv-drawer-attach-url" placeholder="https://docs.google.com/document/d/..." />
    </div>
    <div style="padding:10px 15px;border-top:1px solid #dee2e6;background:#f8f9fa;display:flex;justify-content:space-between;">
      <button type="button" class="btn btn-sm btn-light" onclick="ModalOverlay.close('lvDrawerAttachModal')">Cancel</button>
      <button type="button" class="btn btn-sm btn-light" id="lv-btn-drawer-attach-submit">Attach</button>
    </div>
  </div>
</div>

<script>
  window.LibraryView = (function() {
    'use strict';

    var state = {
      tasks: [],
      library: [],
      activePreset: 'all',
      // Drawer back-stack (phase 9c): slugs of entities visited before the
      // current one in this open session. Fresh opens clear it; navigateToEntity
      // pushes the current slug before loading the new one; back pops.
      entityStack: [],
      currentEntitySlug: null,
      // Phase 9d: full entity object from last drawer render, used by action handlers.
      currentEntity: null
    };

    function init() {
      TaskDetail.configure({
        getTask:      function(id)   { return (state.tasks || []).find(function(t) { return t.id === id; }) || null; },
        getEntity:    function(slug) { return (state.library || []).find(function(e) { return e.slug === slug; }) || null; },
        getAssignees: function() {
          var seen = {};
          return (state.tasks || []).reduce(function(a, t) {
            if (t.assignedTo && !seen[t.assignedTo]) { seen[t.assignedTo] = true; a.push(t.assignedTo); }
            return a;
          }, []).sort();
        },
        loadEntityDetail: function(slug, cb) {
          var entity = (state.library || []).find(function(e) { return e.slug === slug; });
          cb(entity || null);
        },
        saveTask: function(id, fields, cb) {
          var task = (state.tasks || []).find(function(t) { return t.id === id; });
          var taskType = task ? (task.typeId || '') : '';
          var isContent = taskType.indexOf('task.content') === 0 || taskType === 'task.newsletter.distribute';
          var allowsDateEdit = isContent ||
            taskType === 'task.deficiency.category_stock' ||
            taskType === 'task.deficiency.bundle_stock';
          if (allowsDateEdit || isContent) {
            var updates = { status: fields.status, assignedTo: fields.assignedTo || null,
              startDate: fields.startDate || null, dueDate: fields.dueDate || null, notes: fields.notes };
            if (isContent) { updates.linkedEntityId = fields.linkedEntityId; updates.title = fields.title; }
            google.script.run
              .withSuccessHandler(function(r) { cb(r); })
              .withFailureHandler(function(e) { cb({ error: e.message || 'Failed to save' }); })
              .WebAppTasks_updateTask(id, updates);
          } else {
            google.script.run
              .withSuccessHandler(function(r) { cb(r); })
              .withFailureHandler(function(e) { cb({ error: e.message || 'Failed to save' }); })
              .WebAppTasks_updateTaskStatus(id, fields.status);
          }
        },
        completeTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(ok) { cb(ok); })
            .withFailureHandler(function()    { cb(false); })
            .WebAppTasks_completeTaskById(id);
        },
        deleteTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(r) { cb(r); })
            .withFailureHandler(function(e) { cb({ error: e.message || 'Failed' }); })
            .WebAppTasks_deleteTask(id);
        },
        revertTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(ok) { cb(ok); })
            .withFailureHandler(function() { cb(false); })
            .WebAppDashboardV2_revertTaskToAdmin(id);
        },
        close:   function() {},
        refresh: renderLibrary,
        reload:  load
      });
      ContentStreamModal.configure({ reload: load });
      load();
      ['lv-search-library', 'lv-sort-library'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', renderLibrary);
      });
      var openBtn = document.getElementById('lv-btn-open-content-stream');
      if (openBtn) openBtn.addEventListener('click', function() { ContentStreamModal.open(); });
      var drawerAttachSubmitBtn = document.getElementById('lv-btn-drawer-attach-submit');
      if (drawerAttachSubmitBtn) drawerAttachSubmitBtn.addEventListener('click', submitDrawerAttachDoc);

      // Escape closes the entity drawer when open (phase 9a).
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' || e.keyCode === 27) {
          var drawer = document.getElementById('lvEntityDrawer');
          if (drawer && drawer.style.display === 'flex') {
            closeEntityDrawer();
          }
        }
      });
    }

    function load() {
      google.script.run
        .withSuccessHandler(onLoaded)
        .withFailureHandler(onError)
        .WebAppLibrary_getData();
    }

    function onLoaded(res) {
      if (!res || !res.success) {
        TaskWidgets.toast(res && res.error ? res.error : 'Failed to load LibraryView', true);
        document.getElementById('lv-library-table-wrap').innerHTML =
          '<div class="lv-empty">' + TaskWidgets.escape(res && res.error ? res.error : 'Load failed') + '</div>';
        return;
      }
      // state.tasks is still loaded — Deficiency and the Status column both
      // derive their status from it (entityStatus()). The task LIST UI moved out.
      state.tasks = res.data.tasks || [];
      state.library = res.data.library || [];
      state.deficiencyWindowDays = res.data.deficiencyWindowDays || 56;
      renderLibrary();
    }

    function onError(err) {
      TaskWidgets.toast(err && err.message ? err.message : 'Network error', true);
    }

    // Task-derived status for one entity (CALENDAR_LIBRARY_LOOP_PLAN Phase 5) —
    // 'abandoned' stays a distinct, reliably-set flag; everything else is
    // computed live from state.tasks, never read from slb_State.
    function entityStatus(e) {
      if (!e) return 'done';
      if (e.state === 'abandoned') return 'abandoned';
      var tasksForEntity = (state.tasks || []).filter(function(t) { return t.entityId === e.slug; });
      return TaskWidgets.deriveStatus(tasksForEntity);
    }

    function switchPreset(preset) {
      state.activePreset = preset;
      document.querySelectorAll('.lv-library-presets .tw-chip').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-preset') === preset);
      });
      renderLibrary();
    }

    function renderLibrary() {
      var preset = state.activePreset;
      var searchTerm = (document.getElementById('lv-search-library').value || '').toLowerCase();
      var sortBy = document.getElementById('lv-sort-library').value;

      if (preset === 'deficiency') { renderDeficiency(searchTerm); return; }

      var rows = state.library.filter(function(e) {
        if (preset === 'campaigns') {
          if (['email', 'news', 'mention', 'social'].indexOf(e.contentType) === -1) return false;
        } else if (preset !== 'all' && e.contentType !== preset) {
          return false;
        }
        if (searchTerm) {
          var hay = (String(e.title || '') + ' ' + String(e.slug || '')).toLowerCase();
          if (hay.indexOf(searchTerm) === -1) return false;
        }
        return true;
      });

      rows.sort(function(a, b) {
        if (sortBy === 'created') return (b.createdDate || '').localeCompare(a.createdDate || '');
        if (sortBy === 'title') return (a.title || '').localeCompare(b.title || '');
        return (b.lastTouched || '').localeCompare(a.lastTouched || '');
      });

      var container = document.getElementById('lv-library-table-wrap');
      if (rows.length === 0) {
        container.innerHTML = '<div class="lv-empty">No entities match the current preset / search.</div>';
        return;
      }

      // Columns: generic + sparse per-type extension
      var html = '<table class="lv-library-table responsive-stack"><thead><tr>';
      html += '<th>Title</th><th>Type</th><th>Slug</th><th>Lang</th><th>Status</th><th>Last touched</th><th>Refs</th>';
      html += '</tr></thead><tbody>';
      rows.forEach(function(e) {
        var rowStatus = entityStatus(e);
        html += '<tr>';
        html += '<td data-label="Title"><a class="lv-entity-title-link" onclick="LibraryView.openEntityDrawer(\'' + TaskWidgets.escape(e.slug) + '\')"><strong>' + TaskWidgets.escape(e.title || e.slug) + '</strong></a>' + (e.docUrl ? ' <a class="tw-file-link" href="' + TaskWidgets.escape(e.docUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open Doc" style="margin-left:6px">&#8599; Doc</a>' : '') + '</td>';
        html += '<td data-label="Type">' + TaskWidgets.escape(e.contentType || '—') + '</td>';
        html += '<td data-label="Slug"><span style="font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;color:#6c757d;">' + TaskWidgets.escape(e.slug) + '</span></td>';
        html += '<td data-label="Lang">' + TaskWidgets.escape(e.language || '—') + '</td>';
        html += '<td data-label="Status"><span class="tw-status-pill ' + TaskWidgets.statusClass(rowStatus) + '">' + TaskWidgets.escape(rowStatus) + '</span></td>';
        html += '<td data-label="Last touched">' + (e.lastTouched ? TaskWidgets.formatDate(e.lastTouched) : '—') + '</td>';
        html += '<td data-label="Refs">' + (e.references && e.references.length ? e.references.length : 0) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Deficiency preset (CONTENT_WORKFLOW_REDESIGN Decision 1 / Step 3): the demand
    // view. Entities with a target date inside the rolling window, plus any overdue
    // not-yet-published piece, sorted by target date. A piece in the window with no
    // open task is the stall signal.
    function renderDeficiency(searchTerm) {
      var now = new Date();
      var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var windowDays = state.deficiencyWindowDays || 56;
      var horizon = new Date(startOfToday.getTime() + windowDays * 86400000);

      var rows = state.library.filter(function(e) {
        if (!e.targetDate) return false;
        var td = new Date(e.targetDate);
        if (isNaN(td.getTime())) return false;
        var overdue = td < startOfToday && entityStatus(e) !== 'done';
        var inWindow = td >= startOfToday && td <= horizon;
        if (!(overdue || inWindow)) return false;
        if (searchTerm) {
          var hay = (String(e.title || '') + ' ' + String(e.slug || '')).toLowerCase();
          if (hay.indexOf(searchTerm) === -1) return false;
        }
        return true;
      });

      rows.sort(function(a, b) { return (a.targetDate || '').localeCompare(b.targetDate || ''); });

      var container = document.getElementById('lv-library-table-wrap');
      if (rows.length === 0) {
        container.innerHTML = '<div class="lv-empty">No pieces due within ' + windowDays + ' days. Pipeline is clear.</div>';
        return;
      }

      var html = '<table class="lv-library-table responsive-stack"><thead><tr>';
      html += '<th>Target</th><th>Title</th><th>Type</th><th>Lang</th><th>Status</th><th>Tasks</th><th></th>';
      html += '</tr></thead><tbody>';
      rows.forEach(function(e) {
        var td = new Date(e.targetDate);
        var rowStatus = entityStatus(e);
        var overdue = td < startOfToday && rowStatus !== 'done';
        var openCount = (state.tasks || []).filter(function(t) {
          return t.entityId === e.slug && t.status !== 'Done' && t.status !== 'Cancelled';
        }).length;
        var taskCell = openCount > 0 ? (openCount + ' open') : '0 open';
        html += '<tr' + (overdue ? ' style="background:#fff3cd;"' : '') + '>';
        html += '<td data-label="Target">' + TaskWidgets.formatDate(e.targetDate) + (overdue ? ' <strong>(overdue)</strong>' : '') + '</td>';
        html += '<td data-label="Title"><a class="lv-entity-title-link" onclick="LibraryView.openEntityDrawer(\'' + TaskWidgets.escape(e.slug) + '\')"><strong>' + TaskWidgets.escape(e.title || e.slug) + '</strong></a>' + (e.docUrl ? ' <a class="tw-file-link" href="' + TaskWidgets.escape(e.docUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open Doc" style="margin-left:6px">&#8599; Doc</a>' : '') + '<div class="detail-meta">' + TaskWidgets.escape(e.slug) + '</div></td>';
        html += '<td data-label="Type">' + TaskWidgets.escape(e.contentType || '—') + '</td>';
        html += '<td data-label="Lang">' + TaskWidgets.escape(e.language || '—') + '</td>';
        html += '<td data-label="Status"><span class="tw-status-pill ' + TaskWidgets.statusClass(rowStatus) + '">' + TaskWidgets.escape(rowStatus) + '</span></td>';
        html += '<td data-label="Tasks">' + taskCell + '</td>';
        html += '<td data-label=""><button class="btn btn-sm btn-light" data-roles="admin" onclick="LibraryView.spawnForEntity(\'' + TaskWidgets.escape(e.slug) + '\')" title="Create content tasks for this piece">Spawn</button></td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Deficiency-row "Spawn" → open the shared content-stream modal pre-filled from the entity.
    function spawnForEntity(slug) {
      var e = (state.library || []).find(function(x) { return x.slug === slug; });
      var base = slug.replace(/-(en|he)$/i, '');
      ContentStreamModal.open({ baseSlug: base, entityType: e ? e.contentType : 'blog' });
    }

    // ===== ENTITY DETAIL DRAWER (phase 9a) =====

    function openEntityDrawer(slug) {
      if (!slug) return;
      // Fresh open from library list or task chip — clears any prior back-stack.
      state.entityStack = [];
      _loadEntityDrawer(slug);
    }

    function backEntityDrawer() {
      if (!state.entityStack.length) return;
      var prev = state.entityStack.pop();
      _loadEntityDrawer(prev);
    }

    function _loadEntityDrawer(slug) {
      state.currentEntitySlug = slug;
      setDrawerLoading(slug);
      updateDrawerBackButton();
      document.getElementById('lvEntityDrawer').style.display = 'flex';
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) {
            TaskWidgets.toast((res && res.error) || 'Drawer load failed', true);
            return;
          }
          renderEntityDrawer(res.data);
        })
        .withFailureHandler(function(err) {
          TaskWidgets.toast(err && err.message ? err.message : 'Network error', true);
        })
        .WebAppLibrary_getEntityDetail({ entityId: slug });
    }

    function updateDrawerBackButton() {
      var btn = document.getElementById('lv-drawer-back');
      if (btn) btn.style.display = state.entityStack.length ? '' : 'none';
    }

    function setDrawerLoading(slug) {
      document.getElementById('lv-drawer-title').textContent = 'Loading…';
      document.getElementById('lv-drawer-slug').textContent = slug || '—';
      ['lv-drawer-type', 'lv-drawer-language', 'lv-drawer-state', 'lv-drawer-lasttouched'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = '…';
      });
      var loadingPlaceholder = '<span class="placeholder">Loading…</span>';
      var attachedEl = document.getElementById('lv-drawer-attached-tasks');
      if (attachedEl) attachedEl.innerHTML = loadingPlaceholder;
      // Hide actions row during load (entity data not yet known)
      var actionsEl = document.getElementById('lv-drawer-actions');
      if (actionsEl) actionsEl.innerHTML = '';
    }

    function renderEntityDrawer(data) {
      var entity = (data && data.entity) || {};
      state.currentEntity = entity;
      document.getElementById('lv-drawer-title').textContent = entity.title || entity.slug || 'Entity';
      document.getElementById('lv-drawer-slug').textContent = entity.slug || '—';
      document.getElementById('lv-drawer-type').textContent = entity.contentType || '—';
      document.getElementById('lv-drawer-language').textContent = entity.language || '(none)';
      var derivedStatus = TaskWidgets.deriveStatus((data && data.attached_tasks) || []);
      document.getElementById('lv-drawer-state').innerHTML = entity.state === 'abandoned'
        ? '<span class="tw-status-pill">abandoned</span>'
        : '<span class="tw-status-pill ' + TaskWidgets.statusClass(derivedStatus) + '">' + TaskWidgets.escape(derivedStatus) + '</span>';
      document.getElementById('lv-drawer-lasttouched').textContent = entity.lastTouched ? TaskWidgets.formatDate(entity.lastTouched) : '—';

      renderDrawerActions(entity);
      renderDrawerAttachedTasks((data && data.attached_tasks) || []);
    }

    // Navigate from the entity drawer to a task. Manager task home is the
    // dashboard queue (deep-link + auto-expand on mount); admin uses AdminTasks
    // (existing selectTaskId contract). Reset any modal scroll-lock first.
    function openAttachedTask(id) {
      if (!id) return;
      document.body.style.overflow = '';
      if (document.body.classList.contains('role-manager')) {
        sessionStorage.setItem('selectDashboardTaskId', id);
        if (typeof loadView === 'function') loadView('ManagerDashboard');
      } else {
        sessionStorage.setItem('selectTaskId', id);
        if (typeof loadView === 'function') loadView('AdminTasks');
      }
    }

    function renderDrawerAttachedTasks(tasks) {
      var el = document.getElementById('lv-drawer-attached-tasks');
      if (!el) return;
      if (!tasks.length) {
        el.innerHTML = '<span class="placeholder">No tasks attached.</span>';
        return;
      }
      // Sort: open first, then by due date asc (nulls last).
      var sorted = tasks.slice().sort(function(a, b) {
        var aDone = (a.status === 'Done' || a.status === 'Cancelled') ? 1 : 0;
        var bDone = (b.status === 'Done' || b.status === 'Cancelled') ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
      var html = sorted.map(function(t) {
        var dueChip = t.dueDate
          ? '<span class="tw-due-chip ' + TaskWidgets.dueClass(t.dueDate, t.status) + '">' + TaskWidgets.formatDate(t.dueDate) + '</span>'
          : '';
        return '<div class="lv-drawer-task-row" style="cursor:pointer;" title="Open this task" onclick="TaskDetail.open(\'' + TaskWidgets.escape(t.id) + '\')">' +
          '<span class="tw-status-pill ' + TaskWidgets.statusClass(t.status) + '">' + TaskWidgets.escape(t.status || '—') + '</span>' +
          '<span class="lv-drawer-task-title">' + TaskWidgets.escape(t.name || t.typeId) + '</span>' +
          (t.assignedTo ? '<span class="detail-meta">' + TaskWidgets.escape(t.assignedTo) + '</span>' : '') +
          dueChip +
          '</div>';
      }).join('');
      el.innerHTML = html;
    }

    function closeEntityDrawer() {
      document.getElementById('lvEntityDrawer').style.display = 'none';
      state.entityStack = [];
      state.currentEntitySlug = null;
      state.currentEntity = null;
    }

    // ===== DRAWER ACTION BUTTONS (phase 9d-partial) =====

    function renderDrawerActions(entity) {
      var el = document.getElementById('lv-drawer-actions');
      if (!el) return;
      var buttons = [];

      // Open Doc — the most-likely action gets a prominent action-bar button,
      // first in the bar, shown only when a Doc exists (Step 9). Not role-gated:
      // managers open files too.
      if (entity && entity.docUrl) {
        buttons.push('<button class="btn btn-sm btn-light" onclick="LibraryView.drawerOpenInDrive()">&#8599; Open Doc</button>');
        buttons.push('<button class="btn btn-sm btn-light" onclick="LibraryView.drawerAttachNewVersion()">Attach new version</button>');
      }

      // Admin-only via the body-class CSS gate (AppView.html:108).
      buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="LibraryView.drawerCreateContentTasks()">Create Content Tasks</button>');

      // HE sibling stub: only meaningful for EN entities whose HE peer isn't
      // in the cached library list. False negatives (peer not in cache) are
      // harmless — addEntity dedups server-side.
      if (entity && entity.slug && entity.slug.length > 3 && entity.slug.slice(-3) === '-en') {
        var heSlug = entity.slug.slice(0, -3) + '-he';
        var hasPeer = (state.library || []).some(function(e) { return e.slug === heSlug; });
        if (!hasPeer) {
          buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="LibraryView.drawerCreateHeSibling()">Create HE sibling stub</button>');
        }
      }

      // Request Correction — published entities only (roll-forward corrective edit,
      // Decision 5). Abandon — any non-terminal state (Decision 6 / Q1).
      var st = entity ? String(entity.state).toLowerCase() : '';
      if (st === 'published') {
        buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="LibraryView.drawerRequestCorrection()">Request Correction</button>');
      }
      if (entity && entity.slug && st !== 'published' && st !== 'abandoned') {
        buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="LibraryView.drawerAbandon()">Abandon</button>');
      }

      el.innerHTML = buttons.join('');
    }

    function drawerOpenInDrive() {
      if (state.currentEntity && state.currentEntity.docUrl) {
        window.open(state.currentEntity.docUrl, '_blank', 'noopener');
      }
    }

    // Replace the entity's current Doc from the drawer directly — same
    // WebAppLibrary_attachExistingDoc endpoint TaskPacks uses per-task, called
    // here with the entity slug so it reaches the current version with one click
    // regardless of which (or whether any) task produced it.
    function drawerAttachNewVersion() {
      if (!state.currentEntity) return;
      document.getElementById('lv-drawer-attach-slug').textContent = state.currentEntity.slug;
      document.getElementById('lv-drawer-attach-url').value = '';
      ModalOverlay.open('lvDrawerAttachModal');
    }

    function submitDrawerAttachDoc() {
      if (!state.currentEntity) return;
      var entityId = state.currentEntity.slug;
      var url = document.getElementById('lv-drawer-attach-url').value.trim();
      if (!url) { TaskWidgets.toast('Drive URL required', true); return; }
      var btn = document.getElementById('lv-btn-drawer-attach-submit');
      btn.disabled = true; btn.textContent = 'Attaching...';
      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false; btn.textContent = 'Attach';
          if (!result || !result.ok) {
            TaskWidgets.toast((result && result.error) || 'Failed', true);
            return;
          }
          ModalOverlay.close('lvDrawerAttachModal');
          TaskWidgets.toast(result.superseded ? 'New version attached, previous archived' : 'Doc attached');
          load();                          // refresh library list
          _loadEntityDrawer(entityId);      // refresh current drawer (no stack push)
        })
        .withFailureHandler(function(err) {
          btn.disabled = false; btn.textContent = 'Attach';
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_attachExistingDoc({ entityId: entityId, driveUrl: url });
    }

    function drawerCreateContentTasks() {
      if (!state.currentEntity) return;
      var base = String(state.currentEntity.slug || '').replace(/-(en|he)$/i, '');
      ContentStreamModal.open({ baseSlug: base, entityType: state.currentEntity.contentType });
    }

    function drawerRequestCorrection() {
      if (!state.currentEntity) return;
      var slug = state.currentEntity.slug;
      TaskWidgets.confirm('Spawn a correction edit task for "' + slug + '"?', function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { TaskWidgets.toast((res && res.error) || 'Failed', true); return; }
            TaskWidgets.toast('Correction task created', 'success');
            _loadEntityDrawer(slug);
            load();
          })
          .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Failed', true); })
          .WebAppLibrary_requestCorrection({ entityId: slug });
      });
    }

    function drawerAbandon() {
      if (!state.currentEntity) return;
      var slug = state.currentEntity.slug;
      TaskWidgets.confirm('Mark "' + slug + '" abandoned?', function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { TaskWidgets.toast((res && res.error) || 'Failed', true); return; }
            TaskWidgets.toast('Marked abandoned', 'success');
            _loadEntityDrawer(slug);
            load();
          })
          .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Failed', true); })
          .WebAppLibrary_abandonEntity({ entityId: slug });
      }, { danger: true });
    }

    function drawerCreateHeSibling() {
      if (!state.currentEntity) return;
      var enSlug = state.currentEntity.slug;
      if (!enSlug || enSlug.slice(-3) !== '-en') {
        TaskWidgets.toast('Not an EN-side entity; cannot derive HE peer', true);
        return;
      }
      var heSlug = enSlug.slice(0, -3) + '-he';
      TaskWidgets.confirm('Create HE sibling "' + heSlug + '"?', function() {
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            TaskWidgets.toast((res && res.error) || 'Create failed', true);
            return;
          }
          if (res.deduplicated) {
            TaskWidgets.toast('HE peer "' + heSlug + '" already exists');
          } else {
            TaskWidgets.toast('HE sibling created');
          }
          load();                                      // refresh library list + tasks
          _loadEntityDrawer(state.currentEntitySlug);  // refresh current drawer (no stack push)
        })
        .withFailureHandler(function(err) {
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_addEntity({
          slug: heSlug,
          type: state.currentEntity.contentType,
          language: 'he',
          title: state.currentEntity.title,
          references: [enSlug]
        });
      });
    }

    return {
      init: init,
      openAttachedTask: openAttachedTask,
      switchPreset: switchPreset,
      spawnForEntity: spawnForEntity,
      openEntityDrawer: openEntityDrawer,
      backEntityDrawer: backEntityDrawer,
      closeEntityDrawer: closeEntityDrawer,
      drawerOpenInDrive: drawerOpenInDrive,
      drawerAttachNewVersion: drawerAttachNewVersion,
      drawerCreateContentTasks: drawerCreateContentTasks,
      drawerCreateHeSibling: drawerCreateHeSibling,
      drawerRequestCorrection: drawerRequestCorrection,
      drawerAbandon: drawerAbandon
    };
  })();

  // Auto-init when the view loads
  document.addEventListener('DOMContentLoaded', function() {
    if (window.LibraryView) window.LibraryView.init();
  });
  // For dynamic inclusion via AppView's getView(), DOMContentLoaded may have
  // already fired — call init directly if the document is already ready.
  if (document.readyState !== 'loading' && window.LibraryView) {
    window.LibraryView.init();
  }
</script>
