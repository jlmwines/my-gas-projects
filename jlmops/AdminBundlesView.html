            <button type="button" class="btn btn-sm mr-1 bundle-chip active" data-filter="all">All <span class="badge badge-secondary" id="chip-count-all">0</span></button>

              </tbody>

  </div>

  <!-- Section 2 (Low Inventory Alerts) REMOVED — ADMIN_BUNDLES_UI_PLAN Phase 1b §7.3. Stock is a
       subordinate advisory; the export-time out-of-stock failsafe warns, and per-bundle stock will
       surface in the 1c deficiency strip. Stage 7 suggestion view replaces it later. -->

  <!-- Section 3: Bundle Editor — hidden until a row is clicked (Phase 1c §7.3, UI_T2_1 Stage D) -->
  <div class="row" id="bundle-editor-section" style="display: none;">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">

          <div id="editor-actions" style="display: none;">

            <button id="btn-close-editor" class="btn btn-sm ml-1">Close</button>

          <!-- Deficiency strip (Phase 1c): what changed / status; grows with Stage 7 (Phase 4) -->

            <!-- Left: Slot List + Preview Controls -->

            <!-- Right: Slot Detail Editor + Preview -->
            <div class="col-md-8">
              <div id="slot-detail-container">
                <div class="text-muted">Select a slot to view details</div>

              <!-- Bundle Preview Content -->
              <div id="preview-section" class="mt-3 d-none">
                <div id="preview-content" class="border rounded p-3 bg-light">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <span id="preview-title" class="h5 font-weight-bold mb-0"></span>
                    <span id="preview-price" class="text-info font-weight-bold"></span>
                  </div>
                  <div id="preview-short-desc" class="mb-2"></div>
                  <div id="preview-long-desc" class="text-muted mb-3" style="white-space: pre-wrap;"></div>
                  <table class="table table-sm table-bordered mb-0">

<div class="card mb-3" id="action-results-panel" style="display:none;">

  </div>
  <div class="card-body" id="action-results-body"></div>

<script>
(function() {
  'use strict';

  // State
  var currentBundleId = null;
  var currentBundle = null;
  var selectedSlotId = null;
  var healthData = [];
  var selectedReplacements = [];
  var categoryOptions = [];
  var pushBundleIds = [];        // bundleIds needing export (from cached push_status) — Phase 1b
  var currentFilter = 'all';     // active chip: all | needs-export | ok

  // =================================================================================
  // INITIALIZATION
  // =================================================================================

  function init() {
    bindEvents();  // wire handlers before data arrives; clicks on not-yet-rendered rows no-op
    // Single consolidated round-trip (T3.3): replaces the 4-call init fanout.
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          console.error('init failed:', res && res.error);
          return;
        }
        applyInitData(res.data);
      })
      .withFailureHandler(function(err) {
        console.error('init call failed:', err);
      })
      .WebAppBundles_getViewData();
  }

  // Dispatch the consolidated init payload to each loader; each skips its own fetch.
  // (Phase 1b: stats row + alerts panel removed; chips/list are driven by bundles + pushStatus.)
  function applyInitData(data) {
    var ps = data.pushStatus || { count: 0, bundleIds: [] };
    pushBundleIds = (ps.bundleIds || []).map(String);
    loadCategories(data.categories);
    loadBundleList(data.bundles);
  }

  function loadCategories(preloadedData) {
    if (preloadedData !== undefined) {
      categoryOptions = preloadedData || [];
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result.error && result.data) {
          categoryOptions = result.data;
        }
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load categories:', err);
      })
      .WebAppBundles_getCategories();
  }

  function bindEvents() {
    document.getElementById('btn-update-composition').addEventListener('click', updateComposition);
    document.getElementById('btn-review-stock').addEventListener('click', reviewStock);
    document.getElementById('btn-validate-parity').addEventListener('click', validateParity);
    document.getElementById('btn-export-bundles').addEventListener('click', exportBundles);
    document.querySelectorAll('.bundle-chip').forEach(function(chip) {
      chip.addEventListener('click', function() { setFilter(chip.dataset.filter); });
    });
    document.getElementById('btn-close-editor').addEventListener('click', closeEditor);
    document.getElementById('btn-add-text-slot').addEventListener('click', function() { addSlot('Text'); });
    document.getElementById('btn-add-product-slot').addEventListener('click', function() { addSlot('Product'); });
    document.getElementById('btn-save-slot').addEventListener('click', saveSlot);
  }

  // =================================================================================
  // DASHBOARD
  // =================================================================================

  function loadStats(preloadedData) {
    // Phase 1b: the 5-stat row was replaced by filter chips. Stat elements no longer exist, so
    // this (and its leftover callers in slot/composition handlers) is a safe no-op.
    if (!document.getElementById('stat-total')) return;
    if (preloadedData !== undefined) {
      renderStats(preloadedData);
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          console.error('Error loading stats:', result.error);
          return;
        }
        renderStats(result.data);
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load stats:', err);
      })
      .WebAppBundles_getStats();
  }

  function renderStats(stats) {
    if (!stats || typeof stats.total === 'undefined') return;  // skip empty/error payloads
    document.getElementById('stat-total').textContent = stats.total;
    document.getElementById('stat-active').textContent = stats.active;
    document.getElementById('stat-draft').textContent = stats.draft;
    document.getElementById('stat-archived').textContent = stats.archived;
    // Attention counter is owned by the lazy health path (renderHealthAlerts); the mount's
    // lightweight stats payload omits it, so only set it when a caller provides the counts.
    if (typeof stats.needsAttention !== 'undefined') {
      document.getElementById('stat-attention').textContent = stats.needsAttention + ' bundles (' + stats.lowInventoryCount + ' slots)';
    }
  }

  function toggleDescSection(section) {
    var contentEl = document.getElementById(section + '-desc-content');
    var toggleEl = document.getElementById(section + '-toggle');
    if (contentEl.style.display === 'none') {
      contentEl.style.display = 'block';
      toggleEl.textContent = '▲';
    } else {
      contentEl.style.display = 'none';
      toggleEl.textContent = '▼';
    }
  }

  function loadBundleList(preloadedData) {
    if (preloadedData !== undefined) {
      renderBundleList(preloadedData);
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          console.error('Error loading bundles:', result.error);
          return;
        }
        renderBundleList(result.data);
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load bundles:', err);
      })
      .WebAppBundles_getAllBundles();
  }

  function renderBundleList(bundles) {
    var tbody = document.getElementById('bundle-list-body');
    if (!bundles || bundles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">No bundles found</td></tr>';
      updateChipCounts(0, 0);
      return;
    }

    // Mark needs-export from the cached push_status, then pin those rows to the top (Phase 1b §7.3).
    var marked = bundles.map(function(b) {
      return { b: b, needsPush: pushBundleIds.indexOf(String(b.bundleId)) !== -1 };
    });
    marked.sort(function(x, y) { return (y.needsPush ? 1 : 0) - (x.needsPush ? 1 : 0); });

    var needsCount = 0;
    var html = marked.map(function(m) {
      var b = m.b;
      if (m.needsPush) needsCount++;
      var statusClass = b.status === 'Active' ? 'badge-success' : (b.status === 'Draft' ? 'badge-warning' : 'badge-secondary');
      var priceHtml = '-';
      if (b.totalPrice > 0) {
        priceHtml = (b.discount > 0)
          ? '<span class="text-muted" style="text-decoration: line-through; font-size: 0.85em;">' + b.totalPrice + '</span> <strong>' + b.displayPrice + '</strong>'
          : b.displayPrice;
      }
      var nameCell = '<strong>' + (b.nameEn || '-') + '</strong>' +
        (b.nameHe ? '<div class="bundle-name-he">' + b.nameHe + '</div>' : '');
      var pushBadge = m.needsPush ? ' <span class="badge badge-warning">Needs Push</span>' : '';
      return '<tr data-bundle-id="' + b.bundleId + '" data-state="' + (m.needsPush ? 'needs-export' : 'ok') + '" style="cursor: pointer;">' +
        '<td>' + nameCell + '</td>' +
        '<td>' + (b.type || 'Bundle') + '</td>' +
        '<td><span class="badge ' + statusClass + '">' + b.status + '</span>' + pushBadge + '</td>' +
        '<td>' + priceHtml + '</td>' +
        '<td><button class="btn btn-sm btn-edit-bundle">Edit</button></td>' +
        '</tr>';
    }).join('');

    tbody.innerHTML = html;

    // Row click anywhere opens the editor in place (Phase 1c §7.3). The Edit button is now just
    // a visual affordance — its click bubbles to the row handler.
    tbody.querySelectorAll('tr').forEach(function(row) {
      if (!row.dataset.bundleId) return;
      row.addEventListener('click', function() {
        selectBundleRow(row);
        loadBundleForEditing(row.dataset.bundleId);
      });
    });

    updateChipCounts(bundles.length, needsCount);
    applyFilter();
  }

  function selectBundleRow(row) {
    document.querySelectorAll('#bundle-list-body tr').forEach(function(r) {
      r.classList.remove('bundle-row-selected');
    });
    if (row) row.classList.add('bundle-row-selected');
  }

  // Deficiency strip atop the editor (Phase 1c). v1 = push status; grows with Stage 7 (Phase 4).
  function renderDeficiencyStrip(bundle) {
    var strip = document.getElementById('editor-deficiency-strip');
    if (!strip) return;
    var needsPush = pushBundleIds.indexOf(String(bundle.bundleId)) !== -1;
    if (needsPush) {
      strip.innerHTML = '<div class="alert alert-warning py-2 mb-0">&#9888; Differs from web — export pending.</div>';
    } else {
      strip.innerHTML = '<div class="alert alert-success py-2 mb-0">&#10003; Matches web — nothing to export.</div>';
    }
  }

  function closeEditor() {
    var section = document.getElementById('bundle-editor-section');
    if (section) section.style.display = 'none';
    selectBundleRow(null);
    currentBundleId = null;
    currentBundle = null;
  }

  // ---- Filter chips (Phase 1b) -------------------------------------------------
  function updateChipCounts(total, needs) {
    document.getElementById('chip-count-all').textContent = total;
    document.getElementById('chip-count-needs').textContent = needs;
    document.getElementById('chip-count-ok').textContent = total - needs;
  }

  function setFilter(filter) {
    currentFilter = filter || 'all';
    document.querySelectorAll('.bundle-chip').forEach(function(chip) {
      chip.classList.toggle('active', chip.dataset.filter === currentFilter);
    });
    applyFilter();
  }

  function applyFilter() {
    document.querySelectorAll('#bundle-list-body tr').forEach(function(row) {
      if (!row.dataset.state) return;  // skip the "no bundles" placeholder row
      var show = currentFilter === 'all' || row.dataset.state === currentFilter;
      row.style.display = show ? '' : 'none';
    });
  }

  // =================================================================================
  // HEALTH MONITOR
  // =================================================================================

  function loadHealthAlerts(preloadedData) {
    // DISABLED 2026-06-07: getBundlesWithLowInventory is slow and the low-inventory alerts panel
    // is being retired (ADMIN_BUNDLES_UI_PLAN §7.3 — its content folds into the per-bundle
    // deficiency strip / Stage 7 suggestion view). No-op to keep the Bundles view fast for
    // export testing. Re-enable only if the panel is intentionally restored.
    var el = document.getElementById('health-alerts-container');
    if (el) el.innerHTML = '<div class="text-muted small mb-0">Low-inventory alerts disabled (panel being retired — see ADMIN_BUNDLES_UI_PLAN.md §7.3).</div>';
  }

  function renderHealthAlerts(data) {
    var container = document.getElementById('health-alerts-container');
    selectedReplacements = [];

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="text-success">All bundle slots have adequate inventory</div>';
      document.getElementById('btn-apply-replacements').disabled = true;
      document.getElementById('stat-attention').textContent = '0 bundles (0 slots)';
      return;
    }

    // Fill the stats-card attention counter from the (lazily fetched) health data — the
    // mount stats payload omits it so the view can open fast.
    var totalLowSlots = data.reduce(function(sum, b) {
      return sum + (b.lowStockSlots ? b.lowStockSlots.length : 0);
    }, 0);
    document.getElementById('stat-attention').textContent = data.length + ' bundles (' + totalLowSlots + ' slots)';

    var html = data.map(function(bundleData) {
      var bundle = bundleData.bundle;
      var slots = bundleData.lowStockSlots;

      var slotsHtml = slots.map(function(slotInfo) {
        var slot = slotInfo.slot;
        var suggestions = slotInfo.suggestions || [];
        var suggestionsHtml = suggestions.length > 0 ?
          '<select class="form-control form-control-sm replacement-select" data-slot-id="' + slot.slotId + '">' +
            '<option value="">Select replacement...</option>' +
            suggestions.map(function(s) {
              return '<option value="' + s.sku + '">' + (s.nameEn || s.nameHe || s.sku) + ' (Stock: ' + s.stock + ', ' + s.price + ')</option>';
            }).join('') +
          '</select>' :
          '<span class="text-muted">No eligible replacements</span>';

        return '<tr>' +
          '<td>' + slot.order + '</td>' +
          '<td>' + slotInfo.currentSKU + '</td>' +
          '<td>' + (slotInfo.product ? (slotInfo.product.nameEn || slotInfo.product.nameHe || '-') : '-') + '</td>' +
          '<td class="text-danger font-weight-bold">' + slotInfo.stock + '</td>' +
          '<td>' + suggestionsHtml + '</td>' +
          '<td><a href="#" class="btn-edit-slot" data-bundle-id="' + bundle.bundleId + '" data-slot-id="' + slot.slotId + '">Edit</a></td>' +
          '</tr>';
      }).join('');

      return '<div class="mb-3">' +
        '<h6>' + (bundle.nameEn || bundle.bundleId) + ' <span class="badge badge-danger">' + slots.length + ' low stock</span></h6>' +
        '<table class="table table-sm table-bordered" style="table-layout: fixed;">' +
          '<colgroup>' +
            '<col style="width: 40px;">' +
            '<col style="width: 120px;">' +
            '<col style="width: 250px;">' +
            '<col style="width: 50px;">' +
            '<col style="width: 180px;">' +
            '<col style="width: 40px;">' +
          '</colgroup>' +
          '<thead><tr><th>#</th><th>SKU</th><th>Product</th><th>Stock</th><th>Replacement</th><th></th></tr></thead>' +
          '<tbody>' + slotsHtml + '</tbody>' +
        '</table>' +
      '</div>';
    }).join('');

    container.innerHTML = html;
    document.getElementById('btn-apply-replacements').disabled = false;

    // Bind replacement select handlers
    container.querySelectorAll('.replacement-select').forEach(function(select) {
      select.addEventListener('change', function() {
        updateSelectedReplacements();
      });
    });

    // Bind edit slot links
    container.querySelectorAll('.btn-edit-slot').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        loadBundleForEditing(this.dataset.bundleId, this.dataset.slotId);
      });
    });
  }

  function updateSelectedReplacements() {
    selectedReplacements = [];
    document.querySelectorAll('.replacement-select').forEach(function(select) {
      if (select.value) {
        selectedReplacements.push({
          slotId: select.dataset.slotId,
          sku: select.value,
          reason: 'Low Stock Replacement'
        });
      }
    });
    document.getElementById('btn-apply-replacements').disabled = selectedReplacements.length === 0;
  }

  function applyReplacements() {
    if (selectedReplacements.length === 0) return;

    TaskWidgets.confirm('Apply ' + selectedReplacements.length + ' replacement(s)?', function() {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        TaskWidgets.toast('Applied ' + result.data.successCount + ' replacements, ' + result.data.failCount + ' failed.', 'success');
        loadHealthAlerts();
        loadStats(); // Refresh needs attention count
        if (currentBundleId) {
          loadBundleForEditing(currentBundleId);
        }
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed to apply replacements: ' + err.message, 'error');
      })
      .WebAppBundles_applyReplacements(selectedReplacements);
    });
  }

  // =================================================================================
  // BUNDLE EDITOR
  // =================================================================================

  function loadBundleForEditing(bundleId, focusSlotId) {
    currentBundleId = bundleId;

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error loading bundle: ' + result.error, 'error');
          return;
        }
        currentBundle = result.data;
        renderBundleEditor(result.data, focusSlotId);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed to load bundle: ' + err.message, 'error');
      })
      .WebAppBundles_getBundleWithSlots(bundleId);
  }

  function renderBundleEditor(bundle, focusSlotId) {
    // Reveal the editor in place (Phase 1c) and render the deficiency strip.
    var section = document.getElementById('bundle-editor-section');
    if (section) section.style.display = '';
    renderDeficiencyStrip(bundle);

    document.getElementById('editor-bundle-name').textContent = bundle.nameEn || bundle.bundleId;
    document.getElementById('editor-actions').style.display = 'block';

    // Use the backend-computed pricing (BundleService._calculateBundlePrice): totalPrice sums
    // price*qty with qty-0 contributing 0; discount = totalPrice - discountPrice (0 if none);
    // displayPrice = the post-discount selling price. The old frontend recompute used
    // (defaultQty || 1), counting qty-0 add-ons as qty-1 and producing phantom savings.
    var totalPrice = bundle.totalPrice || 0;
    var discount = bundle.discount || 0;
    var displayPrice = bundle.displayPrice || 0;
    bundle.calculatedTotal = totalPrice;  // the preview reads this

    // Title bar: total (price*qty, skips qty 0) · discount · total incl discount.
    var priceEl = document.getElementById('editor-bundle-price');
    if (totalPrice > 0 || displayPrice > 0) {
      var priceText;
      if (discount > 0) {
        priceText = 'Total ₪' + totalPrice.toFixed(0) + ' · Discount ₪' + discount.toFixed(0) + ' · Final ₪' + displayPrice.toFixed(0);
      } else {
        priceText = 'Total ₪' + (totalPrice > 0 ? totalPrice : displayPrice).toFixed(0);
      }
      priceEl.textContent = priceText;
      priceEl.style.display = 'inline';
    } else {
      priceEl.style.display = 'none';
    }

    // Store bundle descriptions for collapsible sections
    window._bundleDescriptions = {
      shortEn: bundle.shortDescEn || '',
      shortHe: bundle.shortDescHe || '',
      longEn: bundle.longDescEn || '',
      longHe: bundle.longDescHe || ''
    };

    // Render slot list
    var slotListHtml = '<div class="list-group">';
    if (bundle.slots && bundle.slots.length > 0) {
      slotListHtml += bundle.slots.map(function(slot) {
        var preview = slot.slotType === 'Text' ?
          '<small class="text-muted">' + (slot.textEn || '(empty)').substring(0, 30) + '</small>' :
          '<small>' + (slot.activeSKU || 'No product') + '</small>';

        var activeClass = slot.slotId === focusSlotId ? ' active' : '';
        return '<a href="#" class="list-group-item list-group-item-action slot-item' + activeClass + '" data-slot-id="' + slot.slotId + '">' +
          '<div class="d-flex justify-content-between">' +
            '<span><strong>' + slot.order + '.</strong> ' + slot.slotType + '</span>' +
            '<span class="badge badge-light">' + (slot.slotType === 'Product' ? slot.defaultQty + 'x' : slot.textStyle) + '</span>' +
          '</div>' +
          preview +
        '</a>';
      }).join('');
    } else {
      slotListHtml += '<div class="text-muted p-3">No slots in this bundle</div>';
    }
    slotListHtml += '</div>';

    document.getElementById('slot-list-container').innerHTML = slotListHtml;

    // Bind slot click handlers
    document.querySelectorAll('.slot-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.slot-item').forEach(function(i) { i.classList.remove('active'); });
        this.classList.add('active');
        selectedSlotId = this.dataset.slotId;
        renderSlotDetail(selectedSlotId);
      });
    });

    // Auto-select focused slot or first slot
    if (focusSlotId) {
      selectedSlotId = focusSlotId;
      renderSlotDetail(focusSlotId);
    } else if (bundle.slots && bundle.slots.length > 0) {
      selectedSlotId = bundle.slots[0].slotId;
      renderSlotDetail(selectedSlotId);
    } else {
      document.getElementById('slot-detail-container').innerHTML = '<div class="text-muted">No slots to display</div>';
    }

    // Show preview controls and content, bind click handlers
    document.getElementById('preview-controls').classList.remove('d-none');
    document.getElementById('preview-section').classList.remove('d-none');

    // Bind preview tab click handlers
    document.getElementById('preview-tab-en').onclick = function(e) {
      e.preventDefault();
      renderBundlePreview('en');
    };
    document.getElementById('preview-tab-he').onclick = function(e) {
      e.preventDefault();
      renderBundlePreview('he');
    };

    renderBundlePreview('en');
  }

  function renderBundlePreview(lang) {
    if (!currentBundle) return;
    var isHe = lang === 'he';

    // Update tab active state (bold for selected, muted for other)
    var tabEn = document.getElementById('preview-tab-en');
    var tabHe = document.getElementById('preview-tab-he');
    if (tabEn && tabHe) {
      tabEn.className = isHe ? 'small mr-2 text-muted' : 'small mr-2 font-weight-bold';
      tabHe.className = isHe ? 'small font-weight-bold' : 'small text-muted';
    }

    // Set RTL for Hebrew
    var content = document.getElementById('preview-content');
    if (content) content.dir = isHe ? 'rtl' : 'ltr';

    // Populate content based on language
    var title = isHe ? (currentBundle.nameHe || currentBundle.nameEn) : currentBundle.nameEn;
    document.getElementById('preview-title').textContent = title || '';

    // Show calculated total with savings if applicable (use ₪ symbol)
    var priceText = '';
    if (currentBundle.calculatedTotal > 0) {
      priceText = '₪' + currentBundle.calculatedTotal.toFixed(0);
      if (currentBundle.displayPrice > 0 && currentBundle.displayPrice < currentBundle.calculatedTotal) {
        var savings = currentBundle.calculatedTotal - currentBundle.displayPrice;
        priceText += ' → ₪' + currentBundle.displayPrice.toFixed(0) + ' (saves ₪' + savings.toFixed(0) + ')';
      }
    } else if (currentBundle.displayPrice) {
      priceText = '₪' + currentBundle.displayPrice;
    }
    document.getElementById('preview-price').textContent = priceText;

    var desc = window._bundleDescriptions || {};
    document.getElementById('preview-short-desc').textContent = isHe ? (desc.shortHe || '') : (desc.shortEn || '');
    document.getElementById('preview-long-desc').textContent = isHe ? (desc.longHe || '') : (desc.longEn || '');

    // Build slots table (columns: name, qty, price)
    var tbody = document.getElementById('preview-slots-body');
    tbody.innerHTML = '';
    if (currentBundle.slots) {
      currentBundle.slots.forEach(function(slot) {
        var tr = document.createElement('tr');
        if (slot.slotType === 'Text') {
          var text = isHe ? (slot.textHe || slot.textEn || '') : (slot.textEn || '');
          tr.innerHTML = '<td colspan="3"><em>' + text + '</em></td>';
        } else {
          var qtyDisplay = (slot.defaultQty || 1) + (slot.qtyVariable ? ' ±' : '');
          var productName = slot.productName || slot.activeSKU || '-';
          var price = slot.productPrice ? '₪' + slot.productPrice : '-';
          tr.innerHTML = '<td>' + productName + '</td><td>' + qtyDisplay + '</td><td>' + price + '</td>';
        }
        tbody.appendChild(tr);
      });
    }
  }

              '</div>' +

          '<div class="col-md-6">' +

                '<label>Category</label>' +
                '<select class="form-control form-control-sm" id="slot-category">' +
                  '<option value="">-- None --</option>' +
                  categoryOptions.map(function(cat) {

            '<div class="form-row mt-1">' +
              '<div class="col-4">' +
                '<label>Intensity</label>' +

  function updateCurrentSlot() {
    if (!selectedSlotId) return;

    var slot = currentBundle.slots.find(function(s) { return s.slotId === selectedSlotId; });
    if (!slot) return;

    var updates = {
      order: parseInt(document.getElementById('slot-order').value) || 1
    };

    if (slot.slotType === 'Text') {
      updates.textStyle = document.getElementById('slot-textStyle').value;
      updates.textEn = document.getElementById('slot-textEn').value;
      updates.textHe = document.getElementById('slot-textHe').value;
    } else {
      updates.activeSKU = document.getElementById('slot-activeSKU').value;
      updates.defaultQty = parseInt(document.getElementById('slot-defaultQty').value) || 1;
      updates.qtyVariable = document.getElementById('slot-qtyVariable').checked;
      updates.exclusive = document.getElementById('slot-exclusive').checked;
      updates.category = document.getElementById('slot-category').value;
      updates.category2 = document.getElementById('slot-category2').value;
      updates.priceMin = document.getElementById('slot-priceMin').value ? parseFloat(document.getElementById('slot-priceMin').value) : null;
      updates.priceMax = document.getElementById('slot-priceMax').value ? parseFloat(document.getElementById('slot-priceMax').value) : null;
      updates.intensity = document.getElementById('slot-intensity').value ? parseInt(document.getElementById('slot-intensity').value) : null;
      updates.complexity = document.getElementById('slot-complexity').value ? parseInt(document.getElementById('slot-complexity').value) : null;
      updates.acidity = document.getElementById('slot-acidity').value ? parseInt(document.getElementById('slot-acidity').value) : null;
      updates.nameContains = document.getElementById('slot-nameContains').value;
    }

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        TaskWidgets.toast('Slot updated', 'success');
        loadBundleForEditing(currentBundleId, selectedSlotId);
        loadStats(); // Refresh stats in case inventory status changed
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_updateSlot(selectedSlotId, updates);
  }

  function deleteCurrentSlot() {
    if (!selectedSlotId) return;
    TaskWidgets.confirm('Delete this slot?', function() {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        TaskWidgets.toast('Slot deleted', 'success');
        selectedSlotId = null;
        loadBundleForEditing(currentBundleId);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_deleteSlot(selectedSlotId);
    }, { danger: true });
  }

  function duplicateCurrentSlot() {
    if (!selectedSlotId || !currentBundle) return;

    var slot = currentBundle.slots.find(function(s) { return s.slotId === selectedSlotId; });
    if (!slot) return;

    var maxOrder = currentBundle.slots.reduce(function(max, s) {
      return Math.max(max, s.order || 0);
    }, 0);

    var slotData = {
      bundleId: currentBundleId,
      slotType: slot.slotType,
      order: maxOrder + 1,
      textStyle: slot.textStyle,
      textEn: slot.textEn,
      textHe: slot.textHe,
      activeSKU: '', // Don't copy SKU
      category: slot.category,
      category2: slot.category2,
      priceMin: slot.priceMin,
      priceMax: slot.priceMax,
      intensity: slot.intensity,
      complexity: slot.complexity,
      acidity: slot.acidity,
      nameContains: slot.nameContains,
      exclusive: slot.exclusive,
      qtyVariable: slot.qtyVariable,
      defaultQty: slot.defaultQty
    };

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        loadBundleForEditing(currentBundleId, result.data.slotId);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_createSlot(slotData);
  }

  function addSlot(slotType) {
    if (!currentBundleId) {
      TaskWidgets.toast('Select a bundle first', 'warning');
      return;
    }

    var maxOrder = currentBundle.slots.reduce(function(max, s) {
      return Math.max(max, s.order || 0);
    }, 0);

    var slotData = {
      bundleId: currentBundleId,
      slotType: slotType,
      order: maxOrder + 1
    };

    if (slotType === 'Text') {
      slotData.textStyle = 'none';
    } else {
      slotData.defaultQty = 1;
    }

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        loadBundleForEditing(currentBundleId, result.data.slotId);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_createSlot(slotData);
  }

  function findEligibleProducts() {
    if (!selectedSlotId) return;

    var container = document.getElementById('eligible-products-container');
    container.innerHTML = '<div class="text-muted">Searching...</div>';

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          container.innerHTML = '<div class="text-danger">' + result.error + '</div>';
          return;
        }
        var products = result.data;
        if (!products || products.length === 0) {
          container.innerHTML = '<div class="text-muted">No eligible products found</div>';
          return;
        }

        var html = '<table class="table table-sm table-bordered">' +
          '<thead><tr><th>SKU</th><th>Name</th><th>Stock</th><th>Price</th><th></th></tr></thead>' +
          '<tbody>' +
          products.map(function(p) {
            return '<tr>' +
              '<td>' + p.sku + '</td>' +
              '<td>' + (p.nameEn || p.nameHe || '-') + '</td>' +
              '<td>' + p.stock + '</td>' +
              '<td>' + p.price + '</td>' +
              '<td><button class="btn btn-sm btn-assign-product" data-sku="' + p.sku + '">Assign</button></td>' +
              '</tr>';
          }).join('') +
          '</tbody></table>';

        container.innerHTML = html;

        container.querySelectorAll('.btn-assign-product').forEach(function(btn) {
          btn.addEventListener('click', function() {
            assignProduct(this.dataset.sku);
          });
        });
      })
      .withFailureHandler(function(err) {
        container.innerHTML = '<div class="text-danger">Failed: ' + err.message + '</div>';
      })
      .WebAppBundles_getEligibleProducts(selectedSlotId, { limit: 10, excludeExclusiveSKUs: true });
  }

  function assignProduct(sku) {
    if (!selectedSlotId) return;

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        TaskWidgets.toast('Product assigned', 'success');
        loadBundleForEditing(currentBundleId, selectedSlotId);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_assignProductToSlot(selectedSlotId, sku, 'Manual Assignment');
  }

    // Handled in modal - placeholder

  function loadProductName(sku) {
    if (!sku) return;
    google.script.run
      .withSuccessHandler(function(result) {
        var nameSpan = document.getElementById('slot-product-name');
        var priceSpan = document.getElementById('slot-product-price');
        if (!nameSpan) return;
        if (result.error || !result.data) {
          nameSpan.textContent = '(not found)';
          nameSpan.className = 'text-danger ml-2';
          if (priceSpan) priceSpan.textContent = '';
        } else {
          nameSpan.textContent = '- ' + result.data.name;
          nameSpan.className = 'text-muted ml-2';
          if (priceSpan && result.data.price) {
            priceSpan.textContent = 'Price: ₪' + result.data.price;
          }
        }
      })
      .withFailureHandler(function() {
        var nameSpan = document.getElementById('slot-product-name');
        var priceSpan = document.getElementById('slot-product-price');
        if (nameSpan) {
          nameSpan.textContent = '(error)';
          nameSpan.className = 'text-danger ml-2';
        }
        if (priceSpan) priceSpan.textContent = '';
      })
      .WebAppBundles_getProductName(sku);
  }

  function showResults(title, html) {
    document.getElementById('action-results-title').textContent = title;
    document.getElementById('action-results-body').innerHTML = html;
    document.getElementById('action-results-panel').style.display = '';

  function withButtonBusy(btn, label) {
    var originalText = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm mr-1"></span> ' + label;
    return function restore() {
      btn.disabled = false;
      btn.textContent = originalText;
    };
  }

  function updateComposition() {
    TaskWidgets.confirm('Re-derive bundle composition from WebProdM?', function() {
    var btn = document.getElementById('btn-update-composition');
    var restore = withButtonBusy(btn, 'Updating...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var r = d.reimport || {};
        var msg = 'Update Composition complete. Re-derived from WebProdM: ' + (r.imported || 0) + ' bundles imported, ' + (r.failed || 0) + ' failed, ' + (r.skipped || 0) + ' skipped.';
        showResults('Update Composition', '<p>' + TaskWidgets.escape(msg) + '</p>');
        loadStats();
        loadBundleList();
        // Inventory health panel intentionally NOT refreshed here — Composition
        // and Inventory are separate buttons; click Review Stock for inventory.
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_updateComposition();
    });
  }

  function reviewStock() {
    var btn = document.getElementById('btn-review-stock');
    var restore = withButtonBusy(btn, 'Reviewing...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var msg = 'Bundle stock review complete. Critical: ' + (d.criticalTasksCreated || 0) + ', Low inventory: ' + (d.lowInventoryTasksCreated || 0) + '.';
        showResults('Review Stock', '<p>' + TaskWidgets.escape(msg) + '</p><p class="small text-muted">Tasks created for any issues. Reload the alerts panel to see them.</p>');
        loadHealthAlerts();
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_reviewStock();
  }

  function validateParity() {
    var btn = document.getElementById('btn-validate-parity');
    var restore = withButtonBusy(btn, 'Validating...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var bundles = (d.bundles || []).filter(function(b) { return b.issueCount > 0; });
        var summary = '<p>Validated ' + (d.totalBundles || 0) + ' bundles; ' + (d.bundlesWithIssues || 0) + ' have parity issues.</p>';
        if (bundles.length === 0) {
          showResults('Validate EN/HE Parity', summary + '<p class="text-success">No drift detected.</p>');
          return;
        }
        var rows = bundles.map(function(b) {
          var issues = b.issues.map(function(iss) {
            var sec = (iss.section != null) ? ' [section ' + iss.section + ']' : '';
            return '<li><code>' + TaskWidgets.escape(iss.code) + '</code>' + sec + ' — ' + TaskWidgets.escape(iss.detail) + '</li>';
          }).join('');
          return '<tr><td>' + TaskWidgets.escape(b.bundleName || b.bundleId) + '</td><td>' + b.issueCount + '</td><td><ul class="mb-0 pl-3">' + issues + '</ul></td></tr>';
        }).join('');
        var table = '<table class="table table-sm"><thead><tr><th>Bundle</th><th>#</th><th>Issues</th></tr></thead><tbody>' + rows + '</tbody></table>';
        showResults('Validate EN/HE Parity', summary + table);
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_validateParity();
  }

  // Export: list every bundle whose ops composition != web (EN or HE), with copy-paste
  // woosb_ids cells for WPClever Import (BUNDLE_PLAN Stage 3). Direction is ops -> web.
  function exportBundles() {
    var btn = document.getElementById('btn-export-bundles');
    var restore = withButtonBusy(btn, 'Building...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var rows = d.rows || [];
        var summary = '<p>' + (d.exportCount || 0) + ' of ' + (d.total || 0) + ' bundles differ from web and need export.</p>';
        if (rows.length === 0) {
          showResults('Export Bundles', summary + '<p class="text-success">All bundles match web — nothing to export.</p>');
          return;
        }
        var html = summary +
          '<p class="small text-muted mb-2">Paste each EN/HE cell into that bundle\'s product via WPClever Import. Direction is ops &rarr; web.</p>';
        rows.forEach(function(r, i) {
          var flags = [];
          if (r.enDiff) flags.push('EN differs');
          if (r.heDiff) flags.push('HE differs');
          var warn = (r.warnings && r.warnings.length)
            ? '<div class="text-danger small mt-1">&#9888; ' + r.warnings.map(TaskWidgets.escape).join('<br>') + '</div>' : '';
          html +=
            '<div class="card mb-2"><div class="card-body p-2">' +
              '<div class="d-flex justify-content-between align-items-center">' +
                '<strong>' + TaskWidgets.escape(r.name) + '</strong>' +
                '<span class="small text-muted">' + flags.join(' &middot; ') + '</span>' +
              '</div>' + warn +
              '<label class="small mb-0 mt-1">EN</label>' +
              '<textarea readonly class="form-control form-control-sm" rows="2" id="exp-en-' + i + '">' + TaskWidgets.escape(r.en) + '</textarea>' +
              '<button class="btn btn-sm mt-1 mr-2" onclick="BundlesView.copyExport(\'exp-en-' + i + '\')">Copy EN</button>' +
              '<label class="small mb-0 mt-1">HE</label>' +
              '<textarea readonly class="form-control form-control-sm" rows="2" id="exp-he-' + i + '">' + TaskWidgets.escape(r.he) + '</textarea>' +
              '<button class="btn btn-sm mt-1" onclick="BundlesView.copyExport(\'exp-he-' + i + '\')">Copy HE</button>' +
            '</div></div>';
        });
        showResults('Export Bundles', html);
        TaskWidgets.toast('Export created for ' + (d.exportCount || 0) + ' bundle(s) — push task cleared.', 'success');
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_buildExportTable();
  }

  // Select + copy a textarea's contents (the textarea stays selected as a manual fallback).
  function copyExport(id) {
    var ta = document.getElementById(id);
    if (!ta) return;
    ta.focus();
    ta.select();
    try {
      var ok = document.execCommand('copy');
      TaskWidgets.toast(ok ? 'Copied.' : 'Selected — press Ctrl+C to copy.', ok ? 'success' : 'warning');
    } catch (e) {
      TaskWidgets.toast('Selected — press Ctrl+C to copy.', 'warning');
    }
  }


  // Initialize on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Expose for debugging
  window.BundlesView = {
    loadStats: loadStats,
    loadBundleList: loadBundleList,
    loadHealthAlerts: loadHealthAlerts,
    loadBundleForEditing: loadBundleForEditing,
    copyExport: copyExport
  };

})();
</script>
