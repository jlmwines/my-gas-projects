<div class="container-fluid">
  <!-- Section 1: Bundle Dashboard -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center" style="background: transparent;">
          <h5>Bundle Management</h5>
          <div>
            <button id="btn-update-composition" class="btn btn-sm mr-2">Update Composition</button>
            <button id="btn-review-stock" class="btn btn-sm mr-2">Review Stock</button>
            <button id="btn-validate-parity" class="btn btn-sm">Validate EN/HE Parity</button>
            <button id="btn-export-bundles" class="btn btn-sm ml-2">Export</button>
          </div>
        </div>
        <div class="card-body">
          <!-- Filter Chips (replace the old 5-stat row — ADMIN_BUNDLES_UI_PLAN Phase 1b) -->
          <div class="mb-3" id="bundle-chips-row">
            <button type="button" class="btn btn-sm mr-1 bundle-chip active" data-filter="all">All <span class="badge badge-secondary" id="chip-count-all">0</span></button>
            <button type="button" class="btn btn-sm mr-1 bundle-chip" data-filter="needs-export">Needs export <span class="badge badge-warning" id="chip-count-needs">0</span></button>
            <button type="button" class="btn btn-sm bundle-chip" data-filter="ok">OK <span class="badge badge-success" id="chip-count-ok">0</span></button>
          </div>

          <!-- Bundle List Table -->
          <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
            <table class="table table-sm table-hover" id="bundle-list-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bundle-list-body">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Section 2 (Low Inventory Alerts) REMOVED — ADMIN_BUNDLES_UI_PLAN Phase 1b §7.3. Stock is a
       subordinate advisory; the export-time out-of-stock failsafe warns, and per-bundle stock will
       surface in the 1c deficiency strip. Stage 7 suggestion view replaces it later. -->

  <!-- Section 3: Bundle Editor — single composition sheet (ADMIN_BUNDLES_UI_PLAN §7.4/§7.5).
       Hidden until a row is clicked (Phase 1c §7.3, UI_T2_1 Stage D). -->
  <div class="row" id="bundle-editor-section" style="display: none;">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Bundle Editor</h5>
          <div>
            <button id="btn-save-composition" class="btn btn-sm mr-1" disabled>Save Composition</button>
            <button id="btn-discard-draft" class="btn btn-sm mr-1" style="display:none;">Discard</button>
            <button id="btn-close-editor" class="btn btn-sm">Close</button>
          </div>
        </div>
        <div class="card-body">
          <!-- Deficiency strip (Phase 1c): what changed / status; grows with Stage 7 (Phase 4) -->
          <div id="editor-deficiency-strip" class="mb-2"></div>

          <!-- Header strip (§7.4): names / status / type badge / price summary. Discount is
               WC-managed (§7.1c) — shown only as part of the read-only price summary, never edited. -->
          <div class="form-row align-items-end mb-3" id="editor-header-strip">
            <div class="col-md-3">
              <label class="small text-muted mb-1">Name (English)</label>
              <input type="text" class="form-control form-control-sm" id="hdr-nameEn">
            </div>
            <div class="col-md-3">
              <label class="small text-muted mb-1">Name (Hebrew)</label>
              <input type="text" class="form-control form-control-sm" id="hdr-nameHe" dir="rtl">
            </div>
            <div class="col-md-2">
              <label class="small text-muted mb-1">Status</label>
              <select class="form-control form-control-sm" id="hdr-status">
                <option value="Active">Active</option>
                <option value="Draft">Draft</option>
                <option value="Archived">Archived</option>
              </select>
            </div>
            <div class="col-md-4">
              <div class="small text-muted mb-1">Type <span class="badge badge-secondary" id="hdr-type">-</span></div>
              <div id="hdr-price" class="small font-weight-bold"></div>
            </div>
          </div>

          <!-- One ordered composition list (§7.4): text headers + product rows -->
          <div id="composition-list"></div>

          <div class="mt-2">
            <button id="btn-add-text" class="btn btn-sm mr-1">+ Add Text</button>
            <button id="btn-add-product" class="btn btn-sm">+ Add Product</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Parity / Stock results panel -->
<div class="card mb-3" id="action-results-panel" style="display:none;">
  <div class="card-header" style="background: transparent;">
    <span id="action-results-title" class="font-weight-bold"></span>
    <button type="button" class="close" onclick="document.getElementById('action-results-panel').style.display='none'">&times;</button>
  </div>
  <div class="card-body" id="action-results-body"></div>
</div>

<script>
(function() {
  'use strict';

  // State
  var currentBundleId = null;
  var currentBundle = null;      // last backend-loaded bundle (type/price baseline)
  var selectedSlotId = null;
  var healthData = [];
  var selectedReplacements = [];
  var categoryOptions = [];
  var pushBundleIds = [];        // bundleIds needing export (from cached push_status) — Phase 1b
  var currentFilter = 'all';     // active chip: all | needs-export | ok

  // Composition-sheet draft (§7.5): the working copy. Edits mutate `draft`; nothing commits until
  // Save Composition. `draft.slots[]` are in display order; deleted rows stay (struck) until save.
  var draft = null;              // { header:{nameEn,nameHe,status}, type, price:{...}, slots:[...] }
  var draftDirty = false;
  var clientIdSeq = 1;           // local row identity (new rows have no slotId yet)
  var pickerCid = null;          // composition row the picker is currently targeting
  var pickerProducts = [];       // last eligible-product fetch (for the client-side search filter)
  var DRAFT_KEY_PREFIX = 'jlmops.bundleCompDraft.v1.';  // sessionStorage key per bundle (A0)

  // =================================================================================
  // INITIALIZATION
  // =================================================================================

  function init() {
    bindEvents();  // wire handlers before data arrives; clicks on not-yet-rendered rows no-op
    // Single consolidated round-trip (T3.3): replaces the 4-call init fanout.
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          console.error('init failed:', res && res.error);
          return;
        }
        applyInitData(res.data);
      })
      .withFailureHandler(function(err) {
        console.error('init call failed:', err);
      })
      .WebAppBundles_getViewData();
  }

  // Dispatch the consolidated init payload to each loader; each skips its own fetch.
  // (Phase 1b: stats row + alerts panel removed; chips/list are driven by bundles + pushStatus.)
  function applyInitData(data) {
    var ps = data.pushStatus || { count: 0, bundleIds: [] };
    pushBundleIds = (ps.bundleIds || []).map(String);
    loadCategories(data.categories);
    loadBundleList(data.bundles);
  }

  function loadCategories(preloadedData) {
    if (preloadedData !== undefined) {
      categoryOptions = preloadedData || [];
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result.error && result.data) {
          categoryOptions = result.data;
        }
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load categories:', err);
      })
      .WebAppBundles_getCategories();
  }

  function bindEvents() {
    document.getElementById('btn-update-composition').addEventListener('click', updateComposition);
    document.getElementById('btn-review-stock').addEventListener('click', reviewStock);
    document.getElementById('btn-validate-parity').addEventListener('click', validateParity);
    document.getElementById('btn-export-bundles').addEventListener('click', exportBundles);
    document.querySelectorAll('.bundle-chip').forEach(function(chip) {
      chip.addEventListener('click', function() { setFilter(chip.dataset.filter); });
    });
    // Editor (composition sheet)
    document.getElementById('btn-close-editor').addEventListener('click', closeEditor);
    document.getElementById('btn-save-composition').addEventListener('click', saveComposition);
    document.getElementById('btn-discard-draft').addEventListener('click', discardDraft);
    document.getElementById('btn-add-text').addEventListener('click', addTextSlot);
    document.getElementById('btn-add-product').addEventListener('click', addProductSlot);

    // Header strip → draft
    ['hdr-nameEn', 'hdr-nameHe', 'hdr-status'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', onHeaderInput);
      document.getElementById(id).addEventListener('change', onHeaderInput);
    });

    // Product picker modal
    document.getElementById('btn-picker-close').addEventListener('click', closePicker);
    document.getElementById('btn-picker-cancel').addEventListener('click', closePicker);
    document.getElementById('picker-search').addEventListener('input', renderPickerResults);

    // Desktop seatbelt (§7.5): warn before leaving with unsaved composition edits.
    window.addEventListener('beforeunload', function(e) {
      if (draftDirty) { e.preventDefault(); e.returnValue = ''; return ''; }
    });
  }

  // =================================================================================
  // DASHBOARD
  // =================================================================================

  function loadStats(preloadedData) {
    // Phase 1b: the 5-stat row was replaced by filter chips. Stat elements no longer exist, so
    // this (and its leftover callers in slot/composition handlers) is a safe no-op.
    if (!document.getElementById('stat-total')) return;
    if (preloadedData !== undefined) {
      renderStats(preloadedData);
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          console.error('Error loading stats:', result.error);
          return;
        }
        renderStats(result.data);
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load stats:', err);
      })
      .WebAppBundles_getStats();
  }

  function renderStats(stats) {
    if (!stats || typeof stats.total === 'undefined') return;  // skip empty/error payloads
    document.getElementById('stat-total').textContent = stats.total;
    document.getElementById('stat-active').textContent = stats.active;
    document.getElementById('stat-draft').textContent = stats.draft;
    document.getElementById('stat-archived').textContent = stats.archived;
    // Attention counter is owned by the lazy health path (renderHealthAlerts); the mount's
    // lightweight stats payload omits it, so only set it when a caller provides the counts.
    if (typeof stats.needsAttention !== 'undefined') {
      document.getElementById('stat-attention').textContent = stats.needsAttention + ' bundles (' + stats.lowInventoryCount + ' slots)';
    }
  }

  function loadBundleList(preloadedData) {
    if (preloadedData !== undefined) {
      renderBundleList(preloadedData);
      return;
    }
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          console.error('Error loading bundles:', result.error);
          return;
        }
        renderBundleList(result.data);
      })
      .withFailureHandler(function(err) {
        console.error('Failed to load bundles:', err);
      })
      .WebAppBundles_getAllBundles();
  }

  function renderBundleList(bundles) {
    var tbody = document.getElementById('bundle-list-body');
    if (!bundles || bundles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">No bundles found</td></tr>';
      updateChipCounts(0, 0);
      return;
    }

    // Mark needs-export from the cached push_status, then pin those rows to the top (Phase 1b §7.3).
    var marked = bundles.map(function(b) {
      return { b: b, needsPush: pushBundleIds.indexOf(String(b.bundleId)) !== -1 };
    });
    marked.sort(function(x, y) { return (y.needsPush ? 1 : 0) - (x.needsPush ? 1 : 0); });

    var needsCount = 0;
    var html = marked.map(function(m) {
      var b = m.b;
      if (m.needsPush) needsCount++;
      var statusClass = b.status === 'Active' ? 'badge-success' : (b.status === 'Draft' ? 'badge-warning' : 'badge-secondary');
      var priceHtml = '-';
      if (b.totalPrice > 0) {
        priceHtml = (b.discount > 0)
          ? '<span class="text-muted" style="text-decoration: line-through; font-size: 0.85em;">' + b.totalPrice + '</span> <strong>' + b.displayPrice + '</strong>'
          : b.displayPrice;
      }
      var nameCell = '<strong>' + (b.nameEn || '-') + '</strong>' +
        (b.nameHe ? '<div class="bundle-name-he">' + b.nameHe + '</div>' : '');
      var pushBadge = m.needsPush ? ' <span class="badge badge-warning">Needs Push</span>' : '';
      return '<tr data-bundle-id="' + b.bundleId + '" data-state="' + (m.needsPush ? 'needs-export' : 'ok') + '" style="cursor: pointer;">' +
        '<td>' + nameCell + '</td>' +
        '<td>' + (b.type || 'Bundle') + '</td>' +
        '<td><span class="badge ' + statusClass + '">' + b.status + '</span>' + pushBadge + '</td>' +
        '<td>' + priceHtml + '</td>' +
        '<td><button class="btn btn-sm btn-edit-bundle">Edit</button></td>' +
        '</tr>';
    }).join('');

    tbody.innerHTML = html;

    // Row click anywhere opens the editor in place (Phase 1c §7.3). The Edit button is now just
    // a visual affordance — its click bubbles to the row handler.
    tbody.querySelectorAll('tr').forEach(function(row) {
      if (!row.dataset.bundleId) return;
      row.addEventListener('click', function() {
        selectBundleRow(row);
        loadBundleForEditing(row.dataset.bundleId);
      });
    });

    updateChipCounts(bundles.length, needsCount);
    applyFilter();
  }

  function selectBundleRow(row) {
    document.querySelectorAll('#bundle-list-body tr').forEach(function(r) {
      r.classList.remove('bundle-row-selected');
    });
    if (row) row.classList.add('bundle-row-selected');
  }

  // Deficiency strip atop the editor (Phase 1c). v1 = push status; grows with Stage 7 (Phase 4).
  function renderDeficiencyStrip(bundle) {
    var strip = document.getElementById('editor-deficiency-strip');
    if (!strip) return;
    var needsPush = pushBundleIds.indexOf(String(bundle.bundleId)) !== -1;
    if (needsPush) {
      strip.innerHTML = '<div class="alert alert-warning py-2 mb-0">&#9888; Differs from web — export pending.</div>';
    } else {
      strip.innerHTML = '<div class="alert alert-success py-2 mb-0">&#10003; Matches web — nothing to export.</div>';
    }
  }

  function closeEditor() {
    if (draftDirty && !window.confirm('Discard unsaved composition changes?')) return;
    if (currentBundleId) clearDraft(currentBundleId);
    var section = document.getElementById('bundle-editor-section');
    if (section) section.style.display = 'none';
    selectBundleRow(null);
    currentBundleId = null;
    currentBundle = null;
    draft = null;
    draftDirty = false;
    setSaveEnabled(false);
  }

  // ---- Filter chips (Phase 1b) -------------------------------------------------
  function updateChipCounts(total, needs) {
    document.getElementById('chip-count-all').textContent = total;
    document.getElementById('chip-count-needs').textContent = needs;
    document.getElementById('chip-count-ok').textContent = total - needs;
  }

  function setFilter(filter) {
    currentFilter = filter || 'all';
    document.querySelectorAll('.bundle-chip').forEach(function(chip) {
      chip.classList.toggle('active', chip.dataset.filter === currentFilter);
    });
    applyFilter();
  }

  function applyFilter() {
    document.querySelectorAll('#bundle-list-body tr').forEach(function(row) {
      if (!row.dataset.state) return;  // skip the "no bundles" placeholder row
      var show = currentFilter === 'all' || row.dataset.state === currentFilter;
      row.style.display = show ? '' : 'none';
    });
  }

  // =================================================================================
  // HEALTH MONITOR
  // =================================================================================

  function loadHealthAlerts(preloadedData) {
    // DISABLED 2026-06-07: getBundlesWithLowInventory is slow and the low-inventory alerts panel
    // is being retired (ADMIN_BUNDLES_UI_PLAN §7.3 — its content folds into the per-bundle
    // deficiency strip / Stage 7 suggestion view). No-op to keep the Bundles view fast for
    // export testing. Re-enable only if the panel is intentionally restored.
    var el = document.getElementById('health-alerts-container');
    if (el) el.innerHTML = '<div class="text-muted small mb-0">Low-inventory alerts disabled (panel being retired — see ADMIN_BUNDLES_UI_PLAN.md §7.3).</div>';
  }

  function renderHealthAlerts(data) {
    var container = document.getElementById('health-alerts-container');
    selectedReplacements = [];

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="text-success">All bundle slots have adequate inventory</div>';
      document.getElementById('btn-apply-replacements').disabled = true;
      document.getElementById('stat-attention').textContent = '0 bundles (0 slots)';
      return;
    }

    // Fill the stats-card attention counter from the (lazily fetched) health data — the
    // mount stats payload omits it so the view can open fast.
    var totalLowSlots = data.reduce(function(sum, b) {
      return sum + (b.lowStockSlots ? b.lowStockSlots.length : 0);
    }, 0);
    document.getElementById('stat-attention').textContent = data.length + ' bundles (' + totalLowSlots + ' slots)';

    var html = data.map(function(bundleData) {
      var bundle = bundleData.bundle;
      var slots = bundleData.lowStockSlots;

      var slotsHtml = slots.map(function(slotInfo) {
        var slot = slotInfo.slot;
        var suggestions = slotInfo.suggestions || [];
        var suggestionsHtml = suggestions.length > 0 ?
          '<select class="form-control form-control-sm replacement-select" data-slot-id="' + slot.slotId + '">' +
            '<option value="">Select replacement...</option>' +
            suggestions.map(function(s) {
              return '<option value="' + s.sku + '">' + (s.nameEn || s.nameHe || s.sku) + ' (Stock: ' + s.stock + ', ' + s.price + ')</option>';
            }).join('') +
          '</select>' :
          '<span class="text-muted">No eligible replacements</span>';

        return '<tr>' +
          '<td>' + slot.order + '</td>' +
          '<td>' + slotInfo.currentSKU + '</td>' +
          '<td>' + (slotInfo.product ? (slotInfo.product.nameEn || slotInfo.product.nameHe || '-') : '-') + '</td>' +
          '<td class="text-danger font-weight-bold">' + slotInfo.stock + '</td>' +
          '<td>' + suggestionsHtml + '</td>' +
          '<td><a href="#" class="btn-edit-slot" data-bundle-id="' + bundle.bundleId + '" data-slot-id="' + slot.slotId + '">Edit</a></td>' +
          '</tr>';
      }).join('');

      return '<div class="mb-3">' +
        '<h6>' + (bundle.nameEn || bundle.bundleId) + ' <span class="badge badge-danger">' + slots.length + ' low stock</span></h6>' +
        '<table class="table table-sm table-bordered" style="table-layout: fixed;">' +
          '<colgroup>' +
            '<col style="width: 40px;">' +
            '<col style="width: 120px;">' +
            '<col style="width: 250px;">' +
            '<col style="width: 50px;">' +
            '<col style="width: 180px;">' +
            '<col style="width: 40px;">' +
          '</colgroup>' +
          '<thead><tr><th>#</th><th>SKU</th><th>Product</th><th>Stock</th><th>Replacement</th><th></th></tr></thead>' +
          '<tbody>' + slotsHtml + '</tbody>' +
        '</table>' +
      '</div>';
    }).join('');

    container.innerHTML = html;
    document.getElementById('btn-apply-replacements').disabled = false;

    // Bind replacement select handlers
    container.querySelectorAll('.replacement-select').forEach(function(select) {
      select.addEventListener('change', function() {
        updateSelectedReplacements();
      });
    });

    // Bind edit slot links
    container.querySelectorAll('.btn-edit-slot').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        loadBundleForEditing(this.dataset.bundleId, this.dataset.slotId);
      });
    });
  }

  function updateSelectedReplacements() {
    selectedReplacements = [];
    document.querySelectorAll('.replacement-select').forEach(function(select) {
      if (select.value) {
        selectedReplacements.push({
          slotId: select.dataset.slotId,
          sku: select.value,
          reason: 'Low Stock Replacement'
        });
      }
    });
    document.getElementById('btn-apply-replacements').disabled = selectedReplacements.length === 0;
  }

  function applyReplacements() {
    if (selectedReplacements.length === 0) return;

    TaskWidgets.confirm('Apply ' + selectedReplacements.length + ' replacement(s)?', function() {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error: ' + result.error, 'error');
          return;
        }
        TaskWidgets.toast('Applied ' + result.data.successCount + ' replacements, ' + result.data.failCount + ' failed.', 'success');
        loadHealthAlerts();
        loadStats(); // Refresh needs attention count
        if (currentBundleId) {
          loadBundleForEditing(currentBundleId);
        }
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed to apply replacements: ' + err.message, 'error');
      })
      .WebAppBundles_applyReplacements(selectedReplacements);
    });
  }

  // =================================================================================
  // BUNDLE EDITOR
  // =================================================================================

  // -- small escapers (TaskWidgets.escape handles &<>; escAttr also neutralizes quotes) ----------
  function esc(s) { return TaskWidgets.escape(String(s == null ? '' : s)); }
  function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }

  function setSaveEnabled(on) {
    var btn = document.getElementById('btn-save-composition');
    if (btn) btn.disabled = !on;
    var discard = document.getElementById('btn-discard-draft');
    if (discard) discard.style.display = on ? 'inline-block' : 'none';
  }

  function markDirty() {
    draftDirty = true;
    setSaveEnabled(true);
    persistDraft();
  }

  // ---- sessionStorage draft mirror (A0, RELOAD_RESILIENCE_PLAN §4.A0) ------------
  function draftKey(bundleId) { return DRAFT_KEY_PREFIX + bundleId; }
  function persistDraft() {
    if (!currentBundleId || !draft) return;
    try { sessionStorage.setItem(draftKey(currentBundleId), JSON.stringify(draft)); }
    catch (e) { /* storage blocked: degrade silently, the DOM still holds the draft */ }
  }
  function clearDraft(bundleId) { try { sessionStorage.removeItem(draftKey(bundleId)); } catch (e) {} }
  function restoreDraft(bundleId) {
    try { var raw = sessionStorage.getItem(draftKey(bundleId)); return raw ? JSON.parse(raw) : null; }
    catch (e) { return null; }
  }

  // ---- load + build draft -------------------------------------------------------
  function loadBundleForEditing(bundleId) {
    currentBundleId = String(bundleId);
    showEditorLoading();
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          TaskWidgets.toast('Error loading bundle: ' + result.error, 'error');
          return;
        }
        currentBundle = result.data;
        // Rehydrate an in-progress draft (same-tab reload / re-open) if one survives in storage.
        var saved = restoreDraft(currentBundleId);
        if (saved && saved.slots) {
          draft = saved;
          draftDirty = true;
          var maxCid = saved.slots.reduce(function(m, r) { return Math.max(m, Number(r.cid) || 0); }, 0);
          clientIdSeq = Math.max(clientIdSeq, maxCid + 1);
        } else {
          draft = buildDraftFromBundle(result.data);
          draftDirty = false;
        }
        renderEditor();
        setSaveEnabled(draftDirty);
      })
      .withFailureHandler(function(err) {
        TaskWidgets.toast('Failed to load bundle: ' + err.message, 'error');
      })
      .WebAppBundles_getBundleWithSlots(bundleId);
  }

  // Immediate feedback on row-click: reveal the editor with a spinner while getBundleWithSlots
  // round-trips (the clicked row is already highlighted by selectBundleRow).
  function showEditorLoading() {
    var section = document.getElementById('bundle-editor-section');
    if (section) section.style.display = '';
    var strip = document.getElementById('editor-deficiency-strip');
    if (strip) strip.innerHTML = '';
    ['hdr-nameEn', 'hdr-nameHe'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('hdr-type').textContent = '-';
    document.getElementById('hdr-price').textContent = '';
    setSaveEnabled(false);
    var list = document.getElementById('composition-list');
    if (list) list.innerHTML = '<div class="text-center text-muted py-4"><span class="spinner-border spinner-border-sm mr-2"></span>Loading bundle…</div>';
  }

  function buildDraftFromBundle(b) {
    return {
      header: { nameEn: b.nameEn || '', nameHe: b.nameHe || '', status: b.status || 'Draft' },
      type: b.type || 'Bundle',
      price: { totalPrice: b.totalPrice || 0, discount: b.discount || 0, displayPrice: b.displayPrice || 0 },
      slots: (b.slots || []).map(slotToDraftRow)
    };
  }

  function slotToDraftRow(s) {
    return {
      cid: clientIdSeq++,
      slotId: s.slotId || '',
      slotType: s.slotType || 'Product',
      textStyle: s.textStyle || 'none',
      textEn: s.textEn || '',
      textHe: s.textHe || '',
      activeSKU: s.activeSKU || '',
      productName: s.productName || '',
      productPrice: (s.productPrice != null ? s.productPrice : 0),
      profitRate: (s.profitRate != null ? s.profitRate : null),
      category: s.category || '',
      category2: s.category2 || '',
      priceMin: (s.priceMin != null ? s.priceMin : null),
      priceMax: (s.priceMax != null ? s.priceMax : null),
      intensity: (s.intensity != null ? s.intensity : null),
      complexity: (s.complexity != null ? s.complexity : null),
      acidity: (s.acidity != null ? s.acidity : null),
      nameContains: s.nameContains || '',
      exclusive: !!s.exclusive,
      qtyVariable: !!s.qtyVariable,
      defaultQty: (s.defaultQty != null ? s.defaultQty : 1),
      _deleted: false,
      _open: false
    };
  }

  function blankRow(type) {
    return {
      cid: clientIdSeq++, slotId: '', slotType: type, textStyle: 'none', textEn: '', textHe: '',
      activeSKU: '', productName: '', productPrice: 0, profitRate: null, category: '', category2: '',
      priceMin: null, priceMax: null, intensity: null, complexity: null, acidity: null, nameContains: '',
      exclusive: false, qtyVariable: false, defaultQty: 1, _deleted: false, _open: false
    };
  }

  function findRow(cid) {
    return draft && draft.slots.find(function(r) { return String(r.cid) === String(cid); });
  }

  // ---- render -------------------------------------------------------------------
  function renderEditor() {
    var section = document.getElementById('bundle-editor-section');
    if (section) section.style.display = '';
    renderDeficiencyStrip({ bundleId: currentBundleId });
    renderHeaderStrip();
    renderComposition();
  }

  function renderHeaderStrip() {
    document.getElementById('hdr-nameEn').value = draft.header.nameEn;
    document.getElementById('hdr-nameHe').value = draft.header.nameHe;
    document.getElementById('hdr-status').value = draft.header.status;
    document.getElementById('hdr-type').textContent = draft.type || '-';
    renderPriceSummary();
  }

  // Price = backend figures from the last load/save (BundleService._calculateBundlePrice; qty-0
  // contributes 0). Discount is WC-managed (§7.1c) — read-only here. Re-derived server-side on save,
  // so it reflects the saved composition, not live unsaved edits.
  function renderPriceSummary() {
    var p = draft.price || {};
    var el = document.getElementById('hdr-price');
    var total = p.totalPrice || 0, disc = p.discount || 0, disp = p.displayPrice || 0;
    if (total > 0 || disp > 0) {
      el.textContent = (disc > 0)
        ? 'Total ₪' + total.toFixed(0) + ' · Discount ₪' + disc.toFixed(0) + ' · Final ₪' + disp.toFixed(0)
        : 'Total ₪' + (total > 0 ? total : disp).toFixed(0);
    } else {
      el.textContent = '';
    }
  }

  function onHeaderInput() {
    if (!draft) return;
    draft.header.nameEn = document.getElementById('hdr-nameEn').value;
    draft.header.nameHe = document.getElementById('hdr-nameHe').value;
    draft.header.status = document.getElementById('hdr-status').value;
    markDirty();
  }

  var TEXT_STYLES = ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'span', 'none'];

  function renderComposition() {
    var list = document.getElementById('composition-list');
    if (!draft.slots.length) {
      list.innerHTML = '<div class="text-muted p-2">Empty — add a text header or a product below.</div>';
      return;
    }
    var n = 0;
    list.innerHTML = draft.slots.map(function(r, idx) {
      if (!r._deleted) n++;
      var num = r._deleted ? '' : n;
      return r.slotType === 'Text' ? renderTextRow(r, num, idx) : renderProductRow(r, num, idx);
    }).join('');
    bindCompositionEvents();
  }

  function delOrUndo(r) {
    return r._deleted
      ? '<button class="btn btn-sm btn-undo" data-cid="' + r.cid + '">Undo</button>'
      : '<button class="btn btn-sm btn-del" data-cid="' + r.cid + '">Delete</button>';
  }

  function moveBtns(r, idx) {
    return '<button class="btn btn-sm btn-move" data-cid="' + r.cid + '" data-dir="up"' + (idx === 0 ? ' disabled' : '') + '>&uarr;</button>' +
           '<button class="btn btn-sm btn-move mr-2" data-cid="' + r.cid + '" data-dir="down"' + (idx === draft.slots.length - 1 ? ' disabled' : '') + '>&darr;</button>';
  }

  function renderTextRow(r, n, idx) {
    var styleOpts = TEXT_STYLES.map(function(s) {
      return '<option value="' + s + '"' + (r.textStyle === s ? ' selected' : '') + '>' + s.toUpperCase() + '</option>';
    }).join('');
    return '<div class="comp-row text-row' + (r._deleted ? ' deleted' : '') + '" data-cid="' + r.cid + '">' +
      '<div class="d-flex align-items-center comp-main">' +
        '<span class="comp-num">' + (n || '') + '</span>' +
        moveBtns(r, idx) +
        '<span class="badge badge-light mr-2">Text</span>' +
        '<select class="form-control form-control-sm fld-textStyle mr-2" data-cid="' + r.cid + '" style="width:72px;">' + styleOpts + '</select>' +
        '<input class="form-control form-control-sm fld-textEn mr-1" data-cid="' + r.cid + '" placeholder="Header (EN)" value="' + escAttr(r.textEn) + '">' +
        '<input class="form-control form-control-sm fld-textHe mr-2" data-cid="' + r.cid + '" dir="rtl" placeholder="Header (HE)" value="' + escAttr(r.textHe) + '">' +
        delOrUndo(r) +
      '</div>' +
    '</div>';
  }

  // Collapsed product row = read-only data only (name · SKU · price · % · qty · flexible), spread
  // across the row. ALL editing — Replace, quantity, flexibility, criteria — lives in Details.
  function renderProductRow(r, n, idx) {
    var priceStr = r.productPrice ? '₪' + Number(r.productPrice).toFixed(0) : '—';
    var pctStr = (r.profitRate !== null && r.profitRate !== undefined) ? Math.round(r.profitRate * 100) + '%' : '—';
    var flexStr = r.qtyVariable ? '<span class="badge badge-info">Flexible</span>' : '<span class="text-muted">—</span>';
    var nameHtml = r.activeSKU
      ? '<strong>' + esc(r.productName || '(unknown product)') + '</strong>' +
        ' <span class="text-muted small">' + esc(r.activeSKU) + '</span>'
      : '<span class="text-warning">No product selected</span>';
    return '<div class="comp-row' + (r._deleted ? ' deleted' : '') + '" data-cid="' + r.cid + '">' +
      '<div class="d-flex align-items-center comp-main">' +
        '<span class="comp-num">' + (n || '') + '</span>' +
        moveBtns(r, idx) +
        '<div class="flex-grow-1 mr-2 text-truncate">' + nameHtml + '</div>' +
        '<div class="comp-cell text-right mr-3" style="width:60px;" title="Retail price">' + priceStr + '</div>' +
        '<div class="comp-cell text-right mr-3" style="width:42px;" title="Profit rate">' + pctStr + '</div>' +
        '<div class="comp-cell text-center mr-3" style="width:42px;" title="Quantity">&times;' + Number(r.defaultQty) + '</div>' +
        '<div class="comp-cell text-center mr-3" style="width:72px;">' + flexStr + '</div>' +
        '<button class="btn btn-sm mr-1 btn-crit" data-cid="' + r.cid + '" title="Edit: replace product, quantity, flexibility, criteria">Details ' + (r._open ? '&#9662;' : '&#9656;') + '</button>' +
        delOrUndo(r) +
      '</div>' +
      renderDetails(r) +
    '</div>';
  }

  function catOptions(sel) {
    return '<option value="">-- None --</option>' + categoryOptions.map(function(c) {
      return '<option value="' + escAttr(c) + '"' + (sel === c ? ' selected' : '') + '>' + esc(c) + '</option>';
    }).join('');
  }

  // Details = the product slot's edit surface. Replace control + quantity (plain integer) + Flexible
  // + selection criteria, content-sized (no Bootstrap grid columns — those stretched every input).
  function renderDetails(r) {
    if (!r._open) return '';
    function n(v) { return (v !== null && v !== undefined) ? v : ''; }
    var cid = r.cid;
    function fld(label, inner) { return '<div><label>' + label + '</label>' + inner + '</div>'; }
    function numAttr(cls, val) {
      return '<input type="number" min="1" max="5" class="form-control form-control-sm ' + cls + '" data-cid="' + cid + '" value="' + val + '" style="width:46px;">';
    }
    function chk(cls, idPfx, on, label, title) {
      return '<div class="form-check"><input type="checkbox" class="form-check-input ' + cls + '" id="' + idPfx + cid + '" data-cid="' + cid + '"' + (on ? ' checked' : '') + '><label class="form-check-label" for="' + idPfx + cid + '"' + (title ? ' title="' + title + '"' : '') + '>' + label + '</label></div>';
    }
    return '<div class="crit-grid mt-2 pt-2 border-top d-flex flex-wrap align-items-end" data-cid="' + cid + '" style="gap:6px 12px;">' +
      fld('Quantity', '<input type="number" min="0" class="form-control form-control-sm fld-qty" data-cid="' + cid + '" value="' + Number(r.defaultQty) + '" style="width:64px;">') +
      '<div class="align-self-center">' + chk('fld-qtyVariable', 'qv-', r.qtyVariable, 'Flexible', 'Customer can vary the quantity / member is optional (WPClever ‘optional’)') + '</div>' +
      fld('Category', '<select class="form-control form-control-sm fld-category" data-cid="' + cid + '" style="width:150px;">' + catOptions(r.category) + '</select>') +
      fld('Category 2', '<select class="form-control form-control-sm fld-category2" data-cid="' + cid + '" style="width:150px;">' + catOptions(r.category2) + '</select>') +
      fld('Price min', '<input type="number" class="form-control form-control-sm fld-priceMin" data-cid="' + cid + '" value="' + n(r.priceMin) + '" style="width:64px;">') +
      fld('Price max', '<input type="number" class="form-control form-control-sm fld-priceMax" data-cid="' + cid + '" value="' + n(r.priceMax) + '" style="width:64px;">') +
      fld('Intensity', numAttr('fld-intensity', n(r.intensity))) +
      fld('Complexity', numAttr('fld-complexity', n(r.complexity))) +
      fld('Acidity', numAttr('fld-acidity', n(r.acidity))) +
      fld('Name contains', '<input type="text" class="form-control form-control-sm fld-nameContains" data-cid="' + cid + '" value="' + escAttr(r.nameContains) + '" style="width:150px;">') +
      '<div class="align-self-center">' + chk('fld-exclusive', 'ex-', r.exclusive, 'Exclusive') + '</div>' +
      // Replace shares the Details row, pushed to the right end (margin-left:auto).
      '<div class="align-self-center" style="margin-left:auto;"><button class="btn btn-sm btn-pick" data-cid="' + cid + '">' + (r.activeSKU ? 'Replace product' : 'Choose product') + '</button></div>' +
    '</div>';
  }

  // ---- per-row event wiring -----------------------------------------------------
  function bindCompositionEvents() {
    var list = document.getElementById('composition-list');

    // Text/criteria field edits write to the draft WITHOUT re-rendering (keeps input focus).
    bindField(list, '.fld-textStyle', 'change', 'textStyle', strVal);
    bindField(list, '.fld-textEn', 'input', 'textEn', strVal);
    bindField(list, '.fld-textHe', 'input', 'textHe', strVal);
    bindField(list, '.fld-category', 'change', 'category', strVal);
    bindField(list, '.fld-category2', 'change', 'category2', strVal);
    bindField(list, '.fld-priceMin', 'input', 'priceMin', numVal);
    bindField(list, '.fld-priceMax', 'input', 'priceMax', numVal);
    bindField(list, '.fld-intensity', 'input', 'intensity', intVal);
    bindField(list, '.fld-complexity', 'input', 'complexity', intVal);
    bindField(list, '.fld-acidity', 'input', 'acidity', intVal);
    bindField(list, '.fld-nameContains', 'input', 'nameContains', strVal);
    bindField(list, '.fld-exclusive', 'change', 'exclusive', boolVal);

    // Quantity (plain integer in Details) + Flexible both surface in the collapsed read-only row,
    // so they re-render on change to keep that summary current.
    list.querySelectorAll('.fld-qty').forEach(function(el) {
      el.addEventListener('change', function() {
        var r = findRow(el.dataset.cid); if (!r) return;
        var v = parseInt(el.value, 10);
        r.defaultQty = (isNaN(v) || v < 0) ? 0 : v;
        markDirty(); renderComposition();
      });
    });
    list.querySelectorAll('.fld-qtyVariable').forEach(function(el) {
      el.addEventListener('change', function() {
        var r = findRow(el.dataset.cid); if (!r) return;
        r.qtyVariable = el.checked;
        markDirty(); renderComposition();
      });
    });

    // Structural buttons → mutate draft + re-render.
    list.querySelectorAll('.btn-move').forEach(function(b) {
      b.addEventListener('click', function() { if (!b.disabled) moveRow(b.dataset.cid, b.dataset.dir); });
    });
    list.querySelectorAll('.btn-crit').forEach(function(b) {
      b.addEventListener('click', function() { toggleCriteria(b.dataset.cid); });
    });
    list.querySelectorAll('.btn-del').forEach(function(b) {
      b.addEventListener('click', function() { setDeleted(b.dataset.cid, true); });
    });
    list.querySelectorAll('.btn-undo').forEach(function(b) {
      b.addEventListener('click', function() { setDeleted(b.dataset.cid, false); });
    });
    list.querySelectorAll('.btn-pick').forEach(function(b) {
      b.addEventListener('click', function() { openPicker(b.dataset.cid); });
    });
  }

  function bindField(list, sel, evt, field, conv) {
    list.querySelectorAll(sel).forEach(function(el) {
      el.addEventListener(evt, function() {
        var r = findRow(el.dataset.cid); if (!r) return;
        r[field] = conv(el);
        markDirty();
      });
    });
  }
  function strVal(el) { return el.value; }
  function numVal(el) { return el.value === '' ? null : parseFloat(el.value); }
  function intVal(el) { return el.value === '' ? null : parseInt(el.value, 10); }
  function boolVal(el) { return el.checked; }

  // ---- structural mutations -----------------------------------------------------
  function moveRow(cid, dir) {
    var i = draft.slots.findIndex(function(r) { return String(r.cid) === String(cid); });
    if (i === -1) return;
    var j = dir === 'up' ? i - 1 : i + 1;
    if (j < 0 || j >= draft.slots.length) return;
    var tmp = draft.slots[i]; draft.slots[i] = draft.slots[j]; draft.slots[j] = tmp;
    markDirty(); renderComposition();
  }
  function toggleCriteria(cid) {
    var r = findRow(cid); if (!r) return;
    r._open = !r._open;
    renderComposition();  // UI-only; not a draft mutation
  }
  function setDeleted(cid, val) {
    var r = findRow(cid); if (!r) return;
    r._deleted = val;
    markDirty(); renderComposition();
  }
  function addTextSlot() {
    if (!draft) return;
    draft.slots.push(blankRow('Text'));
    markDirty(); renderComposition();
  }
  function addProductSlot() {
    if (!draft) return;
    var row = blankRow('Product');
    draft.slots.push(row);
    markDirty(); renderComposition();
    openPicker(row.cid);  // a new product row wants a product immediately
  }

  // ---- product picker (ModalOverlay over getEligibleProducts; §7.4) -------------
  function openPicker(cid) {
    var r = findRow(cid); if (!r || r.slotType !== 'Product') return;
    pickerCid = cid;
    document.getElementById('picker-search').value = '';
    document.getElementById('picker-results').innerHTML = '<div class="text-center text-muted py-3"><span class="spinner-border spinner-border-sm mr-2"></span>Loading products…</div>';
    document.getElementById('product-picker-modal').style.display = 'flex';

    // The row may be new or have unsaved criteria, so pass a draftSlot (backend uses it directly
    // instead of resolving by slotId) + the SKUs already chosen in other live draft rows to exclude.
    var draftSlot = {
      slotType: 'Product', bundleId: currentBundleId, slotId: r.slotId || ('draft-' + r.cid),
      category: r.category || '', category2: r.category2 || '',
      priceMin: r.priceMin, priceMax: r.priceMax,
      intensity: r.intensity, complexity: r.complexity, acidity: r.acidity,
      nameContains: '', exclusive: !!r.exclusive
    };
    var excludeSKUs = draft.slots.filter(function(o) {
      return o.cid !== r.cid && !o._deleted && o.slotType === 'Product' && o.activeSKU;
    }).map(function(o) { return o.activeSKU; });

    google.script.run
      .withSuccessHandler(function(res) {
        if (res.error) { document.getElementById('picker-results').innerHTML = '<div class="text-danger">' + esc(res.error) + '</div>'; return; }
        pickerProducts = res.data || [];
        renderPickerResults();
      })
      .withFailureHandler(function(err) {
        document.getElementById('picker-results').innerHTML = '<div class="text-danger">Failed: ' + esc(err.message) + '</div>';
      })
      .WebAppBundles_getEligibleProducts(r.slotId || '', { limit: 60, excludeExclusiveSKUs: true, draftSlot: draftSlot, excludeSKUs: excludeSKUs });
  }

  function renderPickerResults() {
    var q = (document.getElementById('picker-search').value || '').toLowerCase().trim();
    var rows = pickerProducts.filter(function(p) {
      if (!q) return true;
      return (String(p.nameEn || '').toLowerCase().indexOf(q) !== -1) || (String(p.sku || '').toLowerCase().indexOf(q) !== -1);
    });
    var box = document.getElementById('picker-results');
    if (!rows.length) {
      box.innerHTML = '<div class="text-muted">No eligible products' + (q ? ' match &ldquo;' + esc(q) + '&rdquo;' : ' for this slot\'s criteria') + '.</div>';
      return;
    }
    box.innerHTML = '<table class="table table-sm table-hover mb-0"><thead><tr><th>Name</th><th>SKU</th><th>Stock</th><th>Price</th><th>Profit</th><th></th></tr></thead><tbody>' +
      rows.map(function(p) {
        var profit = (p.profitRate !== null && p.profitRate !== undefined) ? Math.round(p.profitRate * 100) + '%' : '—';
        return '<tr>' +
          '<td>' + esc(p.nameEn || '-') + '</td>' +
          '<td class="text-muted small">' + esc(p.sku) + '</td>' +
          '<td>' + p.stock + '</td>' +
          '<td>₪' + Number(p.price).toFixed(0) + '</td>' +
          '<td>' + profit + '</td>' +
          '<td><button class="btn btn-sm btn-pick-one" data-sku="' + escAttr(p.sku) + '">Select</button></td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
    box.querySelectorAll('.btn-pick-one').forEach(function(b) {
      b.addEventListener('click', function() { choosePickerProduct(b.dataset.sku); });
    });
  }

  function choosePickerProduct(sku) {
    var p = pickerProducts.find(function(x) { return String(x.sku) === String(sku); });
    var r = findRow(pickerCid);
    if (p && r) {
      r.activeSKU = p.sku;
      r.productName = p.nameEn || '';
      r.productPrice = p.price || 0;
      r.profitRate = (p.profitRate !== null && p.profitRate !== undefined) ? p.profitRate : null;
      markDirty();
      renderComposition();
    }
    closePicker();
  }

  function closePicker() {
    document.getElementById('product-picker-modal').style.display = 'none';
    pickerCid = null;
    pickerProducts = [];
  }

  // ---- atomic save / discard ----------------------------------------------------
  function saveComposition() {
    if (!draft || !currentBundleId) return;
    var live = draft.slots.filter(function(r) { return !r._deleted; });
    if (!live.length) { TaskWidgets.toast('A bundle needs at least one slot.', 'warning'); return; }
    // Block save if a product row has no product — it would export a blank woosb id to the live site.
    if (live.some(function(r) { return r.slotType === 'Product' && !r.activeSKU; })) {
      TaskWidgets.toast('Every product row needs a product selected (or delete the empty row).', 'warning');
      return;
    }

    var slots = live.map(function(r) {
      var o = { slotType: r.slotType };
      if (r.slotId) o.slotId = r.slotId;
      if (r.slotType === 'Text') {
        o.textStyle = r.textStyle; o.textEn = r.textEn; o.textHe = r.textHe;
      } else {
        o.activeSKU = r.activeSKU || '';
        o.defaultQty = Number(r.defaultQty) || 0;
        o.qtyVariable = !!r.qtyVariable;
        o.exclusive = !!r.exclusive;
        o.category = r.category || '';
        o.category2 = r.category2 || '';
        o.priceMin = r.priceMin;
        o.priceMax = r.priceMax;
        o.intensity = r.intensity;
        o.complexity = r.complexity;
        o.acidity = r.acidity;
        o.nameContains = r.nameContains || '';
      }
      return o;
    });
    var header = { nameEn: draft.header.nameEn, nameHe: draft.header.nameHe, status: draft.header.status };

    // Count named existing slots being removed (for the confirm prompt; blank/new rows are silent).
    var delCount = draft.slots.filter(function(r) {
      return r._deleted && r.slotId && (r.slotType === 'Text' ? (r.textEn || r.textHe) : r.activeSKU);
    }).length;

    var doSave = function() {
      var btn = document.getElementById('btn-save-composition');
      var restore = withButtonBusy(btn, 'Saving...');
      google.script.run
        .withSuccessHandler(function(result) {
          restore();
          if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
          clearDraft(currentBundleId);
          draftDirty = false;
          currentBundle = result.data;
          draft = buildDraftFromBundle(result.data);
          renderEditor();
          setSaveEnabled(false);
          TaskWidgets.toast('Composition saved.', 'success');
          afterSaveRefresh();
        })
        .withFailureHandler(function(err) { restore(); TaskWidgets.toast('Failed: ' + err.message, 'error'); })
        .WebAppBundles_saveComposition(currentBundleId, header, slots);
    };

    if (delCount > 0) {
      TaskWidgets.confirm('Save composition? ' + delCount + ' slot(s) will be removed.', doSave, { okLabel: 'Save', danger: true });
    } else {
      doSave();
    }
  }

  // A saved composition change makes ops differ from web until exported (§7.5). The authoritative
  // needsPush diff is recomputed by overnight housekeeping; optimistically flag this bundle now so
  // the list/strip reflect "export pending" immediately.
  function afterSaveRefresh() {
    if (pushBundleIds.indexOf(String(currentBundleId)) === -1) pushBundleIds.push(String(currentBundleId));
    renderDeficiencyStrip({ bundleId: currentBundleId });
    loadBundleList();
  }

  function discardDraft() {
    if (!currentBundleId || !currentBundle) return;
    TaskWidgets.confirm('Discard unsaved changes and reload the saved composition?', function() {
      clearDraft(currentBundleId);
      draftDirty = false;
      draft = buildDraftFromBundle(currentBundle);
      renderEditor();
      setSaveEnabled(false);
    });
  }

  // =================================================================================
  // MANAGEMENT CARD ACTIONS
  // =================================================================================

  function showResults(title, html) {
    document.getElementById('action-results-title').textContent = title;
    document.getElementById('action-results-body').innerHTML = html;
    document.getElementById('action-results-panel').style.display = '';
  }

  function withButtonBusy(btn, label) {
    var originalText = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm mr-1"></span> ' + label;
    return function restore() {
      btn.disabled = false;
      btn.textContent = originalText;
    };
  }

  function updateComposition() {
    TaskWidgets.confirm('Re-derive bundle composition from WebProdM?', function() {
    var btn = document.getElementById('btn-update-composition');
    var restore = withButtonBusy(btn, 'Updating...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var r = d.reimport || {};
        var msg = 'Update Composition complete. Re-derived from WebProdM: ' + (r.imported || 0) + ' bundles imported, ' + (r.failed || 0) + ' failed, ' + (r.skipped || 0) + ' skipped.';
        showResults('Update Composition', '<p>' + TaskWidgets.escape(msg) + '</p>');
        loadStats();
        loadBundleList();
        // Inventory health panel intentionally NOT refreshed here — Composition
        // and Inventory are separate buttons; click Review Stock for inventory.
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_updateComposition();
    });
  }

  function reviewStock() {
    var btn = document.getElementById('btn-review-stock');
    var restore = withButtonBusy(btn, 'Reviewing...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var msg = 'Bundle stock review complete. Critical: ' + (d.criticalTasksCreated || 0) + ', Low inventory: ' + (d.lowInventoryTasksCreated || 0) + '.';
        showResults('Review Stock', '<p>' + TaskWidgets.escape(msg) + '</p><p class="small text-muted">Tasks created for any issues. Reload the alerts panel to see them.</p>');
        loadHealthAlerts();
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_reviewStock();
  }

  function validateParity() {
    var btn = document.getElementById('btn-validate-parity');
    var restore = withButtonBusy(btn, 'Validating...');

    google.script.run
      .withSuccessHandler(function(result) {
        restore();
        if (result.error) { TaskWidgets.toast('Error: ' + result.error, 'error'); return; }
        var d = result.data || {};
        var bundles = (d.bundles || []).filter(function(b) { return b.issueCount > 0; });
        var summary = '<p>Validated ' + (d.totalBundles || 0) + ' bundles; ' + (d.bundlesWithIssues || 0) + ' have parity issues.</p>';
        if (bundles.length === 0) {
          showResults('Validate EN/HE Parity', summary + '<p class="text-success">No drift detected.</p>');
          return;
        }
        var rows = bundles.map(function(b) {
          var issues = b.issues.map(function(iss) {
            var sec = (iss.section != null) ? ' [section ' + iss.section + ']' : '';
            return '<li><code>' + TaskWidgets.escape(iss.code) + '</code>' + sec + ' — ' + TaskWidgets.escape(iss.detail) + '</li>';
          }).join('');
          return '<tr><td>' + TaskWidgets.escape(b.bundleName || b.bundleId) + '</td><td>' + b.issueCount + '</td><td><ul class="mb-0 pl-3">' + issues + '</ul></td></tr>';
        }).join('');
        var table = '<table class="table table-sm"><thead><tr><th>Bundle</th><th>#</th><th>Issues</th></tr></thead><tbody>' + rows + '</tbody></table>';
        showResults('Validate EN/HE Parity', summary + table);
      })
      .withFailureHandler(function(err) {
        restore();
        TaskWidgets.toast('Failed: ' + err.message, 'error');
      })
      .WebAppBundles_validateParity();
  }

  // Export (Phase 2 §7.6): generate the worklist as a new Google Sheet (one row per bundle, EN/HE
  // woosb_ids side by side + warnings), auto-open it in a new tab. Producing the file clears the
  // push-pending task server-side. User copies cells from the sheet into WPClever Import.
  function exportBundles() {
    TaskWidgets.confirm('Generate the bundle export sheet?', function() {
      var btn = document.getElementById('btn-export-bundles');
      var restore = withButtonBusy(btn, 'Exporting...');
      google.script.run
        .withSuccessHandler(function(res) {
          restore();
          if (!res || !res.success) {
            TaskWidgets.toast('Export failed: ' + ((res && res.message) || 'unknown'), 'error');
            return;
          }
          if ((res.exportCount || 0) === 0) {
            TaskWidgets.toast('All bundles match web — nothing to export.', 'info');
            return;
          }
          try { window.open(res.fileUrl, '_blank'); } catch (e) { /* popup blocked — link below */ }
          showResults('Export Bundles',
            '<p class="text-success mb-2">Export created for ' + res.exportCount + ' bundle(s) — push task cleared.</p>' +
            '<p class="small text-muted mb-2">Copy each EN/HE cell from the sheet and paste into that bundle\'s product via WPClever Import. Direction is ops &rarr; web.</p>' +
            '<a href="' + res.fileUrl + '" target="_blank" class="btn btn-sm">Open Sheet</a>');
          TaskWidgets.toast('Export created — ' + res.exportCount + ' bundle(s).', 'success');
        })
        .withFailureHandler(function(err) {
          restore();
          TaskWidgets.toast('Failed: ' + err.message, 'error');
        })
        .WebAppBundles_exportBundlesToSheet();
    });
  }

  // Select + copy a textarea's contents (the textarea stays selected as a manual fallback).
  function copyExport(id) {
    var ta = document.getElementById(id);
    if (!ta) return;
    ta.focus();
    ta.select();
    try {
      var ok = document.execCommand('copy');
      TaskWidgets.toast(ok ? 'Copied.' : 'Selected — press Ctrl+C to copy.', ok ? 'success' : 'warning');
    } catch (e) {
      TaskWidgets.toast('Selected — press Ctrl+C to copy.', 'warning');
    }
  }


  // Initialize on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Expose for debugging
  window.BundlesView = {
    loadStats: loadStats,
    loadBundleList: loadBundleList,
    loadHealthAlerts: loadHealthAlerts,
    loadBundleForEditing: loadBundleForEditing,
    copyExport: copyExport
  };

})();
</script>
