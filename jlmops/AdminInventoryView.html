          <h5 class="mb-0"><span id="inv-chev-profit">&#9656;</span> Product Costs &amp; Margins</h5>
          <div>

          </div>

<script>
(function() {
  const reviewContainer = document.getElementById('inventory-review-table-container');
  const processBtn = document.getElementById('btn-process-counts');

  /**
   * Main function to load all data for the view.
   */
  function loadAdminViewData() {
    reviewContainer.innerHTML = '<p class="text-center"><em>Loading review tasks...</em></p>';
    ViewLoading.begin();
    google.script.run
      .withSuccessHandler(data => { ViewLoading.end(); renderAdminView(data); })
      .withFailureHandler(err => { ViewLoading.end(); handleError(err); })
      .WebAppInventory_getAdminInventoryViewData();
  }

  /**
   * Renders the different components of the admin view.
   * @param {object} data - The data object from the backend.
   */
  function renderAdminView(data) {
    if (data.error) {
      handleError({ message: data.error });
      return;
    }
    renderReviewTable(data.reviewTasks || []);
    renderOpenTasksTable(data.openTasks || []);
  }

  /**
   * Renders the 'Open Tasks (Manager Queue)' table.
   * @param {Array<object>} tasks - The array of open tasks.
   */
  function renderOpenTasksTable(tasks) {
    const container = document.getElementById('open-tasks-table-container');
    const countSpan = document.getElementById('open-tasks-count');

    if (countSpan) {
        countSpan.textContent = tasks.length;
    }

    if (tasks.length === 0) {
      container.innerHTML = '<p>No open tasks in the manager queue.</p>';
      return;
    }

    let tableHtml = `
      <table class="table table-sm table-hover">
        <thead>
          <tr>
            <th>Date</th>
            <th class="text-center">SKU</th>
            <th class="text-right">Product Name</th>
            <th class="text-center">On Hand</th>
            <th>Task Title</th>
          </tr>
        </thead>
        <tbody>
    `;

    tasks.forEach(task => {
      // Format date
      let dateStr = '';
      try {
          const dateObj = new Date(task.createdDate);
          dateStr = dateObj.toLocaleDateString();
      } catch (e) {
          dateStr = task.createdDate;
      }

      tableHtml += `
        <tr>
          <td>${dateStr}</td>
          <td class="text-center">${TaskWidgets.escape(task.sku || '-')}</td>
          <td class="text-right">${TaskWidgets.escape(task.productName || '-')}</td>
          <td class="text-center">${task.totalQty != null ? task.totalQty : '-'}</td>
          <td>${TaskWidgets.escape(task.title)}</td>
        </tr>
      `;
    });

    tableHtml += `
        </tbody>
      </table>
    `;
    container.innerHTML = tableHtml;
  }

  /**
   * Renders the 'Inventory Counts to Review' table.
   * @param {Array<object>} tasks - The array of task objects for review.
   */
  function renderReviewTable(tasks) {
    if (tasks.length === 0) {
      reviewContainer.innerHTML = '<p>No inventory counts are currently awaiting review.</p>';
      return;
    }

    let tableHtml = `
      <table class="table table-sm table-hover">
        <thead>
          <tr>

            <th class="text-center">Comax</th>
            <th class="text-center">Total</th>
            <th class="text-center">Brurya</th>
            <th class="text-center">Storage</th>
            <th class="text-center">Office</th>
            <th class="text-center">Shop</th>
            <th class="text-center">SKU</th>
            <th class="text-right">Product Name</th>
            <th class="text-center"><input type="checkbox" id="check-all-reviews"></th>
          </tr>
        </thead>
        <tbody>
    `;

    tasks.forEach(task => {
      tableHtml += `
        <tr data-task-id="${task.taskId}" data-sku="${TaskWidgets.escape(task.sku)}">
          <td class="text-center">${task.comaxQty}</td>
          <td class="text-center">${task.totalQty}</td>
          <td class="text-center">${task.bruryaQty}</td>
          <td class="text-center">${task.storageQty}</td>
          <td class="text-center">${task.officeQty}</td>
          <td class="text-center">${task.shopQty}</td>
          <td class="text-center">${TaskWidgets.escape(task.sku)}</td>
          <td class="text-right">${TaskWidgets.escape(task.productName)}</td>
          <td class="text-center"><input type="checkbox" class="review-checkbox"></td>
        </tr>
      `;
    });

    tableHtml += `
        </tbody>
      </table>
    `;
    reviewContainer.innerHTML = tableHtml;
    const checkAllCheckbox = document.getElementById('check-all-reviews');
    if (checkAllCheckbox) {
      checkAllCheckbox.addEventListener('change', () => {
        const individualCheckboxes = document.querySelectorAll('.review-checkbox');
        individualCheckboxes.forEach(checkbox => {
          checkbox.checked = checkAllCheckbox.checked;
        });
        updateProcessButtonState();
      });
    }
    addCheckboxEventListeners();
    updateProcessButtonState();
  }

  /**
   * Attaches event listeners to all review checkboxes.
   */
  function addCheckboxEventListeners() {
    const individualCheckboxes = document.querySelectorAll('.review-checkbox');
    individualCheckboxes.forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        updateProcessButtonState();
        const checkAllCheckbox = document.getElementById('check-all-reviews');
        if (checkAllCheckbox) {
          const allChecked = Array.from(individualCheckboxes).every(cb => cb.checked);
          checkAllCheckbox.checked = allChecked;
        }
      });
    });
  }

  /**
   * Updates the disabled state of the process button based on checked checkboxes.
   */
  function updateProcessButtonState() {
    const checkedCheckboxes = document.querySelectorAll('.review-checkbox:checked');
    processBtn.disabled = checkedCheckboxes.length === 0;
    if (checkedCheckboxes.length > 0) {
      processBtn.textContent = `Process ${checkedCheckboxes.length} Count${checkedCheckboxes.length > 1 ? 's' : ''}`;
    } else {
      processBtn.textContent = 'Processing counts disabled';
    }
  }

  /**
   * Handles the click event for the process counts button.
   */
  function handleProcessCounts() {
    TaskWidgets.confirm("Process the selected inventory counts?", function() {
    processBtn.disabled = true;
    processBtn.textContent = 'Processing...';

    const taskIds = [];
    document.querySelectorAll('.review-checkbox:checked').forEach(checkbox => {
      const row = checkbox.closest('tr');
      if (row && row.dataset.taskId) {
        taskIds.push(row.dataset.taskId);
      }
    });

    if (taskIds.length === 0) {
      showToast('No tasks selected for processing.', 'warning');
      processBtn.disabled = false;
      processBtn.textContent = 'Processing counts disabled';
      return;
    }

    google.script.run
      .withSuccessHandler(response => {
        if (response.success) {
          showToast(`${response.completed} counts processed successfully.`);
          loadAdminViewData(); // Reload data to reflect changes
          loadComaxSyncData(); // Reload Comax Sync section to show accepted counts
        } else {
          showToast(`Error processing counts: ${response.message}`, 'error');
        }
        processBtn.disabled = false;
        processBtn.textContent = 'Processing counts disabled';
      })
      .withFailureHandler(err => {
        showToast(`Error processing counts: ${err.message}`, 'error');
        processBtn.disabled = false;
        processBtn.textContent = 'Processing counts disabled';
      })
      .WebAppInventory_acceptInventoryCounts(taskIds);
    });
  }

  processBtn.addEventListener('click', handleProcessCounts);

  /**
   * Generic error handler for google.script.run failures.
   * @param {Error} error - The error object.
   */
  function handleError(error) {
    console.error('An error occurred:', error.message);
    showToast(`Error: ${error.message}`, 'error');
  }

  /**
   * Displays a toast notification.
   * @param {string} message The message to display.
   * @param {string} type The type of toast (success, error, warning).
   */
  function showToast(message, type = 'success') {
    TaskWidgets.toast(message, type);
  }

  // --- Count Task Creation (unified card) ---
  const planningState = {
    products: [],
    loadedAt: null
  };

  const el = {
    nameMode: document.getElementById('name-filter-mode'),
    nameText: document.getElementById('name-filter-text'),
    startAt: document.getElementById('start-at'),
    countLimit: document.getElementById('count-limit'),
    daysThreshold: document.getElementById('days-threshold'),
    webOnly: document.getElementById('chk-web-only'),
    wineOnly: document.getElementById('chk-wine-only'),
    zeroStock: document.getElementById('chk-zero-stock'),
    summary: document.getElementById('candidate-summary'),
    preview: document.getElementById('preview-table-container'),
    createBtn: document.getElementById('btn-create-count-tasks'),
    reloadBtn: document.getElementById('btn-reload-planning'),
    loadedLabel: document.getElementById('count-planning-loaded')
  };

  function loadPlanningData() {
    el.preview.innerHTML = '<p class="text-muted small mb-0">Loading product data…</p>';
    el.summary.textContent = '';
    el.createBtn.disabled = true;
    ViewLoading.begin();
    google.script.run
      .withSuccessHandler(res => {
        ViewLoading.end();
        if (res && res.error) {
          el.preview.innerHTML = `<p class="text-danger small mb-0">${res.error}</p>`;
          return;
        }
        planningState.products = (res && res.products) || [];
        planningState.loadedAt = res && res.loadedAt;
        if (el.loadedLabel) {
          const ts = planningState.loadedAt ? new Date(planningState.loadedAt).toLocaleTimeString() : '';
          el.loadedLabel.textContent = ts ? `loaded ${ts}` : '';
        }
        applyFilters();
      })
      .withFailureHandler(err => {
        ViewLoading.end();
        el.preview.innerHTML = `<p class="text-danger small mb-0">Failed to load: ${err.message}</p>`;
      })
      .WebAppInventory_getCountPlanningData();
  }

  function filterCandidates() {
    const nameText = (el.nameText.value || '').trim().toLowerCase();
    const mode = el.nameMode.value;
    const startAt = (el.startAt.value || '').trim().toLowerCase();
    const daysThreshold = el.daysThreshold.value ? parseInt(el.daysThreshold.value, 10) : null;
    const webOnly = el.webOnly.checked;
    const wineOnly = el.wineOnly.checked;
    const includeZero = el.zeroStock.checked;
    const nowMs = Date.now();

    const results = [];
    for (const p of planningState.products) {
      if (p.hasOpenTask) continue;
      if (webOnly && !p.isWeb) continue;
      if (wineOnly && !p.isWine) continue;

      if (!includeZero) {
        if (p.stock === null || isNaN(p.stock) || p.stock <= 0) continue;
      }

      if (nameText) {
        const n = (p.nameHe || '').toLowerCase();
        if (mode === 'startsWith') {
          if (!n.startsWith(nameText)) continue;
        } else {
          if (n.indexOf(nameText) === -1) continue;
        }
      }

      if (daysThreshold !== null && !isNaN(daysThreshold)) {
        if (p.lastCount) {
          const last = new Date(p.lastCount).getTime();
          if (!isNaN(last)) {
            const diffDays = Math.ceil((nowMs - last) / (1000 * 60 * 60 * 24));
            if (diffDays <= daysThreshold) continue;
          }
        }
      }

      if (startAt) {
        const n = (p.nameHe || '').toLowerCase();
        if (n < startAt) continue;
      }

      results.push(p);
    }

    // Already sorted by name in server payload. Apply limit.
    const rawLimit = el.countLimit.value;
    const limit = rawLimit ? parseInt(rawLimit, 10) : null;
    if (limit && !isNaN(limit) && limit > 0) {
      return { matched: results.length, sliced: results.slice(0, limit) };
    }
    return { matched: results.length, sliced: results };
  }

  function applyFilters() {
    if (!planningState.products.length) {
      el.summary.textContent = 'No products loaded.';
      el.preview.innerHTML = '<p class="text-muted small mb-0">No data.</p>';
      el.createBtn.disabled = true;
      el.createBtn.textContent = 'Create tasks';
      return;
    }
    const { matched, sliced } = filterCandidates();
    el.summary.textContent = `${matched} match — will create ${sliced.length}`;
    el.createBtn.disabled = sliced.length === 0;
    el.createBtn.textContent = sliced.length ? `Create ${sliced.length} tasks` : 'Create tasks';
    renderPreview(sliced);
  }

  // formatLastCount stays local: returns '—' on null/invalid where
  // TaskWidgets.formatDate returns '' / String(iso). Different display contract.
  function formatLastCount(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    return d.toISOString().slice(0, 10);
  }

  function renderPreview(rows) {
    if (!rows.length) {
      el.preview.innerHTML = '<p class="text-muted small mb-0">No candidates for current filters.</p>';
      return;
    }
    let html = '<table class="table table-sm table-hover"><thead><tr>' +
      '<th>SKU</th><th>Name</th><th class="text-center">Vintage</th>' +
      '<th class="text-center">Stock</th><th class="text-center">Last Counted</th>' +
      '<th>Brand</th></tr></thead><tbody>';
    rows.forEach(p => {
      html += '<tr>' +
        `<td>${TaskWidgets.escape(p.sku)}</td>` +
        `<td>${TaskWidgets.escape(p.nameHe)}</td>` +
        `<td class="text-center">${TaskWidgets.escape(p.vintage)}</td>` +
        `<td class="text-center">${p.stock === null ? '' : p.stock}</td>` +
        `<td class="text-center">${formatLastCount(p.lastCount)}</td>` +
        `<td>${TaskWidgets.escape(p.brand || p.vendor || '')}</td>` +
        '</tr>';
    });
    html += '</tbody></table>';
    el.preview.innerHTML = html;
  }

  function handleCreateCountTasks() {
    const { sliced } = filterCandidates();
    if (!sliced.length) return;
    const skus = sliced.map(p => p.sku);
    const originalText = el.createBtn.textContent;
    el.createBtn.disabled = true;
    el.createBtn.textContent = 'Creating…';
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          const parts = [`Created ${res.created || 0}`];
          if (res.skippedDedup) parts.push(`${res.skippedDedup} duplicates skipped`);
          if (res.errors && res.errors.length) parts.push(`${res.errors.length} errors`);
          showToast(parts.join(', ') + '.', res.errors && res.errors.length ? 'warning' : 'success');
          loadPlanningData();
          loadAdminViewData();
        } else {
          showToast((res && res.message) || 'Create failed', 'error');
          el.createBtn.disabled = false;
          el.createBtn.textContent = originalText;
        }
      })
      .withFailureHandler(err => {
        handleError(err);
        el.createBtn.disabled = false;
        el.createBtn.textContent = originalText;
      })
      .WebAppInventory_createCountTasksBulk(skus, '');
  }

  [el.nameMode, el.nameText, el.startAt, el.countLimit, el.daysThreshold,
   el.webOnly, el.wineOnly, el.zeroStock].forEach(ctl => {
    if (!ctl) return;
    const evt = (ctl.tagName === 'SELECT' || ctl.type === 'checkbox') ? 'change' : 'input';
    ctl.addEventListener(evt, applyFilters);
  });
  el.createBtn.addEventListener('click', handleCreateCountTasks);
  el.reloadBtn.addEventListener('click', loadPlanningData);

  // --- Product Costs & Margins (BUNDLE_PLAN Stage 2) ---
  const costMarginSummary = document.getElementById('cost-margin-summary');
  const costMarginList = document.getElementById('cost-margin-list-container');
  const costMarginLast = document.getElementById('cost-margin-last');
  const recomputeCostsBtn = document.getElementById('btn-recompute-costs');

  function loadCostMarginData() {
    costMarginSummary.textContent = 'Loading…';
    ViewLoading.begin();
    google.script.run
      .withSuccessHandler(data => { ViewLoading.end(); renderCostMargin(data); })
      .withFailureHandler(err => { ViewLoading.end(); handleError(err); })
      .WebAppInventory_getProductCostStatus();
  }

  function renderCostMargin(data) {
    if (!data || data.error) { handleError({ message: (data && data.error) || 'No cost status' }); return; }
    if (costMarginLast) {
      costMarginLast.textContent = data.lastRecompute ? `recomputed ${data.lastRecompute}` : 'never recomputed';
    }
    costMarginSummary.innerHTML =
      `<strong>${data.computed}</strong> computed · <strong>${data.assumed}</strong> assumed (no cost yet) · `
      + `<strong>${data.blank}</strong> blank · ${data.total} web products`;
    const list = data.assumedList || [];
    if (list.length === 0) {
      costMarginList.innerHTML = '<p class="text-muted small mb-0">No products on assumed margins.</p>';
      return;
    }
    let html = '<table class="table table-sm table-hover"><thead><tr>'
      + '<th class="text-center">SKU</th><th class="text-right">Product Name</th><th class="text-center">Assumed margin</th>'
      + '</tr></thead><tbody>';
    list.forEach(p => {
      const pct = (p.rate != null && isFinite(p.rate)) ? (Math.round(p.rate * 1000) / 10) + '%' : '—';
      html += `<tr><td class="text-center">${p.sku}</td><td class="text-right">${p.name || '-'}</td><td class="text-center">${pct}</td></tr>`;
    });
    html += '</tbody></table>';
    costMarginList.innerHTML = html;
  }

  function handleRecomputeCosts() {
    TaskWidgets.confirm('Recompute product costs and margins from the cost file?', function() {
      recomputeCostsBtn.disabled = true;
      const orig = recomputeCostsBtn.textContent;
      recomputeCostsBtn.textContent = 'Recomputing…';
      google.script.run
        .withSuccessHandler(res => {
          recomputeCostsBtn.disabled = false;
          recomputeCostsBtn.textContent = orig;
          if (res && res.error) { handleError({ message: res.error }); return; }
          showToast(`Costs recomputed: ${res.webRatesComputed} computed, ${res.webRatesPreserved} preserved, ${res.webStillBlank} blank.`, 'success');
          loadCostMarginData();
        })
        .withFailureHandler(err => {
          recomputeCostsBtn.disabled = false;
          recomputeCostsBtn.textContent = orig;
          handleError(err);
        })
        .WebAppInventory_recomputeProductCosts();
    });
  }
  if (recomputeCostsBtn) recomputeCostsBtn.addEventListener('click', handleRecomputeCosts);

  // Initial load — only the on-mount cards: Inventory Counts to Review + Open Tasks (one call via
  // loadAdminViewData) and Comax Sync. The two HEAVY cards (Create Count → loadPlanningData, Product
  // Costs & Margins → loadCostMarginData) are collapsed and lazy-load on first expand, so the view no
  // longer waits on all four sections at mount (was the long-load, user 2026-06-08).
  loadAdminViewData();
  loadComaxSyncData();

  // Collapsible heavy cards: load their data once, on first expand.
  var _invCardLoaded = { count: false, profit: false };
  function _invToggleCard(key) {
    var body = document.getElementById('inv-card-body-' + key);
    var chev = document.getElementById('inv-chev-' + key);
    if (!body) return;
    var opening = body.style.display === 'none';
    body.style.display = opening ? '' : 'none';
    if (chev) chev.innerHTML = opening ? '&#9662;' : '&#9656;';   // ▾ open / ▸ closed
    if (opening && !_invCardLoaded[key]) {
      _invCardLoaded[key] = true;
      if (key === 'count') loadPlanningData();
      else if (key === 'profit') loadCostMarginData();
    }
  }
  ['count', 'profit'].forEach(function(key) {
    var header = document.getElementById('inv-header-' + key);
    if (!header) return;
    header.addEventListener('click', function(e) {
      // Don't toggle when an action button in the header was clicked (Reload Data / Recompute).
      if (e.target.closest && e.target.closest('button')) return;
      _invToggleCard(key);
    });
  });

  /**
   * Loads data specifically for the Comax Sync card.
   */
  function loadComaxSyncData() {
      ViewLoading.begin();
      google.script.run
          .withSuccessHandler(data => { ViewLoading.end(); renderComaxSyncCard(data); })
          .withFailureHandler(err => { ViewLoading.end(); handleError(err); })
          .WebAppInventory_getAdminComaxSyncData();
  }

  // Same shape as AdminProductsView._renderFileActions: "Open File" + "Copy
  // Filename" buttons rendered into containerId, next to the card's action
  // buttons. Pass fileUrl falsy to clear the container.
  function renderComaxFileActions(containerId, fileUrl, fileName) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    if (!fileUrl) return;
    const openBtn = document.createElement('button');
    openBtn.type = 'button';
    openBtn.className = 'btn btn-light mr-2';
    openBtn.textContent = 'Open File';
    openBtn.addEventListener('click', () => window.open(fileUrl, '_blank'));
    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'btn btn-light mr-2';
    copyBtn.textContent = 'Copy Filename';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(fileName || '').then(() => TaskWidgets.toast('Filename copied.', 'success'));
    });
    el.appendChild(openBtn);
    el.appendChild(copyBtn);
  }

  /**
   * Renders the Comax Sync card based on the provided data.
   * @param {object} data - The data object from the backend.
   */
  function renderComaxSyncCard(data) {
    const comaxExportBtn = document.getElementById('btn-comax-export');
    const comaxConfirmBtn = document.getElementById('btn-comax-updated');
    const comaxMessageArea = document.getElementById('comax-inventory-message-area');
    const tableBody = document.querySelector('#comax-export-table tbody');

    // Reset button states
    comaxExportBtn.disabled = true;
    comaxConfirmBtn.disabled = true;
    comaxMessageArea.innerHTML = '';
    comaxExportBtn.className = 'btn btn-light';
    comaxConfirmBtn.className = 'btn btn-light ml-2';
    renderComaxFileActions('comax-file-actions', null);
    tableBody.innerHTML = ''; // Clear table

    if (data.error) {
        comaxMessageArea.innerHTML = `<p class="text-danger">${data.error}</p>`;
        return;
    }

    // Render Table of Accepted Tasks
    if (data.acceptedTasks && data.acceptedTasks.length > 0) {
        data.acceptedTasks.forEach(task => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="text-center">${task.comaxQty}</td>
                <td class="text-center">${task.totalQty}</td>
                <td class="text-center">${task.bruryaQty}</td>
                <td class="text-center">${task.storageQty}</td>
                <td class="text-center">${task.officeQty}</td>
                <td class="text-center">${task.shopQty}</td>
                <td class="text-center">${TaskWidgets.escape(task.sku)}</td>
                <td class="text-right">${TaskWidgets.escape(task.productName)}</td>
            `;
            tableBody.appendChild(row);
        });
    } else {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="8" class="text-center text-muted">No accepted tasks waiting for export.</td>';
        tableBody.appendChild(row);
    }

    if (data.openComaxInventoryConfirmationTask) {
        comaxMessageArea.innerHTML = `<div class="alert alert-warning" style="padding: 0.5rem 1rem;">${TaskWidgets.escape(data.openComaxInventoryConfirmationTask.notes)}</div>`;
        comaxConfirmBtn.disabled = false;
        comaxConfirmBtn.onclick = function() { handleComaxConfirmClick(data.openComaxInventoryConfirmationTask.id); };
        const t = data.openComaxInventoryConfirmationTask;
        const fileUrl = t.fileId ? `https://drive.google.com/file/d/${t.fileId}/view` : null;
        renderComaxFileActions('comax-file-actions', fileUrl, t.fileName);
    } else if (data.comaxInventoryExportCount > 0) {
        // comaxMessageArea.innerHTML = `<p>${data.comaxInventoryExportCount} items ready for export.</p>`; // Redundant with table
        comaxExportBtn.disabled = false;
        comaxExportBtn.onclick = function() { handleComaxExportClick(); };
    } else {
        // comaxMessageArea.innerHTML = '<p style="font-size: 0.85rem;" class="text-muted">No items to export.</p>'; // Redundant with table message
    }
  }

  /**
   * Handles the click event for the 'Comax Export' button.
   */
  function handleComaxExportClick() {
    const exportBtn = document.getElementById('btn-comax-export');
    const messageArea = document.getElementById('comax-inventory-message-area');
    
    TaskWidgets.confirm("Export Comax adjustments?", function() {
      exportBtn.disabled = true;
      messageArea.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> Processing...';

      google.script.run
        .withSuccessHandler(response => {
          if (response && response.message) {
            TaskWidgets.toast(response.message, 'success');
          }
          loadAdminViewData(); // Reload all data
          loadComaxSyncData(); // Reload Comax Sync data specifically
        })
        .withFailureHandler(err => {
            handleError(err);
            exportBtn.disabled = false;
            messageArea.innerHTML = `<p class="text-danger">Error: ${err.message}</p>`;
        })
        .WebAppInventory_generateComaxInventoryExport();
    });
  }

  /**
   * Handles the click event for the 'Comax Updated' button.
   * @param {string} taskId - The ID of the confirmation task to complete.
   */
  function handleComaxConfirmClick(taskId) {
    if (!taskId) {
        handleError('Error: Task ID is missing. Please check the logs.');
        return;
    }

    const confirmBtn = document.getElementById('btn-comax-updated');
    const messageArea = document.getElementById('comax-inventory-message-area');

    TaskWidgets.confirm("Confirm Comax adjustment applied and closed?", function() {
      confirmBtn.disabled = true;
      messageArea.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> Processing...';
      
      google.script.run
        .withSuccessHandler(wasCompleted => {
          if (!wasCompleted) {
            handleError('Failed to confirm task.');
          }
          loadAdminViewData(); // Reload all data
          loadComaxSyncData(); // Reload Comax Sync data specifically
        })
        .withFailureHandler(err => {
            handleError(err);
            confirmBtn.disabled = false;
            messageArea.innerHTML = `<p class="text-danger">Error: ${err.message}</p>`;
        })
        .WebAppTasks_completeTaskById(taskId);
    });
  }
})();
</script>
