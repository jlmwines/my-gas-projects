<?!= include('TaskPacks') ?>
<!--
  TaskDetail — shared task detail component.

  Hosts configure once via TaskDetail.configure(), then call:
    TaskDetail.render(taskId, containerEl)  — panel mode (AdminTasksView right panel)
    TaskDetail.open(taskId)                 — modal mode (Deploy B+; stub for Deploy A)

  TaskPacks is owned here. Hosts that previously included TaskPacks directly
  must drop that include once they adopt TaskDetail.

  Host contract:
    getTask(id)                → task object or null
    getEntity(slug)            → library entity or null (for DO pack)
    loadEntityDetail(slug, cb) → async; cb(detail) on expand toggle
    saveTask(id, fields, cb)   → route save to correct backend; cb({error?})
    completeTask(id, cb)       → mark Done; cb(true/false)
    deleteTask(id, cb)         → delete task; cb({error?})
    close()                    → called when Close button hit in panel mode
    refresh()                  → light re-render of host list
    reload()                   → full server reload
-->

<!-- Modal container: Deploy B+ wires tasks from other surfaces here -->
<div class="modal-overlay" id="task-detail-modal" style="display:none;" aria-hidden="true">
  <div class="modal-container" style="max-width:560px;max-height:90vh;overflow-y:auto;">
    <div id="td-modal-body" style="padding:12px;"></div>
  </div>
</div>

<style>
  /* Pack: single row of buttons, no wrap */
  #task-pack-do .detail-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: nowrap; overflow-x: auto; }

  .td-title { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Compact 4-field row */
  .td-fields { display: flex; gap: 4px; margin-bottom: 6px; }
  .td-fields > div { flex: 1; min-width: 0; }
  .td-field-label { font-size: 9px; color: #6c757d; margin-bottom: 1px; }
  .td-fields select, .td-fields input[type=date] {
    width: 100%; font-size: 10px; height: 24px; padding: 0 2px;
    border: 1px solid #ced4da; border-radius: 3px; background: #fff;
  }
  .td-fields select:disabled, .td-fields input[readonly] { background: #e9ecef; }

  /* More section */
  .td-more-section { border-top: 1px solid #dee2e6; margin-top: 6px; padding-top: 8px; }
</style>

<script>
window.TaskDetail = (function() {
  'use strict';

  var cfg = {
    getTask:          function()        { return null; },
    getEntity:        function()        { return null; },
    getAssignees:     function()        { return []; },
    loadEntityDetail: function(s, cb)   { cb(null); },
    saveTask:         function(i, f, cb){ cb && cb({ error: 'not configured' }); },
    completeTask:     function(i, cb)   { cb && cb(false); },
    deleteTask:       function(i, cb)   { cb && cb({ error: 'not configured' }); },
    close:            function()        {},
    refresh:          function()        {},
    reload:           function()        {}
  };

  var _panelEl   = null;
  var _currentId = null;

  // ── Public API ──────────────────────────────────────────────────────

  function configure(opts) {
    if (!opts) return;
    var keys = ['getTask','getEntity','getAssignees','loadEntityDetail','saveTask',
                'completeTask','deleteTask','close','refresh','reload'];
    keys.forEach(function(k) { if (opts[k]) cfg[k] = opts[k]; });

    // Wire TaskPacks internally — hosts must NOT also include TaskPacks directly.
    TaskPacks.configure({
      getTask:   cfg.getTask,
      getEntity: cfg.getEntity,
      refresh:   cfg.refresh,
      reload:    cfg.reload,
      hideNotes: true  // TaskDetail's More section renders Notes; suppress duplicate in pack
    });
  }

  // Panel mode: render into a host-provided container element.
  function render(taskId, containerEl) {
    _currentId = taskId;
    _panelEl   = containerEl;
    if (!containerEl) return;
    if (!taskId) { containerEl.innerHTML = ''; return; }
    var task = cfg.getTask(taskId);
    if (!task) { containerEl.innerHTML = ''; return; }
    containerEl.innerHTML = _buildHTML(task, 'panel');
    _bind(task, containerEl, 'panel');
  }

  // Modal mode (Deploy B+): render into #td-modal-body and open modal.
  function open(taskId) {
    _currentId = taskId;
    var task = cfg.getTask(taskId);
    if (!task) return;
    var body = document.getElementById('td-modal-body');
    if (!body) return;
    body.innerHTML = _buildHTML(task, 'modal');
    _bind(task, body, 'modal');
    ModalOverlay.open('task-detail-modal');
  }

  // ── HTML builder ────────────────────────────────────────────────────

  function _buildHTML(task, mode) {
    var esc = TaskWidgets.escape;

    var typeId    = task.typeId || '';
    var isContent = typeId.indexOf('task.content') === 0 || typeId === 'task.newsletter.distribute';
    var isSystem  = typeId.indexOf('task.system') === 0 || typeId.indexOf('task.sync') === 0;
    var isData    = isSystem;
    var isDone    = task.status === 'Done' || task.status === 'Closed' || task.status === 'Cancelled';
    var allowsDateEdit = isContent ||
      typeId === 'task.deficiency.category_stock' ||
      typeId === 'task.deficiency.bundle_stock';

    // ── Pack (primary DO action) ───────────────────────────────────────
    var packHtml = TaskPacks.packBody(task);
    var packSection = packHtml
      ? '<div id="task-pack-do" class="mb-2">' + packHtml + '</div><hr class="my-2">'
      : '';

    // ── Compact 4-field row (always visible) ───────────────────────────
    var statusOpts = ['New','Assigned','Review','Done','Closed'].map(function(s) {
      return '<option value="' + s + '"' + (task.status === s ? ' selected' : '') + '>' + s + '</option>';
    }).join('');
    var startVal = task.startDate ? TaskWidgets.formatDate(task.startDate) : '';
    var dueVal   = task.dueDate   ? TaskWidgets.formatDate(task.dueDate)   : '';
    var fieldsRow =
      '<div class="td-fields">' +
        '<div>' +
          '<div class="td-field-label">Status</div>' +
          '<select class="td-f-status"' + (isSystem && !isContent ? ' disabled' : '') + '>' + statusOpts + '</select>' +
        '</div>' +
        '<div>' +
          '<div class="td-field-label">Assignee</div>' +
          '<select class="td-f-assignee"' + (isSystem && !isContent ? ' disabled' : '') + '><option value="">-</option></select>' +
        '</div>' +
        '<div>' +
          '<div class="td-field-label">Start</div>' +
          '<input type="date" class="td-f-start"' + (!allowsDateEdit ? ' readonly' : '') + ' value="' + startVal + '">' +
        '</div>' +
        '<div>' +
          '<div class="td-field-label">Due</div>' +
          '<input type="date" class="td-f-due"' + (!allowsDateEdit ? ' readonly' : '') + ' value="' + dueVal + '">' +
        '</div>' +
      '</div>';

    // ── Action row ─────────────────────────────────────────────────────
    var showSave   = !isSystem || allowsDateEdit || isContent;
    var showDone   = !isData;
    var showDelete = !isData;
    var hasMore    = showSave || showDelete || isContent || !!task.createdDate;

    var moreOpen = false;
    try { moreOpen = sessionStorage.getItem('td-more-open') === '1'; } catch(e) {}

    var actionRow =
      '<div class="d-flex align-items-center mb-2">' +
        (showDone
          ? '<button type="button" class="btn btn-sm btn-light mr-1 td-done-btn"' + (isDone ? ' disabled' : '') + '>Done</button>'
          : '') +
        (hasMore
          ? '<button type="button" class="btn btn-sm btn-light td-more-toggle-btn">More ' + (moreOpen ? '▴' : '▾') + '</button>'
          : '') +
      '</div>';

    // ── Notes (always visible) ─────────────────────────────────────────
    var notesArea =
      '<textarea class="form-control form-control-sm td-f-notes mb-2" rows="2"' +
        (isData ? ' readonly' : '') +
        ' placeholder="Notes…" style="font-size:11px;">' +
        esc(task.notes || '') +
      '</textarea>';

    // ── More section ───────────────────────────────────────────────────
    var titleField = isContent
      ? '<div class="form-group mb-1">' +
          '<label class="small font-weight-bold mb-0" style="font-size:10px;">Title</label>' +
          '<input type="text" class="form-control form-control-sm td-f-title" value="' + esc(task.name || '') + '" style="font-size:11px;"></div>'
      : '';

    var driveField = isContent
      ? '<div class="form-group mb-2">' +
          '<label class="small font-weight-bold mb-0" style="font-size:10px;">Drive URL</label>' +
          '<div class="input-group input-group-sm">' +
          '<input type="text" class="form-control form-control-sm td-f-entity-id"' +
            ' value="' + esc(String(task.entityId || '')) + '" placeholder="https://drive.google.com/..." style="font-size:11px;">' +
          '<div class="input-group-append"><button type="button" class="btn btn-light td-open-entity-btn" title="Open">↗</button></div>' +
          '</div></div>'
      : '';

    var createdText = task.createdDate ? esc(TaskWidgets.formatDateShort(task.createdDate)) : '';
    var footerRow =
      '<div class="d-flex justify-content-between align-items-center">' +
        (showSave
          ? '<button type="button" class="btn btn-sm btn-light td-save-btn">Save</button>'
          : '<span></span>') +
        (createdText ? '<span class="text-muted" style="font-size:10px;">' + createdText + '</span>' : '') +
        (showDelete
          ? '<button type="button" class="btn btn-sm btn-light td-delete-btn"' + (isDone ? ' disabled' : '') + '>Delete</button>'
          : '<span></span>') +
      '</div>';

    var moreSection = hasMore
      ? '<div class="td-more-section" style="' + (moreOpen ? '' : 'display:none;') + '">' +
          titleField + driveField + footerRow +
        '</div>'
      : '';

    // ── Assemble ──────────────────────────────────────────────────────
    return '<div class="d-flex justify-content-between align-items-center mb-2">' +
             '<span class="td-title font-weight-bold small" title="' + esc(task.name || '') + '">' + esc(task.name || '-') + '</span>' +
             '<button type="button" class="btn btn-sm btn-light td-close-btn" style="font-size:11px;">✕</button>' +
           '</div>' +
           packSection +
           fieldsRow +
           actionRow +
           notesArea +
           moreSection;
  }

  // ── Event binding ───────────────────────────────────────────────────

  function _bind(task, root, mode) {
    var esc = TaskWidgets.escape;
    var id  = task.id;

    // Populate assignee select from host-provided list (synchronous, no GAS round-trip)
    var assigneeEl = root.querySelector('.td-f-assignee');
    if (assigneeEl) {
      var currentAssignee = task.assignedTo || '';
      var roles = cfg.getAssignees();
      var html = '<option value="">- Unassigned -</option>';
      (roles || []).forEach(function(r) {
        html += '<option value="' + esc(r) + '"' + (r === currentAssignee ? ' selected' : '') + '>' +
                esc(r.split('@')[0]) + '</option>';
      });
      assigneeEl.innerHTML = html;
    }

    // Close button
    var closeBtn = root.querySelector('.td-close-btn');
    if (closeBtn) {
      closeBtn.addEventListener('click', function() {
        if (mode === 'modal') {
          ModalOverlay.close('task-detail-modal');
        } else {
          if (_panelEl) _panelEl.innerHTML = '';
          _currentId = null;
          cfg.close();
        }
      });
    }

    // More toggle
    var moreToggle  = root.querySelector('.td-more-toggle-btn');
    var moreSection = root.querySelector('.td-more-section');
    if (moreToggle && moreSection) {
      moreToggle.addEventListener('click', function() {
        var open = moreSection.style.display === 'none';
        moreSection.style.display = open ? '' : 'none';
        moreToggle.textContent = 'More ' + (open ? '▴' : '▾');
        try { sessionStorage.setItem('td-more-open', open ? '1' : '0'); } catch(e) {}
      });
    }

    // Done button
    var doneBtn = root.querySelector('.td-done-btn');
    if (doneBtn) {
      doneBtn.addEventListener('click', function() {
        TaskWidgets.confirm('Mark this task as complete?', function() {
          doneBtn.disabled = true;
          doneBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
          cfg.completeTask(id, function(success) {
            if (!success) {
              doneBtn.disabled = false;
              doneBtn.textContent = 'Done';
              TaskWidgets.toast('Could not complete task', 'error');
              return;
            }
            _currentId = null;
            if (_panelEl) _panelEl.innerHTML = '';
            cfg.refresh();
            cfg.reload();
          });
        });
      });
    }

    // Save button
    var saveBtn = root.querySelector('.td-save-btn');
    if (saveBtn) {
      saveBtn.addEventListener('click', function() {
        var fields = _readFields(root, task);
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        cfg.saveTask(id, fields, function(result) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
          if (result && result.error) {
            TaskWidgets.toast('Error: ' + result.error, 'error');
            return;
          }
          cfg.reload();
        });
      });
    }

    // Delete button
    var deleteBtn = root.querySelector('.td-delete-btn');
    if (deleteBtn) {
      deleteBtn.addEventListener('click', function() {
        TaskWidgets.confirm('Delete this task? This cannot be undone.', function() {
          deleteBtn.disabled = true;
          deleteBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
          cfg.deleteTask(id, function(result) {
            deleteBtn.disabled = false;
            deleteBtn.textContent = 'Delete';
            if (result && result.error) {
              TaskWidgets.toast('Error: ' + result.error, 'error');
              return;
            }
            _currentId = null;
            if (_panelEl) _panelEl.innerHTML = '';
            cfg.refresh();
            cfg.reload();
          });
        });
      });
    }

    // Open entity URL (Drive link for content tasks)
    var openEntityBtn = root.querySelector('.td-open-entity-btn');
    if (openEntityBtn) {
      openEntityBtn.addEventListener('click', function() {
        var el = root.querySelector('.td-f-entity-id');
        var val = el ? el.value.trim() : '';
        if (val && val.indexOf('http') === 0) window.open(val, '_blank');
      });
    }

  }

  // ── Field reader ─────────────────────────────────────────────────────

  function _readFields(root, task) {
    var typeId    = task.typeId || '';
    var isContent = typeId.indexOf('task.content') === 0 || typeId === 'task.newsletter.distribute';
    var get = function(sel) { var el = root.querySelector(sel); return el ? el.value : null; };
    var fields = {
      status:     get('.td-f-status')   || task.status,
      assignedTo: get('.td-f-assignee') || null,
      startDate:  get('.td-f-start')    || null,
      dueDate:    get('.td-f-due')      || null,
      notes:      get('.td-f-notes')    || ''
    };
    if (isContent) {
      var entityId = get('.td-f-entity-id');
      var title    = get('.td-f-title');
      if (entityId !== null) fields.linkedEntityId = entityId.trim();
      if (title    !== null) fields.title           = title.trim();
    }
    return fields;
  }

  return { configure: configure, render: render, open: open };
})();
</script>
