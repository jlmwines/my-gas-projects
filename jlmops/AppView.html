<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
    <script src="//ssl.gstatic.com/docs/script/apps-script-impl.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header img {
            margin-right: 4px;
        }
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 20px; /* Match sidebar padding */
            border-bottom: 1px solid #ccc;
            height: 60px;
            background: #f4f2e6;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1030;
        }
        .jlmops-role-switcher {
            position: relative;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .jlmops-role-switcher select {
            width: auto !important;
            padding-right: 2rem;
        }
        .view-title-label {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1612;
            margin-left: 12px;
            margin-right: 4px;
            white-space: nowrap;
        }
        .main-body {
            display: flex;
            flex-grow: 1;
            margin-top: 60px; /* Height of the header */
        }
        .sidebar {
            width: 160px;
            height: calc(100vh - 60px);
            position: fixed;
            background: #f4f2e6;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
        }
        .sidebar ul.nav li {
            list-style-type: none; /* Remove bullet points */
        }
        .sidebar .nav-link {
            padding: 6px 10px;
            font-size: 0.9rem;
            color: #495057;
        }
        .sidebar .nav-link:hover { color: #212529; }
        .sidebar .nav-link.active {
            color: #4a7a3e !important;
            font-weight: 600;
            background: rgba(74,122,62,0.15);
            border-radius: 4px;
        }
        .content {
            margin-left: 170px;
            padding: 20px;
            width: 100%;
        }

        /* ===== Mobile primitives — shared across all views ===== */

        /* Hamburger button — hidden on desktop, visible on mobile */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            padding: 4px 12px;
            margin-right: 8px;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }

        /* Sidebar backdrop for off-canvas mode */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 60px 0 0 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1019;
        }
        body.sidebar-open .sidebar-backdrop { display: block; }

        /* Card visibility gating — drives the four-role matrix. Cards declare
           data-roles="admin manager" and data-viewports="mobile desktop"; CSS
           hides anything not matching the current role + viewport. */
        body.role-admin [data-roles]:not([data-roles~="admin"]) { display: none !important; }
        body.role-manager [data-roles]:not([data-roles~="manager"]) { display: none !important; }

        /* Responsive-stack utility: tables collapse to cards below the breakpoint.
           Use <td data-label="X"> for the per-cell label that shows on mobile. */
        @media (max-width: 768px) {
            table.responsive-stack thead { display: none; }
            table.responsive-stack tr {
                display: block;
                margin-bottom: 12px;
                border: 1px solid #dee2e6;
                border-radius: 4px;
                padding: 8px;
                background: #fff;
            }
            table.responsive-stack td {
                display: block;
                padding: 4px 0;
                border: none;
            }
            table.responsive-stack td[data-label]::before {
                content: attr(data-label) ": ";
                font-weight: 600;
                color: #6c757d;
                margin-right: 6px;
            }
            /* Cells without a data-label (e.g. an action-button cell) get no
               prefix — previously they rendered a bare ": ". */
            table.responsive-stack td:not([data-label])::before { content: none; }
            table.responsive-stack td:empty::before { content: none; }
        }

        /* ===== Mobile breakpoint: ≤768px ===== */
        @media (max-width: 768px) {
            /* Typography baseline — 16px body avoids iOS input auto-zoom */
            body { font-size: 16px; }
            .header img { height: 22px; }

            /* Touch targets */
            .nav-link {
                min-height: 44px;
                padding: 10px 14px;
                display: flex;
                align-items: center;
                font-size: 1rem !important;
            }
            .btn { min-height: 44px; }
            .btn-sm { min-height: 38px; }
            input, select, textarea {
                font-size: 16px !important;
                min-height: 40px;
            }

            .jlmops-role-switcher select { font-size: 13px; }

            /* Show the hamburger, hide the sidebar by default */
            .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; }
            .sidebar {
                width: 220px;
                z-index: 1020;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            }
            body.sidebar-open .sidebar { transform: translateX(0); }
            /* Mobile: minimize horizontal padding to maximize content width.
               Bootstrap .container-fluid adds 15px side padding and .row uses -15px
               margins; trim all three together (container 0, row 0, cols 4px) so content
               reaches near the screen edge without row overflow. Global, not per-view —
               feedback_mobile_minimal_side_padding. */
            .content { margin-left: 0; padding: 12px 4px; }
            .content .container-fluid { padding-left: 0; padding-right: 0; }
            .content .row { margin-left: 0; margin-right: 0; }
            .content [class*="col-"], .content .col { padding-left: 4px; padding-right: 4px; }

            /* Hide non-mobile cards */
            [data-viewports]:not([data-viewports~="mobile"]) { display: none !important; }
        }

        /* Desktop-only: hide cards explicitly mobile-only */
        @media (min-width: 769px) {
            [data-viewports]:not([data-viewports~="desktop"]) { display: none !important; }
        }

        /* ===== Design System v2 — global, scoped to .ds-v2 containers ===== */
        .ds-v2 { --ds-go:#4a7a3e; --ds-bg-action:#fcf9f2; --ds-urgent:#c9882c; --ds-delete:#a83920; --ds-muted:#a09489; --ds-header-action:#f4f2e6; }
        /* Tab bars — ap-tab (AdminProductsView) and pv-tab (PublishingView) share the same underline style */
        .ds-v2 .ap-tabs, .ds-v2 .pv-tabs { padding:0; border-radius:0; margin-bottom:8px; border-bottom:2px solid #dee2e6; scrollbar-width:none; }
        .ds-v2 .ap-tabs::-webkit-scrollbar, .ds-v2 .pv-tabs::-webkit-scrollbar { display:none; }
        .ds-v2 .ap-tab, .ds-v2 .pv-tab { border:1px solid transparent !important; border-radius:0 !important; background:none !important; margin-bottom:-2px; padding:6px 10px; border-bottom:3px solid transparent !important; font-size:13px; font-weight:500; color:#495057; cursor:pointer; white-space:nowrap; }
        .ds-v2 .ap-tab.active, .ds-v2 .pv-tab.active { color:var(--ds-go) !important; border-bottom-color:var(--ds-go) !important; font-weight:600; background:none !important; border-top:none !important; }
        .ds-v2 .ap-tab:hover:not(.active), .ds-v2 .pv-tab:hover:not(.active) { color:#212529; border-bottom-color:#adb5bd !important; background:none !important; }
        .ds-v2 .ap-tab.active .badge { background:var(--ds-urgent) !important; color:#fff !important; }
        .ds-v2 .ap-tab:not(.active) .badge { background:#d6cfc8 !important; color:#4a3f36 !important; }
        @media (max-width:576px) { .ds-v2 .ap-tab, .ds-v2 .pv-tab { padding:5px 5px; font-size:11px; } }
        /* Table headers */
        .ds-v2 .thead-light th { background-color:var(--ds-header-action); }
        /* Actionable section wrappers */
        .ds-v2 .ds-action { background:var(--ds-bg-action); border-radius:4px; padding:2px 4px; }
        /* Standalone h6 section labels */
        .ds-v2 h6.ds-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; background:var(--ds-header-action); padding:4px 8px; margin-bottom:8px !important; border:1px solid #dee2e6; border-radius:4px; }
        .ds-v2 h6.ds-label.ds-label-connected { border-bottom:none !important; border-radius:4px 4px 0 0 !important; margin-bottom:0 !important; }
        .ds-v2 h6.ds-label.ds-label-connected + .table-responsive { border-top-left-radius:0 !important; border-top-right-radius:0 !important; border-top:none !important; }
        /* Utility classes */
        .ds-v2 .ds-info-header { color:var(--ds-muted) !important; }
        .ds-v2 .ds-link { color:var(--ds-go); cursor:pointer; }
        .ds-v2 .ds-overdue { color:var(--ds-urgent); font-weight:600; }
        .ds-v2 .ds-destructive { color:var(--ds-delete); }
        .ds-empty-inline { font-size:11px; color:#6c584f; font-weight:400; text-transform:none; letter-spacing:0; }
        .ds-v2 .btn.btn-sm { border-color:#dee2e6; }
        .ds-v2 .btn.btn-sm:hover { border-color:var(--ds-go); color:var(--ds-go); }
        /* Section cards */
        .ds-v2 .ds-section { border:1px solid #dee2e6; border-radius:4px; margin-bottom:12px; overflow:clip; }
        .ds-v2 .ds-section-head { display:flex; align-items:center; justify-content:space-between; background:var(--ds-header-action); padding:4px 8px; border-bottom:1px solid #dee2e6; }
        .ds-v2 .ds-section-head h6 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; border:none !important; border-radius:0 !important; padding:0 !important; margin:0 !important; background:none !important; }
        .ds-v2 .ds-section .table-responsive { border:none !important; border-radius:0 !important; margin-bottom:0 !important; }
        .ds-v2 .ds-section-actions { padding:6px 8px; border-bottom:1px solid #dee2e6; background:#fff; }
        /* Calendar / table overdue row — amber+bold replaces yellow highlight */
        .ds-v2 .pv-cal-overdue td, .ds-v2 .ds-row-overdue td { background:transparent !important; color:var(--ds-urgent); font-weight:600; }
        /* Bootstrap card → ds-v2 theming */
        .ds-v2 .card-header { background:var(--ds-header-action) !important; }
        .ds-v2 .card-header h5 { font-size:13px; font-weight:600; margin:0; }
        .ds-v2 details.card > summary.card-header { list-style:none; }
        .ds-v2 details.card > summary.card-header::-webkit-details-marker { display:none; }
        /* Link-color pass — scope-links (Tasks filter), entity-links (Tasks rows), any plain <a> in ds-v2 */
        .ds-v2 .scope-link, .ds-v2 .scope-link:hover { color:var(--ds-go); }
        .ds-v2 .entity-link, .ds-v2 .entity-link:hover { color:var(--ds-go); }
        .ds-v2 .tw-chip.active { background:var(--ds-go); color:#fff; border-color:var(--ds-go); }
    </style>
</head>
<body>
    <div class="header">
        <button id="hamburger-btn" class="hamburger-btn" type="button" aria-label="Toggle navigation">&#9776;</button>
        <img src="https://jlmwines.com/wp-content/uploads/2025/02/cropped-jlm-wines-black-600.png" alt="JLM Wines" style="height:28px; width:auto; display:block;">
        <div class="jlmops-role-switcher">
            <select id="roleSelect" class="form-control form-control-sm">
                <? for (let r of availableRoles) { ?>
                    <option value="<?= r ?>" <?= r === initialRole ? 'selected' : '' ?>><?= r.charAt(0).toUpperCase() + r.slice(1) ?></option>
                <? } ?>
            </select>
        </div>
        <span id="view-title" class="view-title-label"></span>
    </div>

    <div class="main-body">
      <div class="sidebar">
        <!-- Admin Navigation -->
        <ul id="admin-nav" class="nav flex-column" style="display: none;">
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="switchRole()">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminTasks')">Tasks</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminSyncView')">Sync</a></li> <!-- NEW SYNC LINK -->
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminOrders')">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminInventory')">Inventory</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminProducts')">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('AdminBundles')">Bundles</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('ManagerContacts')">Contacts</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('Publishing')">Publishing</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('Development')">Development</a></li>
        </ul>
        <!-- Manager Navigation -->
        <ul id="manager-nav" class="nav flex-column" style="display: none;">
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="switchRole()">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('ManagerOrders')">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('ManagerInventory')">Inventory</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('ManagerProducts')">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('ManagerContacts')">Contacts</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="loadView('Publishing')">Publishing</a></li>
        </ul>
        <div id="version-footer" class="text-muted small mt-auto" style="padding: 10px 20px; font-size: 0.7rem;"></div>
      </div>

      <div id="content" class="content">
        <!-- Content will be loaded here -->
      </div>
    </div>

    <!-- Off-canvas sidebar backdrop (mobile only); tap dismisses -->
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <script>
      /**
       * Displays an error message.
       */
      function showError(err) {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = `<div class="alert alert-danger">An error occurred: ${err.message}</div>`;
      }

      /**
       * Executes scripts found within an HTML string.
       */
      function executeScriptsInElement(element) {
        const scripts = Array.from(element.getElementsByTagName('script'));
        scripts.forEach(s => {
          const newScript = document.createElement('script');
          newScript.textContent = s.textContent;
          s.parentNode.replaceChild(newScript, s);
        });
      }

      /**
       * Shows/hides navigation links based on role + sets body role class.
       * The body class drives card-visibility CSS so per-view sections can
       * declare data-roles="admin manager" and be filtered automatically.
       */
      function setNavigationForRole(role) {
        const adminNav = document.getElementById('admin-nav');
        const managerNav = document.getElementById('manager-nav');

        document.body.classList.remove('role-admin', 'role-manager');
        document.body.classList.add('role-' + role);

        if (role === 'admin') {
            adminNav.style.display = 'block';
            managerNav.style.display = 'none';
        } else { // Assumes 'manager'
            adminNav.style.display = 'none';
            managerNav.style.display = 'block';
        }
      }

      /** Sidebar open/close (mobile off-canvas) */
      function openSidebar() { document.body.classList.add('sidebar-open'); }
      function closeSidebar() { document.body.classList.remove('sidebar-open'); }
      function toggleSidebar() {
        document.body.classList.toggle('sidebar-open');
      }

      /**
       * Loads a view into the content area and highlights the active navigation link.
       * @param {string} viewName - The name of the view to load.
       * @param {HTMLElement} [linkElement] - The navigation link element that was clicked.
       */
      const VIEW_LABELS = {
        AdminDashboard: '', ManagerDashboard: '',
        AdminTasks: 'Tasks', AdminSyncView: 'Sync',
        AdminOrders: 'Orders', AdminInventory: 'Inventory',
        AdminProducts: 'Products', AdminBundles: 'Bundles',
        ManagerContacts: 'Contacts', Publishing: 'Publishing',
        Development: 'Development',
        ManagerOrders: 'Orders', ManagerInventory: 'Inventory',
        ManagerProducts: 'Products',
      };

      function loadView(viewName, linkElement) {
        const viewContent = document.getElementById('content');
        viewContent.innerHTML = '<h2>Loading...</h2>';

        // Auto-dismiss the off-canvas sidebar on nav click (mobile)
        closeSidebar();

        // View title in header
        const titleEl = document.getElementById('view-title');
        if (titleEl) titleEl.textContent = VIEW_LABELS[viewName] || '';

        // Highlight Navigation
        const activeNavId = document.getElementById('admin-nav').style.display === 'block' ? 'admin-nav' : 'manager-nav';
        const navLinks = document.querySelectorAll(`#${activeNavId} .nav-link`);

        navLinks.forEach(link => {
            link.classList.remove('active');
        });

        let activeLink = linkElement;

        if (!activeLink) {
            if (viewName === 'AdminDashboard' || viewName === 'ManagerDashboard') {
                activeLink = Array.from(navLinks).find(link => link.getAttribute('onclick').includes('switchRole'));
            } else {
                activeLink = Array.from(navLinks).find(link => link.getAttribute('onclick').includes(`'${viewName}'`));
            }
        }

        if (activeLink) activeLink.classList.add('active');

        google.script.run
          .withSuccessHandler(html => {
            viewContent.innerHTML = html;
            executeScriptsInElement(viewContent);
          })
          .withFailureHandler(showError)
          .getView(viewName);
      }
      
      /**
       * Handles the role change event.
       */
      function switchRole() {
        const selectedRole = document.getElementById('roleSelect').value;
        setNavigationForRole(selectedRole);

        if (selectedRole === 'admin') {
            loadView('AdminDashboard');
        } else if (selectedRole === 'manager') {
            loadView('ManagerDashboard');
        } else {
            document.getElementById('content').innerHTML = '<h2>Invalid Role</h2>';
        }
      }

      // Initial setup on page load
      window.onload = function() {
        // Add event listener to the dropdown
        document.getElementById('roleSelect').addEventListener('change', switchRole);

        // Hamburger toggle + backdrop tap-to-dismiss (mobile)
        document.getElementById('hamburger-btn').addEventListener('click', toggleSidebar);
        document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);

        // Load the initial view and set navigation based on the role passed from the server
        const initialRole = document.getElementById('roleSelect').value;
        setNavigationForRole(initialRole);
        if (initialRole === 'admin') {
            loadView('AdminDashboard');
        } else if (initialRole === 'manager') {
            loadView('ManagerDashboard');
        }

        // Version footer
        google.script.run
          .withSuccessHandler(function(v) {
            document.getElementById('version-footer').textContent = 'v' + v.built;
          })
          .getVersion();
      };
    </script>
</body>
</html>
