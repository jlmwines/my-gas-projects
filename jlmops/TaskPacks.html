<!--
  TaskPacks — shared task "pack" kit (the DO surface for a task).

  Owns the per-type pack body dispatcher (packBody), the action handlers, and
  the Lock+Version / Attach-Doc modals. Extracted verbatim from LibraryView
  (Deploy A of ADMIN_TASK_UI_PLAN) so both LibraryView and the future
  AdminTasksView render and act on tasks identically.

  Host contract — call once after the host's data is available:
    TaskPacks.configure({
      getTask:   function(id)   { return <task object or null>; },
      getEntity: function(slug) { return <library entity or null>; },  // content-edit Doc links
      refresh:   function()     { <light re-render, e.g. host renderTasks> },
      reload:    function()     { <full server reload, e.g. host load> }
    });
  Then call TaskPacks.packBody(task) for the expanded body, and let the
  generated TaskPacks.* onclicks drive the handlers. Depends on the shared
  TaskWidgets kit and a global loadView() (both present in every kit host).
-->
<script>
  window.TaskPacks = (function() {
    // Host-injected context (configure() overrides these no-op defaults).
    var ctx = {
      getTask:   function() { return null; },
      getEntity: function() { return null; },
      refresh:   function() {},
      reload:    function() {},
      hideNotes: false   // host opt: omit the pack's own Notes where the host
                         // already renders an editable Notes field (AdminTasksView
                         // MANAGE form) — avoids a duplicate Notes (Step 8).
    };
    var wired = false;

    function configure(opts) {
      if (opts) {
        if (opts.getTask)   ctx.getTask   = opts.getTask;
        if (opts.getEntity) ctx.getEntity = opts.getEntity;
        if (opts.refresh)   ctx.refresh   = opts.refresh;
        if (opts.reload)    ctx.reload    = opts.reload;
        if (opts.hideNotes !== undefined) ctx.hideNotes = !!opts.hideNotes;
      }
      // Wire the modal buttons once (the modals live in this include's markup).
      if (!wired) {
        var lockNoBtn = document.getElementById('lv-btn-lock-no');
        if (lockNoBtn) lockNoBtn.addEventListener('click', function() { submitLock(false); });
        var lockYesBtn = document.getElementById('lv-btn-lock-yes');
        if (lockYesBtn) lockYesBtn.addEventListener('click', function() { submitLock(true); });
        var lockCancelBtn = document.getElementById('lv-btn-lock-cancel');
        if (lockCancelBtn) lockCancelBtn.addEventListener('click', function() {
          document.getElementById('lvLockModal').style.display = 'none';
        });
        var attachSubmitBtn = document.getElementById('lv-btn-attach-submit');
        if (attachSubmitBtn) attachSubmitBtn.addEventListener('click', submitAttachDoc);
        wired = true;
      }
    }

    // Single source of truth for which pack a task type renders. packBody()
    // dispatches on this, and hasTypedPack() lets a host (manager dashboard) tell
    // skeleton-fallback tasks apart from typed packs so it can supply its own
    // status control where the pack offers none. Source: jlmops/plans/LIBRARY_VIEW_PLAN.md.
    function packKind(typeId) {
      var t = typeId || '';
      if (t.indexOf('task.confirmation.') === 0 || t === 'task.sync.daily_session') return 'confirmation';
      if (t === 'task.order.packing_available') return 'deeplink_orders';
      if (t === 'task.inventory.count' || t === 'task.inventory.brurya_update') return 'deeplink_inventory';
      if (t === 'task.content.edit' ||
          t === 'task.content.translate' ||
          t === 'task.content.translate_edit' ||
          t === 'task.content.images' ||
          t === 'task.content.print_newsletter_body' ||
          t === 'task.content.draft' ||
          t === 'task.content.video_create' ||
          t === 'task.content.realign' ||
          t === 'task.content.print.create-en' ||
          t === 'task.content.print.create-he' ||
          t === 'task.content.email.create-en' ||
          t === 'task.content.email.create-he') return 'content_edit';
      if (t === 'task.content.print.distribute') return 'confirmation';
      if (t === 'task.content.blog_publish' ||
          t === 'task.content.video_publish' ||
          t === 'task.content.email' ||
          t === 'task.content.social' ||
          t === 'task.content.whatsapp' ||
          t === 'task.newsletter.distribute' ||
          t === 'task.content.email.send') return 'content_publish';
      return 'skeleton';
    }

    // True when the type renders a real pack (with its own action), false when it
    // falls to the read-only skeleton fallback. Hosts use this to decide whether
    // they must supply a status-transition control of their own.
    function hasTypedPack(typeId) { return packKind(typeId) !== 'skeleton'; }

    // The pack's own Notes block. Suppressed when ctx.hideNotes (host renders its
    // own editable Notes — AdminTasksView MANAGE form). `readonly` for the skeleton
    // fallback, which has no save path of its own.
    function notesBlock(t, stopProp, readonly) {
      if (ctx.hideNotes) return '';
      var notesId = 'lv-notes-' + TaskWidgets.escape(t.id);
      var attrs = readonly ? ' readonly' : ' id="' + notesId + '"';
      return '  <div class="detail-row"' + stopProp + '><div style="flex:1"><label>Notes</label>' +
             '    <textarea class="tw-notes"' + attrs + '>' + TaskWidgets.escape(t.notes) + '</textarea>' +
             '  </div></div>';
    }

    // Pack body dispatcher — returns HTML for the expanded inline body per
    // task type (keyed by packKind). Source: jlmops/plans/LIBRARY_VIEW_PLAN.md pack table.
    function packBody(t) {
      var typeId = t.typeId || '';
      var kind = packKind(typeId);
      var stopProp = ' onclick="event.stopPropagation()"';

      // Confirmation pack: notes + "Mark Confirmed" button → closes task.
      if (kind === 'confirmation') {
        var btnDisabled = (t.status === 'Done') ? ' disabled' : '';
        var btnLabel = (t.status === 'Done') ? 'Confirmed' : 'Mark Confirmed';
        var h = '';
        h += notesBlock(t, stopProp, false);
        h += '  <div class="detail-row"' + stopProp + '>';
        h += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.confirmTask(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabled + '>' + btnLabel + '</button>';
        h += '  </div>';
        return h;
      }

      // Deep-link packs: button to target view.
      if (kind === 'deeplink_orders') {
        return '<div class="detail-row"' + stopProp + '>' +
               '<button type="button" class="btn btn-sm" onclick="TaskPacks.openView(\'ManagerOrders\')">Open Orders</button>' +
               '<span class="detail-meta" style="margin-left:12px">Task closes via the packing-slips workflow.</span>' +
               '</div>';
      }
      if (kind === 'deeplink_inventory') {
        var label = typeId === 'task.inventory.brurya_update' ? 'Open Inventory (Brurya)' : 'Open Inventory';
        return '<div class="detail-row"' + stopProp + '>' +
               '<button type="button" class="btn btn-sm" onclick="TaskPacks.openView(\'ManagerInventory\')">' + label + '</button>' +
               '<span class="detail-meta" style="margin-left:12px">Task closes via the inventory workflow.</span>' +
               '</div>';
      }

      // Content edit pack — file link + lock; covers 8 content task types per
      // LIBRARY_VIEW_PLAN Type packs table. Translate variants add an "Open EN
      // source" link via slug-pair flip.
      if (kind === 'content_edit') {
        var entity = ctx.getEntity(t.entityId);
        var btnDisabledE = (t.status === 'Done') ? ' disabled' : '';
        var hE = '';
        hE += '  <div class="detail-row"' + stopProp + '>';
        if (entity && entity.docUrl) {
          hE += '    <a class="tw-file-link" href="' + TaskWidgets.escape(entity.docUrl) + '" target="_blank" rel="noopener">Open Doc</a>';
          hE += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.attachExistingDoc(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledE + '>Attach new version</button>';
        } else {
          hE += '    <span class="tw-file-link empty">No Doc yet</span>';
          hE += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.createBlankDoc(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledE + '>Create Doc</button>';
          hE += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.attachExistingDoc(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledE + '>Attach existing Doc</button>';
        }
        // Translate variant — link to EN source (the peer entity).
        if (typeId === 'task.content.translate' || typeId === 'task.content.translate_edit') {
          var slugStr = String(t.entityId || '');
          var enPeerSlug = null;
          if (slugStr.length > 3 && slugStr.slice(-3) === '-he') enPeerSlug = slugStr.slice(0, -3) + '-en';
          if (enPeerSlug) {
            var enPeer = ctx.getEntity(enPeerSlug);
            if (enPeer && enPeer.docUrl) {
              hE += '    <a class="tw-file-link" href="' + TaskWidgets.escape(enPeer.docUrl) + '" target="_blank" rel="noopener">Open EN source</a>';
              hE += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.createTranslationDraft(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledE + '>Create translation text</button>';
            } else {
              hE += '    <span class="tw-file-link empty">EN source not attached yet</span>';
            }
          }
        }
        hE += '  </div>';
        hE += notesBlock(t, stopProp, false);
        hE += '  <div class="detail-row"' + stopProp + '>';
        hE += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.openLockModal(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledE + '>Editing Done</button>';
        if (entity) {
          hE += '    <span class="detail-meta">Status: ' + TaskWidgets.escape(entity.state || '—') + '</span>';
        }
        hE += '  </div>';
        return hE;
      }

      // Content publish pack — Confirmation-pack variant with optional external URL.
      if (kind === 'content_publish') {
        var urlIdP = 'lv-ext-url-' + TaskWidgets.escape(t.id);
        var btnDisabledP = (t.status === 'Done') ? ' disabled' : '';
        var btnLabelP = (t.status === 'Done') ? 'Published' : 'Mark Published';
        var hP = '';
        hP += '  <div class="detail-row"' + stopProp + '><div style="flex:1"><label>External URL <small class="text-muted">(optional — logged to entity activity)</small></label>';
        hP += '    <input type="url" class="form-control form-control-sm" id="' + urlIdP + '" placeholder="https://..." />';
        hP += '  </div></div>';
        hP += notesBlock(t, stopProp, false);
        hP += '  <div class="detail-row"' + stopProp + '>';
        hP += '    <button type="button" class="btn btn-sm" onclick="TaskPacks.markPublished(\'' + TaskWidgets.escape(t.id) + '\')"' + btnDisabledP + '>' + btnLabelP + '</button>';
        hP += '  </div>';
        return hP;
      }

      // Skeleton fallback — read-only notes; no action.
      var h2 = '';
      h2 += notesBlock(t, stopProp, true);
      h2 += '  <div class="detail-row detail-meta">No pack yet — actions land in subsequent build steps.</div>';
      return h2;
    }

    function confirmTask(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (task.status === 'Done') { TaskWidgets.toast('Already confirmed'); return; }
      var notesEl = document.getElementById('lv-notes-' + taskId);
      var newNotes = notesEl ? notesEl.value : task.notes;

      var afterUpdate = function() {
        google.script.run
          .withSuccessHandler(function() {
            task.status = 'Done';
            task.doneDate = new Date().toISOString();
            task.notes = newNotes;
            TaskWidgets.toast('Confirmed');
            ctx.refresh();
          })
          .withFailureHandler(function(err) {
            TaskWidgets.toast(err && err.message ? err.message : 'Confirm failed', true);
          })
          .WebAppTasks_completeTaskById(taskId);
      };

      if (notesEl && newNotes !== task.notes) {
        google.script.run
          .withSuccessHandler(afterUpdate)
          .withFailureHandler(function(err) {
            TaskWidgets.toast(err && err.message ? err.message : 'Notes update failed', true);
          })
          .WebAppTasks_updateTask(taskId, { notes: newNotes });
      } else {
        afterUpdate();
      }
    }

    function openView(viewName) {
      if (typeof loadView === 'function') loadView(viewName);
    }

    function createBlankDoc(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (!task.entityId) { TaskWidgets.toast('Task has no entity', true); return; }
      TaskWidgets.confirm('Create a Doc for "' + task.entityId + '" (seeded with any existing content)?', function() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.ok) {
            TaskWidgets.toast((result && result.error) || 'Create failed', true);
            return;
          }
          TaskWidgets.toast('Doc created');
          ctx.reload();
        })
        .withFailureHandler(function(err) {
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_createBlankDoc({ entityId: task.entityId });
      });
    }

    function attachExistingDoc(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (!task.entityId) { TaskWidgets.toast('Task has no entity', true); return; }
      document.getElementById('lv-attach-slug').textContent = task.entityId;
      document.getElementById('lv-attach-url').value = '';
      var modal = document.getElementById('lvAttachModal');
      modal.setAttribute('data-task-id', task.id);
      modal.style.display = 'flex';
    }

    function submitAttachDoc() {
      var modal = document.getElementById('lvAttachModal');
      var taskId = modal.getAttribute('data-task-id');
      var task = ctx.getTask(taskId);
      if (!task) return;
      var url = document.getElementById('lv-attach-url').value.trim();
      if (!url) { TaskWidgets.toast('Drive URL required', true); return; }
      var btn = document.getElementById('lv-btn-attach-submit');
      btn.disabled = true; btn.textContent = 'Attaching...';
      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false; btn.textContent = 'Attach';
          if (!result || !result.ok) {
            TaskWidgets.toast((result && result.error) || 'Attach failed', true);
            return;
          }
          modal.style.display = 'none';
          TaskWidgets.toast(result.superseded ? 'New version attached, previous archived' : 'Doc attached');
          ctx.reload();
        })
        .withFailureHandler(function(err) {
          btn.disabled = false; btn.textContent = 'Attach';
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_attachExistingDoc({ entityId: task.entityId, driveUrl: url });
    }

    function createTranslationDraft(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (!task.entityId) { TaskWidgets.toast('Task has no entity', true); return; }
      TaskWidgets.confirm('Create a fresh Hebrew draft from the English Doc? Any current Hebrew draft is archived.', function() {
        TaskWidgets.toast('Creating translation draft...');
        google.script.run
          .withSuccessHandler(function(result) {
            if (!result || !result.ok) {
              TaskWidgets.toast((result && result.error) || 'Failed', true);
              return;
            }
            TaskWidgets.toast(result.superseded ? 'Translation draft created, previous archived' : 'Translation draft created');
            ctx.reload();
          })
          .withFailureHandler(function(err) {
            TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
          })
          .WebAppLibrary_createTranslationDraft({ heEntityId: task.entityId });
      });
    }

    function openLockModal(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (!task.entityId) { TaskWidgets.toast('Task has no entity', true); return; }
      var slug = String(task.entityId);
      var peerSlug = null;
      if (slug.length > 3 && slug.slice(-3) === '-en') peerSlug = slug.slice(0, -3) + '-he';
      else if (slug.length > 3 && slug.slice(-3) === '-he') peerSlug = slug.slice(0, -3) + '-en';
      // Name the peer's language (Hebrew/English) so the prompt + button read
      // plainly in both directions — EN is the source, HE the translation, but the
      // language name is correct whichever side is being edited.
      var peerLang = peerSlug ? (peerSlug.slice(-3) === '-he' ? 'Hebrew' : 'English') : '';
      var peerRow = document.getElementById('lv-lock-peer-row');
      var yesBtn = document.getElementById('lv-btn-lock-yes');
      var noBtn = document.getElementById('lv-btn-lock-no');
      if (peerSlug) {
        document.getElementById('lv-lock-peer-lang').textContent = peerLang;
        yesBtn.textContent = 'Yes, update ' + peerLang;
        noBtn.textContent = 'No, just finish';
        peerRow.style.display = '';
        yesBtn.style.display = '';
      } else {
        noBtn.textContent = 'Done';
        peerRow.style.display = 'none';
        yesBtn.style.display = 'none';
      }
      var modal = document.getElementById('lvLockModal');
      modal.setAttribute('data-task-id', taskId);
      modal.style.display = 'flex';
    }

    function submitLock(peerNeedsRealignment) {
      var modal = document.getElementById('lvLockModal');
      var taskId = modal.getAttribute('data-task-id');
      var task = ctx.getTask(taskId);
      if (!task) return;
      var noBtn = document.getElementById('lv-btn-lock-no');
      var yesBtn = document.getElementById('lv-btn-lock-yes');
      noBtn.disabled = true; yesBtn.disabled = true;
      google.script.run
        .withSuccessHandler(function(result) {
          noBtn.disabled = false; yesBtn.disabled = false;
          if (!result || !result.ok) {
            TaskWidgets.toast((result && result.error) || 'Lock failed', true);
            return;
          }
          modal.style.display = 'none';
          var relCount = (result.updated && result.updated.related_tasks) ? result.updated.related_tasks.length : 0;
          TaskWidgets.toast('Editing done' + (relCount ? ' (+ update task created)' : ''));
          ctx.reload();
        })
        .withFailureHandler(function(err) {
          noBtn.disabled = false; yesBtn.disabled = false;
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_lockVersion({
          entityId: task.entityId,
          taskId: task.id,
          peerNeedsRealignment: !!peerNeedsRealignment
        });
    }

    function markPublished(taskId) {
      var task = ctx.getTask(taskId);
      if (!task) { TaskWidgets.toast('Task not found', true); return; }
      if (task.status === 'Done') { TaskWidgets.toast('Already published'); return; }

      var notesEl = document.getElementById('lv-notes-' + taskId);
      var urlEl = document.getElementById('lv-ext-url-' + taskId);
      var newNotes = notesEl ? notesEl.value : task.notes;
      var externalUrl = urlEl ? urlEl.value.trim() : '';

      var doActivityLog = function() {
        // Transition the entity to 'published' (Step 6 auto-transition) and log
        // it — server-side, with or without an external URL. Skip for URL-entity
        // / entityless tasks (nothing to transition).
        if (task.entityId && String(task.entityId).indexOf('http') !== 0) {
          google.script.run
            .withSuccessHandler(function(result) {
              if (!result || !result.ok) {
                TaskWidgets.toast('Task closed; publish update failed: ' + ((result && result.error) || ''), true);
              } else {
                TaskWidgets.toast(externalUrl ? 'Published + URL logged' : 'Published');
              }
              ctx.reload();
            })
            .withFailureHandler(function(err) {
              TaskWidgets.toast('Task closed; publish update error: ' + (err && err.message ? err.message : ''), true);
              ctx.reload();
            })
            .WebAppLibrary_markPublished({
              entityId: task.entityId,
              externalUrl: externalUrl
            });
        } else {
          TaskWidgets.toast('Published');
          ctx.reload();
        }
      };

      var doClose = function() {
        google.script.run
          .withSuccessHandler(doActivityLog)
          .withFailureHandler(function(err) {
            TaskWidgets.toast(err && err.message ? err.message : 'Close failed', true);
          })
          .WebAppTasks_completeTaskById(taskId);
      };

      if (notesEl && newNotes !== task.notes) {
        google.script.run
          .withSuccessHandler(doClose)
          .withFailureHandler(function(err) {
            TaskWidgets.toast(err && err.message ? err.message : 'Notes update failed', true);
          })
          .WebAppTasks_updateTask(taskId, { notes: newNotes });
      } else {
        doClose();
      }
    }

    return {
      configure: configure,
      packBody: packBody,
      packKind: packKind,
      hasTypedPack: hasTypedPack,
      confirmTask: confirmTask,
      openView: openView,
      createBlankDoc: createBlankDoc,
      attachExistingDoc: attachExistingDoc,
      createTranslationDraft: createTranslationDraft,
      submitAttachDoc: submitAttachDoc,
      openLockModal: openLockModal,
      submitLock: submitLock,
      markPublished: markPublished
    };
  })();
</script>

<!-- "Editing Done" modal — finishes the edit task (locks + versions the entity)
     and, on Yes, creates an update task on the other-language sibling. Plain copy:
     the buttons say what happens, so no explanatory paragraph. -->
<div class="modal-overlay" id="lvLockModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1050;justify-content:center;align-items:center;">
  <div style="background:white;border-radius:4px;max-width:520px;width:90%;">
    <div style="padding:15px;border-bottom:1px solid #dee2e6;">
      <h6 class="mb-0">Editing Done</h6>
    </div>
    <div style="padding:15px;">
      <p class="mb-2 small">Save your changes and finish this task.</p>
      <div id="lv-lock-peer-row">
        <p class="mb-0">Did this edit also affect the <strong id="lv-lock-peer-lang"></strong> version?</p>
      </div>
    </div>
    <div style="padding:10px 15px;border-top:1px solid #dee2e6;background:#f8f9fa;display:flex;justify-content:flex-end;gap:8px;">
      <button type="button" class="btn btn-sm" id="lv-btn-lock-cancel">Cancel</button>
      <button type="button" class="btn btn-sm btn-light" id="lv-btn-lock-no">No, just finish</button>
      <button type="button" class="btn btn-sm btn-light" id="lv-btn-lock-yes">Yes, update</button>
    </div>
  </div>
</div>

<!-- Attach existing Doc modal — paste Drive URL to link an existing file to entity. -->
<div class="modal-overlay" id="lvAttachModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1050;justify-content:center;align-items:center;">
  <div style="background:white;border-radius:4px;max-width:520px;width:90%;">
    <div style="padding:15px;border-bottom:1px solid #dee2e6;">
      <h6 class="mb-0">Attach existing Doc</h6>
    </div>
    <div style="padding:15px;">
      <p class="mb-2 small">Paste the Drive URL of the existing Doc to attach to <strong id="lv-attach-slug"></strong>. The file will be moved to the canonical library folder and renamed; the Drive URL stays stable.</p>
      <input type="url" class="form-control form-control-sm" id="lv-attach-url" placeholder="https://docs.google.com/document/d/..." />
    </div>
    <div style="padding:10px 15px;border-top:1px solid #dee2e6;background:#f8f9fa;display:flex;justify-content:space-between;">
      <button type="button" class="btn btn-sm btn-light" onclick="document.getElementById('lvAttachModal').style.display='none'">Cancel</button>
      <button type="button" class="btn btn-sm btn-light" id="lv-btn-attach-submit">Attach</button>
    </div>
  </div>
</div>
