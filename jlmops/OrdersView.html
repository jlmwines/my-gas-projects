<?!= include('TaskWidgets') ?>
<div class="container-fluid ds-v2">

    <style>
        /* T4.1 — keep the packing-slip checkbox at a natural size on mobile. The
           global input { min-height:40px; font-size:16px } rule (AppView) otherwise
           stretches the bare checkbox into a tall box once .responsive-stack turns
           the cell into a block. */
        @media (max-width: 768px) {
            #packing-slips-list .order-checkbox {
                min-height: 0;
                width: 22px;
                height: 22px;
                vertical-align: middle;
            }
        }
    </style>

    <!-- Section for Packing Slips (manager-only; admin sees Open Orders only) -->
    <div class="card mb-4" data-roles="manager">
        <div class="card-header">
            <i class="fas fa-file-alt mr-1"></i>
            Packing Slips
        </div>
        <div class="card-body">
            <p>Select order documents to print.</p>
            <div class="d-flex mb-3" style="gap: 8px;">
                <button class="btn" onclick="generateSelectedPackingSlips()">Print Selected</button>
                <button class="btn" id="btn-select-all-packing" onclick="toggleAllPacking()">Select all</button>
            </div>
            <div id="packing-slips-list"></div>
            <div id="print-result" class="mt-3"></div>
        </div>
    </div>

    <!-- Section for Open Orders -->
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="fas fa-box-open mr-1"></i> Open Orders</span>
          <button id="btn-refresh-orders" class="btn btn-sm" onclick="refreshOrders()">Refresh Orders</button>
      </div>
      <div class="card-body">
          <div id="open-orders-list"></div>
          <div id="gift-result" class="mt-3"></div>
      </div>
    </div>

    <!-- Log Reward modal (manager-only) — free-text note on the loyalty-reward gesture -->
    <div class="modal-overlay" id="reward-modal" style="display:none;">
      <div class="modal-container">
        <div class="modal-header">Log Reward</div>
        <div class="form-body">
          <label for="reward-note">Note (which bottle, upgrade vs. add)</label>
          <textarea id="reward-note"></textarea>
        </div>
        <div class="modal-footer bg-light">
          <button class="btn btn-sm" type="button" onclick="ModalOverlay.close('reward-modal')">Cancel</button>
          <button class="btn btn-sm" type="button" id="btn-reward-save">Log Reward</button>
        </div>
      </div>
    </div>
</div>

<script>
  function loadPackingSlipsData() {
    const ordersListDiv = document.getElementById('packing-slips-list');
    ordersListDiv.innerHTML = 'Loading packable orders...';

    try {
      ViewLoading.begin();
      google.script.run
        .withSuccessHandler(orders => {
          ViewLoading.end();
          if (orders.length === 0) {
            ordersListDiv.innerHTML = '<p>No orders are currently ready for packing.</p>';
            return;
          }

          let tableHtml = '<table class="table table-sm table-hover responsive-stack"><thead><tr><th><input type="checkbox" onclick="toggleAll(this)"></th><th>Order #</th><th>Status</th><th>Billing Name</th><th>Shipping Name</th><th>Customer Note</th><th></th></tr></thead><tbody>';
          orders.forEach(order => {
            let giftButton = '';
            if (order.customerNote) {
              giftButton = `<button class="btn btn-sm" onclick="createGiftMessage('${order.orderId}', '${order.customerNote}')">Create Gift Doc</button>`;
            }
            tableHtml += `<tr>
                            <td data-label="Print this order"><input type="checkbox" class="order-checkbox" value="${order.orderId}"></td>
                            <td data-label="Order #">${order.orderNumber || order.orderId}</td>
                            <td data-label="Status">${order.status}</td>
                            <td data-label="Billing">${order.billingName || ''}</td>
                            <td data-label="Shipping">${order.shippingName || ''}</td>
                            <td data-label="Note">${order.customerNote || ''}</td>
                            <td>${giftButton}</td>
                          </tr>`;
          });
          tableHtml += '</tbody></table>';
          ordersListDiv.innerHTML = tableHtml;
        })
        .withFailureHandler(err => {
          ViewLoading.end();
          ordersListDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
        })
        .WebAppOrders_getPackableOrders();
    } catch (e) {
      TaskWidgets.toast('A client-side error occurred: ' + e.message, 'error');
    }
  }

  // Tier badge — copied from AdminContactsView.html's getTypeBadge/getTypeBadgeClass to
  // keep the vip/repeat/new/prospect/noncore color convention consistent across views.
  function getTypeBadge(type) {
    var cls = getTypeBadgeClass(type);
    var label = type ? type.split('.').pop() : 'unknown';
    return '<span class="badge ' + cls + '">' + label + '</span>';
  }
  function getTypeBadgeClass(type) {
    if (!type) return 'badge-secondary';
    if (type.indexOf('vip') >= 0) return 'badge-warning';
    if (type.indexOf('repeat') >= 0) return 'badge-primary';
    if (type.indexOf('new') >= 0) return 'badge-success';
    if (type.indexOf('prospect') >= 0) return 'badge-info';
    if (type.indexOf('noncore') >= 0) return 'badge-secondary';
    return 'badge-light';
  }

  function loadOpenOrdersData() {
    const openOrdersListDiv = document.getElementById('open-orders-list');
    openOrdersListDiv.innerHTML = 'Loading open orders...';

    try {
      ViewLoading.begin();
      google.script.run
        .withSuccessHandler(orders => {
          ViewLoading.end();
          if (orders.length === 0) {
            openOrdersListDiv.innerHTML = '<p>No open orders (on-hold or processing).</p>';
            return;
          }

          let tableHtml = '<table class="table table-sm table-hover responsive-stack"><thead><tr><th>Order ID</th><th>Status</th><th>Order Date</th><th>Billing Name</th><th>Shipping Name</th><th>Shipping City</th><th>Tier</th><th>Last Order</th><th>Spend</th><th>Avg</th><th data-roles="manager"></th></tr></thead><tbody>';
          orders.forEach(order => {
            const email = order.billingEmail || '';
            tableHtml += `<tr>
                            <td data-label="Order ID">${order.orderId}</td>
                            <td data-label="Status">${order.status}</td>
                            <td data-label="Order Date">${order.orderDate}</td>
                            <td data-label="Billing">${order.billingName || ''}</td>
                            <td data-label="Shipping">${order.shippingName || ''}</td>
                            <td data-label="City">${order.shippingCity}</td>
                            <td data-label="Tier" class="oo-tier" data-email="${TaskWidgets.escape(email)}">…</td>
                            <td data-label="Last Order" class="oo-last-order" data-email="${TaskWidgets.escape(email)}">…</td>
                            <td data-label="Spend" class="oo-spend" data-email="${TaskWidgets.escape(email)}">…</td>
                            <td data-label="Avg" class="oo-avg" data-email="${TaskWidgets.escape(email)}">…</td>
                            <td data-roles="manager" data-label="Actions">
                              <button class="btn btn-sm oo-crm-link" data-email="${TaskWidgets.escape(email)}">CRM</button>
                              <button class="btn btn-sm oo-reward-btn" data-email="${TaskWidgets.escape(email)}">Log Reward</button>
                            </td>
                          </tr>`;
          });
          tableHtml += '</tbody></table>';
          openOrdersListDiv.innerHTML = tableHtml;

          openOrdersListDiv.querySelectorAll('.oo-crm-link').forEach(btn => {
            btn.addEventListener('click', () => viewContactCrm(btn.dataset.email));
          });
          openOrdersListDiv.querySelectorAll('.oo-reward-btn').forEach(btn => {
            btn.addEventListener('click', () => openRewardModal(btn.dataset.email));
          });

          // Phase 2: fetch tier/spend for the emails now on screen and fill them in —
          // deliberately separate from the order list itself so this doesn't delay it.
          const emails = orders.map(o => o.billingEmail).filter(Boolean);
          if (emails.length) {
            google.script.run
              .withSuccessHandler(summaries => {
                Object.keys(summaries || {}).forEach(email => {
                  const s = summaries[email];
                  const sel = '[data-email="' + CSS.escape(email) + '"]';
                  const tierEl = openOrdersListDiv.querySelector('.oo-tier' + sel);
                  const lastEl = openOrdersListDiv.querySelector('.oo-last-order' + sel);
                  const spendEl = openOrdersListDiv.querySelector('.oo-spend' + sel);
                  const avgEl = openOrdersListDiv.querySelector('.oo-avg' + sel);
                  if (tierEl) tierEl.innerHTML = getTypeBadge(s.tier);
                  if (lastEl) lastEl.textContent = s.lastOrderDate || '—';
                  if (spendEl) spendEl.textContent = '₪' + Math.round(s.totalSpend || 0).toLocaleString();
                  if (avgEl) avgEl.textContent = '₪' + Math.round(s.avgOrderValue || 0).toLocaleString();
                });
              })
              .withFailureHandler(() => { /* non-critical — leave placeholders as-is */ })
              .WebAppOrders_getContactSummaries(emails);
          }
        })
        .withFailureHandler(err => {
          ViewLoading.end();
          openOrdersListDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
        })
        .WebAppOrders_getOpenOrdersForManager();
    } catch (e) {
      TaskWidgets.toast('A client-side error occurred: ' + e.message, 'error');
    }
  }

  // Deep-links to this contact's record in ManagerContactView (same sessionStorage
  // handoff that view already reads on mount — ManagerContactView.html:635-640).
  function viewContactCrm(email) {
    if (!email) { TaskWidgets.toast('No email on this order.', 'warning'); return; }
    sessionStorage.setItem('selectContactEmail', email);
    loadView('ManagerContacts');
  }

  let rewardEmail = '';
  function openRewardModal(email) {
    if (!email) { TaskWidgets.toast('No email on this order.', 'warning'); return; }
    rewardEmail = email;
    document.getElementById('reward-note').value = '';
    ModalOverlay.open('reward-modal');
  }

  document.getElementById('btn-reward-save').addEventListener('click', function() {
    const note = document.getElementById('reward-note').value.trim();
    if (!note) { TaskWidgets.toast('Enter a note describing the reward.', 'warning'); return; }
    const btn = this;
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    google.script.run
      .withSuccessHandler(function(result) {
        btn.disabled = false;
        btn.textContent = originalText;
        if (result && result.error) { TaskWidgets.toast(result.error, 'error'); return; }
        ModalOverlay.close('reward-modal');
        TaskWidgets.toast('Reward logged.', 'success');
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = originalText;
        TaskWidgets.toast('Failed to log reward: ' + (err && err.message), 'error');
      })
      .WebAppContacts_logActivity(rewardEmail, 'reward.given', note.slice(0, 80), note);
  });

  function toggleAll(source) {
    const checkboxes = document.querySelectorAll('.order-checkbox');
    checkboxes.forEach(checkbox => {
      checkbox.checked = source.checked;
    });
  }

  // Mobile-safe select-all: the <thead> select-all checkbox is hidden by
  // .responsive-stack on mobile, so this button (visible at all widths) toggles
  // every packing-slip checkbox. Toggles to opposite of current (checks all if
  // any are unchecked, else unchecks all).
  function toggleAllPacking() {
    const checkboxes = document.querySelectorAll('#packing-slips-list .order-checkbox');
    const anyUnchecked = Array.from(checkboxes).some(cb => !cb.checked);
    checkboxes.forEach(cb => cb.checked = anyUnchecked);
    const btn = document.getElementById('btn-select-all-packing');
    if (btn) btn.textContent = anyUnchecked ? 'Deselect all' : 'Select all';
  }

  function createGiftMessage(orderId, noteContent) {
    const giftResultDiv = document.getElementById('gift-result');
    giftResultDiv.innerHTML = `Creating gift message for order ${orderId}...`;

    google.script.run
      .withSuccessHandler(docUrl => {
        giftResultDiv.innerHTML = `<div class="alert alert-success">Gift message created for order ${orderId}. <a href="${docUrl}" target="_blank" class="btn btn-sm btn-light ml-2">Open Document</a></div>`;
      })
      .withFailureHandler(err => {
        giftResultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      })
      .WebAppOrders_createGiftMessageDoc(orderId, noteContent);
  }

  function generateSelectedPackingSlips() {
    const printResultDiv = document.getElementById('print-result');
    printResultDiv.innerHTML = 'Generating document...';
    const selectedCheckboxes = document.querySelectorAll('.order-checkbox:checked');
    const orderIds = Array.from(selectedCheckboxes).map(cb => cb.value);

    if (orderIds.length === 0) {
      printResultDiv.innerHTML = '<div class="alert alert-warning">Please select at least one order to print.</div>';
      return;
    }

    google.script.run
      .withSuccessHandler(docUrl => {
        printResultDiv.innerHTML = `<div class="alert alert-success">Successfully generated document. <a href="${docUrl}" target="_blank">Open Document</a></div>`;
        // Refresh the list
        loadPackingSlipsData();
      })
      .withFailureHandler(err => {
        printResultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      })
      .WebAppOrders_generatePackingSlips(orderIds);
  }

  function refreshOrders() {
    const btn = document.getElementById('btn-refresh-orders');
    const originalText = btn.textContent;
    btn.textContent = 'Refreshing...';
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(function(result) {
        btn.textContent = originalText;
        btn.disabled = false;
        loadPackingSlipsData();
        loadOpenOrdersData();
      })
      .withFailureHandler(function(err) {
        btn.textContent = originalText;
        btn.disabled = false;
        TaskWidgets.toast('Refresh failed: ' + err.message, 'error');
      })
      .WebAppOrders_triggerWebOrderImport();
  }

  // Self-execute to load the data as soon as the view is loaded.
  // Packing Slips is manager-only (data-roles="manager"). Role gating is CSS
  // display:none (AppView.html:108), so the card stays in the DOM for admin —
  // gate the fetch on the body role class, not element presence, to actually
  // skip the round-trip for admin.
  if (document.body.classList.contains('role-manager')) {
    loadPackingSlipsData();
  }
  loadOpenOrdersData();

</script>
