        /* Toast Notification Styles */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background-color: #28a745; /* Green for success */
            color: white;
            border-radius: 5px;

            opacity: 1;
            top: 30px;
        }

        /* Count-entry modal overlay. This was MISSING — without it the panel had no
           position / backdrop / height cap and rendered inline at the bottom of the page,
           so Save sat below the fold (scrolling to it triggered pull-to-refresh) and the
           box never separated from the content behind it. Make it a true floating overlay:
           dimmed backdrop, height-capped flex column, body scrolls internally (header +
           footer/Save stay visible), overscroll contained so it can't chain into a page
           refresh. Mirrors the AdminProducts/ManagerProducts pattern; ModalOverlay.open()
           sets display:flex. */
        #count-entry-modal.modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: flex-start;
            padding: 24px 12px; overflow-y: auto;
        }
        #count-entry-modal .modal-container {
            background: #fff; width: 100%; max-width: 480px;
            max-height: 90vh; display: flex; flex-direction: column;
            border-radius: 8px; box-shadow: 0 6px 28px rgba(0,0,0,0.35);
            overflow: hidden;
        }
        #count-entry-modal .modal-header,
        #count-entry-modal .modal-footer { flex: 0 0 auto; }
        #count-entry-modal .form-body {
            flex: 1 1 auto; overflow-y: auto; overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch; padding: 16px;
        }

        /* T4.3 Stage A — card-header button rows wrap instead of overflowing at narrow widths */
        .card-header .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        /* Brurya add-product group: drop the 300px cap on mobile so it (and its dropdown) fit */
        @media (max-width: 768px) {
            .brurya-add-group {
                max-width: 100% !important;
                width: 100%;
            }
        }
        /* Brurya quantity input: fixed on desktop, full-width on mobile */
        .brurya-qty-input { width: 80px; }
        @media (max-width: 768px) {
            .brurya-qty-input { width: 100%; }

            /* Brurya cards on mobile: row 1 = Quantity + SKU; row 2 = Name; # hidden */
            .brurya-table thead { display: none; }
            .brurya-table tbody, .brurya-table tr, .brurya-table td { display: block; }
            .brurya-table tr {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px;
                padding: 8px 4px;
                border-bottom: 1px solid #eee;
            }
            .brurya-table td { border: none; padding: 0; }
            .brurya-table td[data-label="Quantity"] { flex: 0 0 5.5rem; }      /* qty input */
            .brurya-table td[data-label="SKU"] { flex: 1 1 auto; color: #6c757d; }
            .brurya-table td[data-label="Name"] { flex: 0 0 100%; font-weight: 500; }
            .brurya-table td[data-label="#"] { display: none; }                /* row number not useful on mobile */
        }

        /* T4.3 Stage B — Product Counts on mobile: collapse to a compact list
           (Product Name + SKU + status checkbox); tapping a row opens the
           count-entry modal. Hide the read-only/input/toggle columns + detail row. */
        @media (max-width: 768px) {
            .products-count-table th:nth-child(1),  .products-count-table td:nth-child(1),   /* Comax */
            .products-count-table th:nth-child(2),  .products-count-table td:nth-child(2),   /* Total */
            .products-count-table th:nth-child(3),  .products-count-table td:nth-child(3),   /* Brurya */
            .products-count-table th:nth-child(4),  .products-count-table td:nth-child(4),   /* Storage */
            .products-count-table th:nth-child(5),  .products-count-table td:nth-child(5),   /* Office */
            .products-count-table th:nth-child(6),  .products-count-table td:nth-child(6),   /* Shop */
            .products-count-table th:nth-child(7),  .products-count-table td:nth-child(7),   /* Vintage */
            .products-count-table th:nth-child(8),  .products-count-table td:nth-child(8),   /* Link */
            .products-count-table th:nth-child(11), .products-count-table td:nth-child(11) { /* details toggle */
                display: none;
            }
            .products-count-table tbody tr[data-task-id] { cursor: pointer; }
            .products-count-table .product-details-row { display: none !important; }

            /* Count-entry modal: give the footer breathing room on mobile so the
               Save / Save & next buttons aren't flush against the bottom edge and
               stay easy to tap after entering a count. */
            #count-entry-modal .modal-footer {
                flex-wrap: wrap;
                gap: 8px;
                padding-bottom: 28px;
            }
            #count-entry-modal .modal-footer .btn { min-height: 44px; }
        }
    </style>

    <script>
        function switchInvTab(tab) {
            ['counts', 'brurya'].forEach(function(t) {
                const panel = document.getElementById('inv-panel-' + t);
                const btn = document.getElementById('inv-tab-' + t);
                if (panel) panel.style.display = (t === tab) ? '' : 'none';
                if (btn) btn.classList.toggle('active', t === tab);
            });
        }

        function toggleInvCard(bodyId, chevId) {
            const body = document.getElementById(bodyId);
            const chev = document.getElementById(chevId);
            if (!body) return;
            const opening = body.style.display === 'none';
            body.style.display = opening ? '' : 'none';
            if (chev) chev.innerHTML = opening ? '&#9662;' : '&#9656;';
        }

        (function() {
            const addProductInput = document.getElementById('brurya-add-product-input');
            const addProductBtn = document.getElementById('brurya-add-product-button');
            const saveBtn = document.getElementById('brurya-save-button');
            const listDiv = document.getElementById('brurya-inventory-list');
            let debounceTimer;
            let selectedProduct = null;

            // --- Product Counts Logic ---
            const productCountsListDiv = document.getElementById('product-counts-list');
            const submitCountsBtn = document.getElementById('submit-selected-counts-btn');

            function loadProductCountsData() {
                productCountsListDiv.innerHTML = 'Loading products for count...';
                google.script.run
                    .withSuccessHandler(renderProductCountsTable)
                    .withFailureHandler(err => {
                        showToast(`Error loading products for count: ${err.message}`, 'error');
                        productCountsListDiv.innerHTML = `<p class="text-danger">Error: ${err.message}</p>`;
                    })
                    .WebAppInventory_getProductsForCount();
            }

            function renderProductCountsTable(productsToCount) {
                if (!productsToCount || productsToCount.length === 0) {
                    productCountsListDiv.innerHTML = '<p>No products currently assigned for counting.</p>';
                    submitCountsBtn.disabled = true;
                    try { sessionStorage.removeItem(COUNT_DRAFT_KEY); } catch (e) {} // nothing to count -> drop stale drafts
                    return;
                }

                const escapeAttr = (s) => String(s || '').replace(/"/g, '&quot;');

                let tableHtml = `
                    <table class="table table-hover table-sm products-count-table">
                        <thead>
                            <tr>
                                <th class="text-center">Comax</th>
                                <th class="text-center">Total</th>
                                <th class="text-center">Brurya</th>
                                <th class="text-center">Storage</th>
                                <th class="text-center">Office</th>
                                <th class="text-center">Shop</th>
                                <th class="text-center">Vintage</th>
                                <th class="text-center">Link</th>
                                <th class="text-center">SKU</th>
                                <th class="text-right">Product Name</th>
                                <th class="text-center"></th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                productsToCount.forEach(item => {
                    const formatVal = (v) => (v === null || v === undefined || v === '') ? '' : v;

                    const valStorage = formatVal(item.storageQty);
                    const valOffice = formatVal(item.officeQty);
                    const valShop = formatVal(item.shopQty);

                    const isChecked = (valStorage !== '' || valOffice !== '' || valShop !== '') ? 'checked' : '';
                    const pageLink = item.pageUrl
                        ? `<a href="${escapeAttr(item.pageUrl)}" target="_blank" rel="noopener">view</a>`
                        : '';
                    const vintageRef = escapeAttr(item.vintage || '');

                    tableHtml += `
                        <tr data-task-id="${item.taskId}" data-sku="${item.sku}" data-comax-qty="${item.comaxQty}" data-vintage-ref="${vintageRef}" data-product-name="${escapeAttr(item.productName || '')}">
                            <td class="text-center">${item.comaxQty}</td>
                            <td class="text-center" id="total-qty-${item.sku}">${item.totalQty}</td>
                            <td class="text-center">${item.bruryaQty}</td>
                            <td style="width: 8%;"><input type="text" class="form-control form-control-sm product-count-input" data-qty-type="storage" value="${valStorage}"></td>
                            <td style="width: 8%;"><input type="text" class="form-control form-control-sm product-count-input" data-qty-type="office" value="${valOffice}"></td>
                            <td style="width: 8%;"><input type="text" class="form-control form-control-sm product-count-input" data-qty-type="shop" value="${valShop}"></td>
                            <td class="text-center">${escapeAttr(item.vintage || '')}</td>
                            <td class="text-center">${pageLink}</td>
                            <td class="text-center">${item.sku}</td>
                            <td class="text-right">${item.productName}</td>
                            <td class="text-center"><button type="button" class="btn btn-light btn-sm product-details-toggle" data-sku="${item.sku}">…</button></td>
                            <td><input type="checkbox" class="product-count-checkbox" ${isChecked} disabled></td>
                        </tr>
                        <tr class="product-details-row" data-sku="${item.sku}" style="display: none; background: #fafafa;">
                            <td colspan="12">
                                <div class="form-row align-items-center">
                                    <div class="col-auto">
                                        <label class="small mb-0 mr-1">Vintage (actual):</label>
                                        <input type="text" class="form-control form-control-sm product-vintage-input" data-sku="${item.sku}" style="width: 80px; display: inline-block;">
                                    </div>
                                    <div class="col">
                                        <label class="small mb-0 mr-1">Comment:</label>
                                        <input type="text" class="form-control form-control-sm product-comment-input" data-sku="${item.sku}" placeholder="Note for admin (creates vintage update task)">
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tableHtml += `
                        </tbody>
                    </table>
                `;
                productCountsListDiv.innerHTML = tableHtml;

                productCountsListDiv.querySelectorAll('.product-details-toggle').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const sku = e.target.dataset.sku;
                        const detailRow = productCountsListDiv.querySelector(`tr.product-details-row[data-sku="${sku}"]`);
                        if (detailRow) {
                            detailRow.style.display = detailRow.style.display === 'none' ? '' : 'none';
                        }
                    });
                });

                productCountsListDiv.querySelectorAll('.product-vintage-input, .product-comment-input').forEach(input => {
                    input.addEventListener('input', (e) => {
                        const sku = e.target.dataset.sku;
                        const mainRow = productCountsListDiv.querySelector(`tr[data-task-id][data-sku="${sku}"]`);
                        if (!mainRow) return;
                        const checkbox = mainRow.querySelector('.product-count-checkbox');
                        const vintageVal = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`).value;
                        const commentVal = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`).value;
                        const storageInput = mainRow.querySelector('[data-qty-type="storage"]').value;
                        const officeInput = mainRow.querySelector('[data-qty-type="office"]').value;
                        const shopInput = mainRow.querySelector('[data-qty-type="shop"]').value;
                        if (storageInput || officeInput || shopInput || vintageVal || commentVal) {
                            checkbox.checked = true;
                        } else {
                            checkbox.checked = false;
                        }
                        updateSubmitButtonState();
                    });
                });

                // Add event listeners for quantity input and checkboxes
                productCountsListDiv.querySelectorAll('.product-count-input').forEach(input => {
                    input.addEventListener('input', (e) => {
                        const row = e.target.closest('tr');
                        const checkbox = row.querySelector('.product-count-checkbox');
                        const storageInput = row.querySelector('[data-qty-type="storage"]').value;
                        const officeInput = row.querySelector('[data-qty-type="office"]').value;
                        const shopInput = row.querySelector('[data-qty-type="shop"]').value;

                        // Auto-check if any value is entered
                        if (storageInput || officeInput || shopInput) {
                            checkbox.checked = true;
                        } else {
                            checkbox.checked = false;
                        }

                        // Live update total
                        const bruryaQty = parseFloat(row.cells[2].textContent) || 0;
                        const storageQty = parseFloat(storageInput) || 0;
                        const officeQty = parseFloat(officeInput) || 0;
                        const shopQty = parseFloat(shopInput) || 0;
                        row.querySelector(`#total-qty-${row.dataset.sku}`).textContent = bruryaQty + storageQty + officeQty + shopQty;

                        updateSubmitButtonState();
                    });
                });

                productCountsListDiv.querySelectorAll('.product-count-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', updateSubmitButtonState);
                });

                // T4.3: on mobile, tapping a product row opens the focused count-entry modal
                // (the inline input columns are hidden on mobile). Desktop keeps inline editing.
                productCountsListDiv.querySelectorAll('tr[data-task-id]').forEach(row => {
                    row.addEventListener('click', (e) => {
                        if (window.innerWidth > 768) return;
                        if (e.target.closest('input, button, a')) return; // don't hijack control taps
                        openCountEntryModal(row);
                    });
                });

                updateSubmitButtonState(); // Initial state check

                restoreCountDrafts(); // A0: rehydrate any in-progress counts saved before a reload

                const badge = document.getElementById('badge-counts');
                if (badge) { badge.textContent = productsToCount.length; badge.className = 'badge badge-pill ml-2 badge-info'; }
                const tabBadge = document.getElementById('inv-badge-counts');
                if (tabBadge) tabBadge.textContent = productsToCount.length;
                if (document.getElementById('productCountsCollapse').style.display === 'none') toggleInvCard('productCountsCollapse', 'chev-counts');
            }

            // --- T4.3 mobile count-entry modal ---
            function openCountEntryModal(row) {
                const sku = row.dataset.sku;
                const vintageEl = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`);
                const commentEl = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`);
                document.getElementById('count-entry-product-name').textContent = row.dataset.productName || row.cells[9].textContent.trim();
                document.getElementById('count-entry-sku').textContent = sku;
                document.getElementById('count-entry-comax').textContent = row.dataset.comaxQty || '—';
                document.getElementById('count-entry-total').textContent = row.cells[1].textContent.trim();   // Total column
                document.getElementById('count-entry-brurya').textContent = row.cells[2].textContent.trim();  // Brurya column
                document.getElementById('count-entry-storage').value = row.querySelector('[data-qty-type="storage"]').value;
                document.getElementById('count-entry-office').value = row.querySelector('[data-qty-type="office"]').value;
                document.getElementById('count-entry-shop').value = row.querySelector('[data-qty-type="shop"]').value;
                document.getElementById('count-entry-vintage').value = vintageEl ? vintageEl.value : '';
                document.getElementById('count-entry-comment').value = commentEl ? commentEl.value : '';
                document.getElementById('count-entry-modal').dataset.activeSku = sku;
                ModalOverlay.open('count-entry-modal');          // CCP-UI-8: focus mgmt + Esc + scroll-lock
                document.getElementById('count-entry-storage').focus();
            }

            function saveCountEntry(advanceToNext) {
                const modal = document.getElementById('count-entry-modal');
                const sku = modal.dataset.activeSku;
                const row = productCountsListDiv.querySelector(`tr[data-task-id][data-sku="${sku}"]`);
                if (row) {
                    const storageEl = row.querySelector('[data-qty-type="storage"]');
                    storageEl.value = document.getElementById('count-entry-storage').value;
                    row.querySelector('[data-qty-type="office"]').value = document.getElementById('count-entry-office').value;
                    row.querySelector('[data-qty-type="shop"]').value = document.getElementById('count-entry-shop').value;
                    const vintageEl = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`);
                    if (vintageEl) vintageEl.value = document.getElementById('count-entry-vintage').value;
                    const commentEl = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`);
                    if (commentEl) commentEl.value = document.getElementById('count-entry-comment').value;
                    // Fire the existing listeners: storage 'input' recomputes Total + checkbox (from qty
                    // fields); vintage 'input' recomputes the checkbox including vintage/comment.
                    storageEl.dispatchEvent(new Event('input', { bubbles: true }));
                    if (vintageEl) vintageEl.dispatchEvent(new Event('input', { bubbles: true }));
                }
                if (advanceToNext) {
                    const allRows = Array.from(productCountsListDiv.querySelectorAll('tr[data-task-id]'));
                    const idx = allRows.findIndex(r => r.dataset.sku === sku);
                    const nextRow = allRows.slice(idx + 1).find(r => !r.querySelector('.product-count-checkbox').checked);
                    if (nextRow) { openCountEntryModal(nextRow); return; }
                }
                ModalOverlay.close('count-entry-modal');
            }

            function updateSubmitButtonState() {
                const checkedBoxes = productCountsListDiv.querySelectorAll('.product-count-checkbox:checked');
                submitCountsBtn.disabled = checkedBoxes.length === 0;
            }

            function handleSubmitSelectedCounts() {
              function proceed() {
                submitCountsBtn.disabled = true;
                submitCountsBtn.textContent = 'Submitting...';

                const selectedCounts = [];
                productCountsListDiv.querySelectorAll('tr[data-task-id]').forEach(row => {
                    const checkbox = row.querySelector('.product-count-checkbox');
                    if (checkbox.checked) {
                        const taskId = row.dataset.taskId;
                        const sku = row.dataset.sku;
                        const productName = row.dataset.productName || '';
                        const comaxStock = parseInt(row.dataset.comaxQty, 10);
                        const vintageRef = row.dataset.vintageRef || '';
                        const storageQty = parseInt(row.querySelector('[data-qty-type="storage"]').value, 10) || 0;
                        const officeQty = parseInt(row.querySelector('[data-qty-type="office"]').value, 10) || 0;
                        const shopQty = parseInt(row.querySelector('[data-qty-type="shop"]').value, 10) || 0;

                        const vintageInput = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`);
                        const commentInput = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`);
                        const vintageActual = vintageInput ? vintageInput.value.trim() : '';
                        const comment = commentInput ? commentInput.value.trim() : '';

                        selectedCounts.push({ taskId, sku, productName, comaxStock, storageQty, officeQty, shopQty, vintageActual, vintageRef, comment });
                    }
                });

                if (selectedCounts.length === 0) {
                    showToast('No counts selected for submission.', 'warning');
                    submitCountsBtn.disabled = false;
                    submitCountsBtn.textContent = 'Submit Selected Counts';
                    return;
                }

                google.script.run
                    .withSuccessHandler(response => {
                        try {
                            if (response.success) {
                                showToast(`${response.updated} counts submitted successfully.`);
                                loadProductCountsData(); // Reload to remove submitted items
                            } else {
                                showToast(`Error submitting counts: ${response.message}`, 'error');
                            }
                        } catch (e) {
                            console.error(e);
                            showToast('UI Error: ' + e.message, 'error');
                        } finally {
                            submitCountsBtn.disabled = false;
                            submitCountsBtn.textContent = 'Submit Selected Counts';
                        }
                    })
                    .withFailureHandler(err => {
                        showToast(`Error submitting counts: ${err.message}`, 'error');
                        submitCountsBtn.disabled = false;
                        submitCountsBtn.textContent = 'Submit Selected Counts';
                    })
                    .WebAppInventory_submitInventoryCounts(selectedCounts);
              }
              TaskWidgets.confirm("Submit these counts?", proceed);
            }

            // --- A0 reload resilience: sessionStorage autosave for count entry ---
            // In-progress counts live only in the DOM until batch Submit, so an accidental
            // pull-to-refresh / back gesture (easy on mobile) would lose them. Mirror present
            // rows to sessionStorage on every edit; rehydrate on render. RELOAD_RESILIENCE_PLAN.md §4.A0.
            const COUNT_DRAFT_KEY = 'jlmops.invCountDraft.v1';

            function persistCountDrafts() {
                try {
                    const drafts = {};
                    productCountsListDiv.querySelectorAll('tr[data-task-id]').forEach(row => {
                        const sku = row.dataset.sku;
                        const s = row.querySelector('[data-qty-type="storage"]').value;
                        const o = row.querySelector('[data-qty-type="office"]').value;
                        const sh = row.querySelector('[data-qty-type="shop"]').value;
                        const vEl = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`);
                        const cEl = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`);
                        const v = vEl ? vEl.value : '';
                        const c = cEl ? cEl.value : '';
                        if (s || o || sh || v || c) drafts[sku] = { s, o, sh, v, c };
                    });
                    if (Object.keys(drafts).length) sessionStorage.setItem(COUNT_DRAFT_KEY, JSON.stringify(drafts));
                    else sessionStorage.removeItem(COUNT_DRAFT_KEY);
                } catch (e) { /* storage blocked: degrade silently, the DOM still holds the counts */ }
            }

            function restoreCountDrafts() {
                try {
                    const raw = sessionStorage.getItem(COUNT_DRAFT_KEY);
                    if (!raw) return;
                    const drafts = JSON.parse(raw);
                    Object.keys(drafts).forEach(sku => {
                        const row = productCountsListDiv.querySelector(`tr[data-task-id][data-sku="${sku}"]`);
                        if (!row) return; // task no longer open -> stale draft, skip
                        const d = drafts[sku];
                        const storageEl = row.querySelector('[data-qty-type="storage"]');
                        storageEl.value = d.s || '';
                        row.querySelector('[data-qty-type="office"]').value = d.o || '';
                        row.querySelector('[data-qty-type="shop"]').value = d.sh || '';
                        const vEl = productCountsListDiv.querySelector(`.product-vintage-input[data-sku="${sku}"]`);
                        if (vEl) vEl.value = d.v || '';
                        const cEl = productCountsListDiv.querySelector(`.product-comment-input[data-sku="${sku}"]`);
                        if (cEl) cEl.value = d.c || '';
                        // reuse the existing input listeners to recompute Total + checkbox state
                        storageEl.dispatchEvent(new Event('input', { bubbles: true }));
                        if (vEl) vEl.dispatchEvent(new Event('input', { bubbles: true }));
                    });
                    persistCountDrafts(); // prune drafts whose tasks are no longer present
                } catch (e) { /* corrupt/incompatible draft: ignore */ }
            }

            function init() {
                loadProductCountsData(); // Load product counts data
                loadBruryaInventoryData();

                // Brurya Event Listeners
                addProductInput.addEventListener('keyup', handleAutocompleteSearch);
                addProductBtn.addEventListener('click', handleAddProduct);
                saveBtn.addEventListener('click', handleSaveInventory);
                document.getElementById('brurya-export-button').addEventListener('click', handleBruryaExport);
                document.getElementById('brurya-import-button').addEventListener('click', handleBruryaImport);
                document.addEventListener('click', (e) => {
                    const autocompleteContainer = document.getElementById('autocomplete-results');
                    if (autocompleteContainer && !autocompleteContainer.contains(e.target) && e.target !== addProductInput) {
                        clearAutocomplete();
                    }
                });

                // Product Counts Event Listener
                document.getElementById('submit-selected-counts-btn').addEventListener('click', handleSubmitSelectedCounts);
                
                // Export Counts Event Listener
                document.getElementById('export-counts-btn').addEventListener('click', handleExportCounts);
                
                // Import Counts Event Listener
                document.getElementById('import-counts-btn').addEventListener('click', handleImportCounts);

                // T4.3 count-entry modal buttons
                document.getElementById('btn-close-count-entry').addEventListener('click', () => ModalOverlay.close('count-entry-modal'));
                document.getElementById('btn-count-entry-cancel').addEventListener('click', () => ModalOverlay.close('count-entry-modal'));
                document.getElementById('btn-count-entry-save').addEventListener('click', () => saveCountEntry(false));
                document.getElementById('btn-count-entry-save-next').addEventListener('click', () => saveCountEntry(true));

                // A0 reload resilience: autosave count entry to sessionStorage on any edit
                // (covers desktop inline edits and the mobile modal, whose save dispatches 'input').
                productCountsListDiv.addEventListener('input', persistCountDrafts);
                productCountsListDiv.addEventListener('change', persistCountDrafts);
            }

            function handleImportCounts() {
                const importBtn = document.getElementById('import-counts-btn');
              TaskWidgets.confirm("Import the latest ProductCount sheet?", function() {
                importBtn.disabled = true;
                importBtn.textContent = 'Importing...';

                google.script.run
                    .withSuccessHandler(response => {
                        try {
                            if (response.success) {
                                showToast(response.message);
                                loadProductCountsData();
                            } else {
                                showToast(response.message, 'error');
                            }
                        } catch (e) {
                            console.error(e);
                            showToast('UI Error: ' + e.message, 'error');
                        } finally {
                            importBtn.disabled = false;
                            importBtn.textContent = 'Import from Sheet';
                        }
                    })
                    .withFailureHandler(err => {
                        showToast(`Error importing counts: ${err.message}`, 'error');
                        importBtn.disabled = false;
                        importBtn.textContent = 'Import from Sheet';
                    })
                    .WebAppInventory_importCountsFromSheet(); // Call without arguments
              });
            }

            function handleExportCounts() {
                const exportBtn = document.getElementById('export-counts-btn');
                exportBtn.disabled = true;
                exportBtn.textContent = 'Exporting...';
                
                const exportLinkContainer = document.getElementById('export-link-container');
                const exportedSheetLink = document.getElementById('exported-sheet-link');
                
                exportLinkContainer.style.display = 'none'; // Hide previous link
                exportedSheetLink.href = '#';
                exportedSheetLink.textContent = '';

                google.script.run
                    .withSuccessHandler(url => {
                        showToast('Counts exported successfully!');
                        exportedSheetLink.href = url;
                        exportedSheetLink.textContent = url.split('/').pop(); // Display just the name or part of URL
                        exportLinkContainer.style.display = 'block';
                        exportBtn.disabled = false;
                        exportBtn.textContent = 'Export to Sheet';
                        // Auto-open the sheet
                        window.open(url, '_blank');
                    })
                    .withFailureHandler(err => {
                        showToast(`Error exporting counts: ${err.message}`, 'error');
                        exportBtn.disabled = false;
                        exportBtn.textContent = 'Export to Sheet';
                    })
                    .WebAppInventory_exportCountsToSheet();
            }

            // Delegates to the shared standard toast (NOTIFICATION_UX_PLAN).
            // Kept as a thin wrapper so existing call sites stay unchanged.
            function showToast(message, type = 'success') {
                TaskWidgets.toast(message, type);
            }

            function handleAutocompleteSearch(e) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const searchTerm = e.target.value;
                    if (searchTerm.length < 2) {
                        clearAutocomplete();
                        return;
                    }
                    google.script.run
                        .withSuccessHandler(renderAutocomplete)
                        .withFailureHandler(err => showToast('Autocomplete search failed: ' + err.message, 'error'))
                        .WebAppInventory_searchComaxProducts(searchTerm);
                }, 300);
            }

            function renderAutocomplete(results) {
                clearAutocomplete();
                if (!results || results.length === 0) return;

                const container = document.createElement('div');
                container.id = 'autocomplete-results';
                container.style.position = 'absolute';
                container.style.top = '100%';
                container.style.left = '0';
                container.style.right = '0';
                container.style.border = '1px solid #ccc';
                container.style.backgroundColor = 'white';
                container.style.zIndex = '1000';
                container.style.maxHeight = '200px';
                container.style.overflowY = 'auto';

                results.forEach(item => {
                    const div = document.createElement('div');
                    div.textContent = `${item.name} (${item.sku})`;
                    div.style.padding = '8px';
                    div.style.cursor = 'pointer';
                    div.addEventListener('mouseenter', (e) => e.target.style.backgroundColor = '#f0f0f0');
                    div.addEventListener('mouseleave', (e) => e.target.style.backgroundColor = 'white');
                    div.addEventListener('click', () => {
                        addProductInput.value = `${item.name} (${item.sku})`;
                        selectedProduct = item;
                        clearAutocomplete();
                    });
                    container.appendChild(div);
                });
                addProductInput.closest('[style*="position: relative"]').appendChild(container);
            }

            function clearAutocomplete() {
                const container = document.getElementById('autocomplete-results');
                if (container) container.remove();
            }
            
            function handleAddProduct() {
                if (!selectedProduct) {
                    showToast('Please select a product from the list.', 'warning');
                    return;
                }

                const tableBody = listDiv.querySelector('tbody');
                if (tableBody && tableBody.querySelector(`tr[data-sku="${selectedProduct.sku}"]`)) {
                    showToast('Product already in the list.', 'warning');
                    return;
                }
                
                addProductBtn.disabled = true;
                
                google.script.run
                    .withSuccessHandler(response => {
                        showToast(`Product '${selectedProduct.name}' added to Brurya list.`);
                        addProductInput.value = '';
                        selectedProduct = null;
                        addProductBtn.disabled = false;
                        loadBruryaInventoryData(); // Reload the whole list
                    })
                    .withFailureHandler(err => {
                        showToast(err.message, 'error');
                        addProductBtn.disabled = false;
                    })
                    .WebAppInventory_setBruryaQuantity(selectedProduct.sku, 1);
            }

            function handleSaveInventory() {
                const rows = listDiv.querySelectorAll('tbody tr');
                const inventoryData = [];
                rows.forEach(row => {
                    const sku = row.dataset.sku;
                    const quantityInput = row.querySelector('input[type="number"]');
                    const quantity = parseInt(quantityInput.value, 10);
                    if (sku && !isNaN(quantity)) {
                        inventoryData.push({ sku: sku, quantity: quantity });
                    }
                });

                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                google.script.run
                    .withSuccessHandler(result => {
                        const message = `Successfully updated ${result.updated} items.`;
                        showToast(message);
                        loadBruryaInventoryData();
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Save';
                    })
                    .withFailureHandler(err => {
                        showToast(`Error saving inventory: ${err.message}`, 'error');
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Save';
                    })
                    .WebAppInventory_updateBruryaInventory(inventoryData);
            }

            function handleBruryaExport() {
                const exportBtn = document.getElementById('brurya-export-button');
                exportBtn.disabled = true;
                exportBtn.textContent = 'Exporting...';

                google.script.run
                    .withSuccessHandler(sheetUrl => {
                        showToast('Brurya export created. Opening sheet...');
                        window.open(sheetUrl, '_blank');
                        exportBtn.disabled = false;
                        exportBtn.textContent = 'Export to Sheet';
                    })
                    .withFailureHandler(err => {
                        showToast(`Export failed: ${err.message}`, 'error');
                        exportBtn.disabled = false;
                        exportBtn.textContent = 'Export to Sheet';
                    })
                    .WebAppInventory_exportBruryaToSheet();
            }

            function handleBruryaImport() {
              TaskWidgets.confirm("Import the latest Brurya counts?", function() {
                const importBtn = document.getElementById('brurya-import-button');
                importBtn.disabled = true;
                importBtn.textContent = 'Importing...';

                google.script.run
                    .withSuccessHandler(result => {
                        if (result.success) {
                            showToast(result.message);
                            loadBruryaInventoryData();
                        } else {
                            showToast(result.message, 'error');
                        }
                        importBtn.disabled = false;
                        importBtn.textContent = 'Import from Sheet';
                    })
                    .withFailureHandler(err => {
                        showToast(`Import failed: ${err.message}`, 'error');
                        importBtn.disabled = false;
                        importBtn.textContent = 'Import from Sheet';
                    })
                    .WebAppInventory_importBruryaFromSheet();
              });
            }

            function renderBruryaInventory(inventoryData) {
                if (!inventoryData) {
                    listDiv.innerHTML = '<p>Error loading data.</p>';
                    return;
                }

                let tableHtml = '<table class="table table-sm table-hover brurya-table"><thead><tr><th>Quantity</th><th>SKU</th><th>Name</th><th>#</th></tr></thead><tbody>';
                if (inventoryData.length > 0) {
                    inventoryData.forEach((item, index) => {
                        tableHtml += `
                            <tr data-sku="${item.sku}">
                                <td data-label="Quantity"><input type="number" class="form-control form-control-sm brurya-qty-input" value="${item.bruryaQty}" min="0"></td>
                                <td data-label="SKU">${item.sku}</td>
                                <td data-label="Name" class="product-name-col">${item.Name}</td>
                                <td data-label="#">${index + 1}</td>
                            </tr>`;
                    });
                }
                tableHtml += '</tbody></table>';
                
                if (inventoryData.length === 0) {
                    tableHtml += '<p>No items found in Brurya inventory. Use the "Add Product" control to add items.</p>';
                }
                listDiv.innerHTML = tableHtml;
            }

            function loadBruryaInventoryData() {
                listDiv.innerHTML = 'Loading inventory...';
                google.script.run
                    .withSuccessHandler(renderBruryaInventory)
                    .withFailureHandler(err => {
                        showToast(`Error loading inventory: ${err.message}`, 'error');
                    })
                    .WebAppInventory_getBruryaStockList();
            }

            init();
        })();
    </script>
</div>
