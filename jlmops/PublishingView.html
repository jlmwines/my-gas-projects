     direct style.display flip), so paint order — not z-index — decides which

<script>
  window.PublishingView = (function() {
    'use strict';

    var CAMPAIGN_LABELS = {
      'core-content': 'Core Content',
      'newsletter-print': 'Newsletter',
      'email-broadcast': 'Email',
      'flyer-acquisition': 'Flyer'
    };

    var state = {
      activeTab: 'calendar',
      tasks: [],
      library: [],
      campaigns: [],
      projects: [],
      shortUrls: [],
      activePreset: 'all',
      deficiencyWindowDays: 56,
      expandedCampaignId: null,
      holidays: [],
      entityStack: [],
      currentEntitySlug: null,
      currentEntity: null
    };

    function init() {
      TaskDetail.configure({
        getTask:      function(id)   { return (state.tasks || []).find(function(t) { return t.id === id; }) || null; },
        getEntity:    function(slug) { return (state.library || []).find(function(e) { return e.slug === slug; }) || null; },
        getAssignees: function() {
          var seen = {};
          return (state.tasks || []).reduce(function(a, t) {
            if (t.assignedTo && !seen[t.assignedTo]) { seen[t.assignedTo] = true; a.push(t.assignedTo); }
            return a;
          }, []).sort();
        },
        loadEntityDetail: function(slug, cb) {
          var entity = (state.library || []).find(function(e) { return e.slug === slug; });
          cb(entity || null);
        },
        saveTask: function(id, fields, cb) {
          var task = (state.tasks || []).find(function(t) { return t.id === id; });
          var taskType = task ? (task.typeId || '') : '';
          var isContent = taskType.indexOf('task.content') === 0 || taskType === 'task.newsletter.distribute';
          var allowsDateEdit = isContent ||
            taskType === 'task.deficiency.category_stock' ||
            taskType === 'task.deficiency.bundle_stock';
          if (allowsDateEdit || isContent) {
            var updates = { status: fields.status, assignedTo: fields.assignedTo || null,
              startDate: fields.startDate || null, dueDate: fields.dueDate || null, notes: fields.notes };
            if (isContent) { updates.linkedEntityId = fields.linkedEntityId; updates.title = fields.title; }
            google.script.run
              .withSuccessHandler(function(r) { cb(r); })
              .withFailureHandler(function(e) { cb({ error: e.message || 'Failed to save' }); })
              .WebAppTasks_updateTask(id, updates);
          } else {
            google.script.run
              .withSuccessHandler(function(r) { cb(r); })
              .withFailureHandler(function(e) { cb({ error: e.message || 'Failed to save' }); })
              .WebAppTasks_updateTaskStatus(id, fields.status);
          }
        },
        completeTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(ok) { cb(ok); })
            .withFailureHandler(function()    { cb(false); })
            .WebAppTasks_completeTaskById(id);
        },
        deleteTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(r) { cb(r); })
            .withFailureHandler(function(e) { cb({ error: e.message || 'Failed' }); })
            .WebAppTasks_deleteTask(id);
        },
        revertTask: function(id, cb) {
          google.script.run
            .withSuccessHandler(function(ok) { cb(ok); })
            .withFailureHandler(function() { cb(false); })
            .WebAppDashboardV2_revertTaskToAdmin(id);
        },
        close:   function() {},
        refresh: function() { renderTasks(); },
        reload:  _loadData
      });
      ContentStreamModal.configure({ reload: _loadData });
      _loadData();
      var calSearchEl = document.getElementById('pv-cal-search');
      if (calSearchEl) calSearchEl.addEventListener('input', renderCalendar);
      var calStatusEl = document.getElementById('pv-cal-status-filter');
      if (calStatusEl) calStatusEl.addEventListener('change', renderCalendar);
      ['pv-search-library', 'pv-sort-library'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', renderLibrary);
      });
      ['pv-btn-open-content-stream', 'pv-btn-open-content-stream-cal', 'pv-btn-open-content-stream-tasks'].forEach(function(id) {
        var btn = document.getElementById(id);
        if (btn) btn.addEventListener('click', function() { ContentStreamModal.open(); });
      });
      var applyCalBtn = document.getElementById('pv-btn-apply-calendar-updates');
      if (applyCalBtn) applyCalBtn.addEventListener('click', applyPendingCalendarUpdates);
      var drawerAttachSubmitBtn = document.getElementById('pv-btn-drawer-attach-submit');
      if (drawerAttachSubmitBtn) drawerAttachSubmitBtn.addEventListener('click', submitDrawerAttachDoc);

      document.getElementById('pv-btn-create-campaign').addEventListener('click', createCampaign);
    }

    function _loadData() {
      ViewLoading.begin();
      google.script.run
        .withSuccessHandler(function(res) { ViewLoading.end(); _onLoaded(res); })
        .withFailureHandler(function(err) { ViewLoading.end(); _onError(err); })
        .WebAppLibrary_getData();
    }

    function _onLoaded(res) {
      if (!res || !res.success) {
        var msg = res && res.error ? res.error : 'Failed to load PublishingView';
        TaskWidgets.toast(msg, true);
        document.getElementById('pv-cal-table-wrap').innerHTML = '<div class="pv-empty">' + TaskWidgets.escape(msg) + '</div>';
        document.getElementById('pv-library-table-wrap').innerHTML = '<div class="pv-empty">' + TaskWidgets.escape(msg) + '</div>';
        return;
      }
      state.tasks = res.data.tasks || [];
      state.library = res.data.library || [];
      state.deficiencyWindowDays = res.data.deficiencyWindowDays || 56;
      // Calendar isn't rendered here — state.holidays isn't loaded yet
      // (_loadCampaignsAndProjects, below, is a separate call). Rendering now
      // would show a false "no calendar rows" instead of the correct
      // "Loading…" placeholder already in the markup.
      renderLibrary();
      renderTasks();
      _loadCampaignsAndProjects();
    }

    function _onError(err) {
      TaskWidgets.toast(err && err.message ? err.message : 'Network error', true);
    }

    function applyPendingCalendarUpdates() {
      var btn = document.getElementById('pv-btn-apply-calendar-updates');
      if (btn) btn.disabled = true;
      google.script.run
        .withSuccessHandler(function(res) {
          if (btn) btn.disabled = false;
          if (!res || !res.success) {
            TaskWidgets.toast((res && res.error) ? res.error : 'Failed to apply pending updates', 'error');
            return;
          }
          TaskWidgets.toast(res.filesProcessed + ' file(s), ' + res.rowsMerged + ' row(s) merged', 'success');
          _loadCampaignsAndProjects();
        })
        .withFailureHandler(function(err) {
          if (btn) btn.disabled = false;
          TaskWidgets.toast(err && err.message ? err.message : 'Network error', 'error');
        })
        .WebAppPublishing_applyPendingCalendarUpdates();
    }

    function _loadCampaignsAndProjects() {
      ViewLoading.begin();
      google.script.run
        .withSuccessHandler(function(res) {
          ViewLoading.end();

            state.projects = res.data.projects || [];

          document.getElementById('pv-campaigns-content').innerHTML = '<div class="pv-empty">' + TaskWidgets.escape(msg) + '</div>';
          document.getElementById('pv-cal-table-wrap').innerHTML = '<div class="pv-empty">' + TaskWidgets.escape(msg) + '</div>';

    // ===== CALENDAR TAB =====

    function renderCalendar() {
      var search = (document.getElementById('pv-cal-search').value || '').toLowerCase();
      var statusFilter = document.getElementById('pv-cal-status-filter').value || 'all';
      var isManager = document.body.classList.contains('role-manager');

      // Group tasks by base slug (strip -en/-he from entityId) — this is the
      // primary calendar↔task connection. Tasks exist from the moment content
      // is spawned (spawnContentChain); the entity doesn't exist until someone
      // attaches a Doc (Phase 3 lazy-creation). Keying off entities first would
      // show nothing for freshly-spawned content with no Doc yet — found live
      // 2026-07-08 ("some have status, some don't").
      var tasksByBase = {};
      (state.tasks || []).forEach(function(t) {
        // Content tasks only — same filter renderTasks() uses. Non-content
        // tasks (product/order/sync/etc.) can carry a non-string entityId
        // (e.g. a bare numeric SKU), which .slice() below can't handle and
        // was never meant to reach this grouping in the first place.
        if (!t.typeId || t.typeId.indexOf('task.content.') !== 0) return;
        var slug = t.entityId || '';
        var isEn = slug.slice(-3) === '-en';
        var isHe = slug.slice(-3) === '-he';
        var base = (isEn || isHe) ? slug.slice(0, -3) : slug;
        if (!base) return;
        (tasksByBase[base] = tasksByBase[base] || []).push(t);
      });

      // Entities, same grouping — checked first for the row click target (see
      // _routeTarget below): an entity's drawer is shown whenever one exists.
      var libGroupByBase = {};
      (state.library || []).forEach(function(e) {
        var slug = e.slug || '';
        var isEn = slug.slice(-3) === '-en';
        var isHe = slug.slice(-3) === '-he';
        var base = (isEn || isHe) ? slug.slice(0, -3) : slug;
        (libGroupByBase[base] = libGroupByBase[base] || []).push(e);
      });

      // Click target for a calendar row. Redesigned 2026-07-09 (CALENDAR_TAB_UX_PLAN.md
      // Phase 2) — previously routed straight to the earliest open task with no
      // confirmation step, so a wrong click cost a full round-trip out of the task
      // pack. Now: show the entity drawer (details) first whenever an entity
      // exists — its attached-tasks list is already independently clickable
      // (TaskDetail.open) as the explicit "advance to task" action. Only route
      // straight to a task when there's no entity yet to show (fresh spawn, no
      // Doc attached — nothing to preview).
      function _routeTarget(base) {
        var group = libGroupByBase[base];
        if (group && group.length) {
          var rep = group.filter(function(e) { return e.slug.slice(-3) === '-en'; })[0] || group[0];
          return { kind: 'entity', slug: rep.slug };
        }
        var open = (tasksByBase[base] || []).filter(function(t) {
          return t.status !== 'Done' && t.status !== 'Cancelled';
        });
        if (isManager) open = open.filter(function(t) { return t.assignedTo === 'Manager'; });
        if (!open.length) return null;
        open.sort(function(a, b) { return (a.createdDate || '').localeCompare(b.createdDate || ''); });
        return { kind: 'task', id: open[0].id };
      }

      // Row status bucket — shared by the status pill and the status filter so
      // there's one definition of "what status is this row" (Calendar rows have
      // no persisted status; it's task-derived, same three-tier model as
      // deriveStatus, plus 'none' for a row with no tasks spawned yet).
      function _calRowStatus(h) {
        if (!h.slug || !tasksByBase[h.slug]) return 'none';
        return TaskWidgets.deriveStatus(tasksByBase[h.slug]);
      }

      // JLMops_Publishing is the one calendar — library entities render in the Library tab, not here.
      var rows = (state.holidays || []).filter(function(h) {
        if (search) {
          var hay = (String(h.name || '') + ' ' + String(h.slug || '')).toLowerCase();
          if (hay.indexOf(search) === -1) return false;
        }
        if (statusFilter !== 'all' && _calRowStatus(h) !== statusFilter) return false;
        return true;
      });
      rows.sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });

      var container = document.getElementById('pv-cal-table-wrap');
      if (rows.length === 0) {
        container.innerHTML = '<div class="pv-empty">No calendar rows match the current search.</div>';
        return;
      }

      var html = '<table class="pv-cal-table responsive-stack"><thead><tr>';
      html += '<th>Date</th><th>Type</th><th>Slug</th><th>Title</th><th>Status</th><th>Notes</th>';
      html += '</tr></thead><tbody>';

      rows.forEach(function(h) {
        var target = h.slug ? _routeTarget(h.slug) : null;
        var rowAttrs = '';
        if (target && target.kind === 'task') {
          rowAttrs = ' style="cursor:pointer;" onclick="PublishingView.openAttachedTask(\'' + TaskWidgets.escape(target.id) + '\')"';
        } else if (target && target.kind === 'entity') {
          rowAttrs = ' style="cursor:pointer;" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(target.slug) + '\')"';
        }
        var statusCell = '—';
        var rowStatus = _calRowStatus(h);
        if (rowStatus !== 'none') {
          statusCell = '<span class="tw-status-pill ' + TaskWidgets.statusClass(rowStatus) + '">' + TaskWidgets.escape(rowStatus) + '</span>';
        }
        html += '<tr' + rowAttrs + '>';
        html += '<td data-label="Date">' + TaskWidgets.escape(h.date) + '</td>';
        html += '<td data-label="Type"><span style="font-size:11px;color:#6c757d;">' + TaskWidgets.escape(h.type) + '</span></td>';
        html += '<td data-label="Slug"><span style="font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;color:#6c757d;">' + (h.slug ? TaskWidgets.escape(h.slug) : '—') + '</span></td>';
        html += '<td data-label="Title"><strong>' + TaskWidgets.escape(h.name) + '</strong></td>';
        html += '<td data-label="Status">' + statusCell + '</td>';
        html += '<td data-label="Notes">' + (h.notes ? TaskWidgets.escape(h.notes) : '—') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // ===== CAMPAIGNS TAB =====

        html +=   '<div style="display:flex;justify-content:space-between;align-items:center">';

        html +=       ' <span class="tw-chip" style="font-size:11px;margin-left:4px">' + entityCount + '</span>';

    function renderCampaignDetail(c) {
      var cid = c.campaignId;
      var entities = (state.library || []).filter(function(e) { return e.campaignId === cid; });

        html += '<div class="small mb-2">' + TaskWidgets.escape(c.notes) + '</div>';

        entities.forEach(function(e) {
          var rowStatus = _entityStatus(e);
          html += '<div class="pv-cmp-entity-row">';
          html +=   '<span class="tw-status-pill ' + TaskWidgets.statusClass(rowStatus) + '">' + TaskWidgets.escape(rowStatus) + '</span>';
          html +=   '<span class="small">' + TaskWidgets.escape(e.title || e.slug) + '</span>';
          html +=   '<span class="small text-muted" style="margin-left:auto">' + TaskWidgets.escape(e.contentType || '') + '</span>';
          html += '</div>';
        });
      }
      html += '</div>';
      return html;
    }

    var DISTRIBUTE_CAMPAIGNS = ['newsletter-print', 'email-broadcast', 'flyer-acquisition'];

    function _extractTopic(slug) {
      var prefixes = ['blog-', 'news-', 'email-', 'flyer-', 'template-', 'image-', 'other-', 'customer-', 'social-'];
      var s = slug;
      for (var i = 0; i < prefixes.length; i++) {
        if (s.indexOf(prefixes[i]) === 0) { s = s.slice(prefixes[i].length); break; }
      }
      if (s.slice(-3) === '-en' || s.slice(-3) === '-he') s = s.slice(0, -3);
      return s;
    }

    function _autoTargetUrl(entity) {
      var refs = entity.references || [];
      var libBySlug = {};
      (state.library || []).forEach(function(e) { libBySlug[e.slug] = e; });
      for (var i = 0; i < refs.length; i++) {
        var ref = libBySlug[refs[i]];
        if (ref && ref.externalUrl) return ref.externalUrl;
        if (ref && ref.slug && ref.slug.indexOf('blog-') === 0) {
          var topic = _extractTopic(ref.slug);
          return 'https://jlmwines.com/' + topic + '/';
        }
      }
      return '';
    }

    function _renderDistributePanel(entity) {
      var wrap = document.getElementById('pv-drawer-distribute-wrap');
      var el   = document.getElementById('pv-drawer-distribute');
      if (!wrap || !el) return;
      var cid = entity && entity.campaignId;
      if (!cid || DISTRIBUTE_CAMPAIGNS.indexOf(cid) === -1) {
        wrap.style.display = 'none';
        return;
      }
      wrap.style.display = '';

      // Existing short URLs for this entity
      var existing = (state.shortUrls || []).filter(function(r) { return r.entitySlug === entity.slug; });
      var existingHtml = '';
      if (existing.length) {
        existingHtml = '<div class="small font-weight-bold mb-1">Short URLs</div>';
        existing.forEach(function(r) {
          var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent('https://jlmwines.com/n/' + r.shortCode) + '&format=svg&size=160x160';
          existingHtml += '<div style="margin-bottom:8px;padding:6px 8px;background:#f8f9fa;border-radius:4px">';
          existingHtml += '<div class="detail-meta">' + TaskWidgets.escape(r.language.toUpperCase()) + ' · <code>' + TaskWidgets.escape(r.shortCode) + '</code></div>';
          existingHtml += '<div class="small" style="word-break:break-all">' + TaskWidgets.escape('jlmwines.com/n/' + r.shortCode) + '</div>';
          existingHtml += '<div class="small text-muted" style="word-break:break-all">' + TaskWidgets.escape(r.targetUrl) + '</div>';
          existingHtml += '<div style="margin-top:4px"><img src="' + qrUrl + '" width="80" height="80" alt="QR" style="border:1px solid #dee2e6"> ';
          existingHtml += '<a href="' + qrUrl + '" download="qr-' + TaskWidgets.escape(r.shortCode.replace('/', '-')) + '.svg" class="btn btn-sm btn-light" style="font-size:11px">&#8595; SVG</a></div>';
          existingHtml += '</div>';
        });
      }

      // Generate form
      var lang = entity.language === 'he' ? 'he' : 'en';
      var topic = _extractTopic(entity.slug);
      var suggestedCode = lang === 'he' ? 'he/' + topic : topic;
      var autoUrl = _autoTargetUrl(entity);

      var html = existingHtml +
        '<div class="small font-weight-bold mb-1 mt-2">Generate</div>' +
        '<div class="form-group mb-1">' +
          '<label class="small">Target URL</label>' +
          '<input type="text" class="form-control form-control-sm" id="pv-dist-target-url" value="' + TaskWidgets.escape(autoUrl) + '" placeholder="https://jlmwines.com/…">' +
        '</div>' +
        '<div class="form-group mb-1">' +
          '<label class="small">Content marker <span class="text-muted">(utm_content)</span></label>' +
          '<input type="text" class="form-control form-control-sm" id="pv-dist-marker" placeholder="e.g. handling-issue-3">' +
        '</div>' +
        '<div class="form-group mb-2" style="display:flex;gap:8px;align-items:center">' +
          '<label class="small mb-0">Language</label>' +
          '<select class="form-control form-control-sm" id="pv-dist-lang" style="width:auto">' +
            '<option value="en"' + (lang === 'en' ? ' selected' : '') + '>EN — ' + topic + '</option>' +
            '<option value="he"' + (lang === 'he' ? ' selected' : '') + '>HE — he/' + topic + '</option>' +
          '</select>' +
        '</div>' +
        '<button type="button" class="btn btn-sm btn-light" id="pv-dist-generate-btn" onclick="PublishingView.generateDistribute()">Generate</button>' +
        '<div id="pv-dist-output" style="margin-top:8px"></div>' +
        '<div class="small text-muted mt-2">After generating, add a RankMath redirect: <code>/n/' + TaskWidgets.escape(suggestedCode) + '</code> → UTM URL above.</div>';

      el.innerHTML = html;
    }

    function generateDistribute() {
      var entity = state.currentEntity;
      if (!entity || !entity.slug) return;
      var targetUrl = (document.getElementById('pv-dist-target-url').value || '').trim();
      var marker    = (document.getElementById('pv-dist-marker').value || '').trim();
      var language  = document.getElementById('pv-dist-lang').value;
      if (!targetUrl) { TaskWidgets.toast('Target URL is required.', 'error'); return; }
      var btn = document.getElementById('pv-dist-generate-btn');
      btn.disabled = true; btn.textContent = 'Generating…';
      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false; btn.textContent = 'Generate';
          if (res && res.success) {
            var d = res.data;
            state.shortUrls.push({
              shortCode: d.shortCode, campaignId: entity.campaignId,
              entitySlug: entity.slug, language: language,
              targetUrl: d.utmUrl, createdDate: ''
            });
            var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent(d.shortUrl) + '&format=svg&size=200x200';
            var out = '<div style="padding:8px;background:#f0f7f0;border-radius:4px;font-size:12px">' +
              '<div class="font-weight-bold mb-1">Generated</div>' +
              '<div><strong>Short URL:</strong> <code>' + TaskWidgets.escape(d.shortCode) + '</code></div>' +
              '<div style="word-break:break-all"><strong>UTM URL:</strong> <span id="pv-dist-utm-text">' + TaskWidgets.escape(d.utmUrl) + '</span> ' +
              '<button class="btn btn-sm btn-light" style="font-size:11px" onclick="PublishingView.copyDistUrl()">Copy</button></div>' +
              '<div style="margin-top:6px"><img src="' + qrUrl + '" width="100" height="100" alt="QR"> ' +
              '<a href="' + qrUrl + '" download="qr-' + TaskWidgets.escape(d.shortCode.replace('/', '-')) + '.svg" class="btn btn-sm btn-light" style="font-size:11px">&#8595; SVG</a></div>' +
              '</div>';
            document.getElementById('pv-dist-output').innerHTML = out;
            TaskWidgets.toast('Short URL generated.', 'success');
          } else {
            TaskWidgets.toast((res && res.error) || 'Failed to generate.', 'error');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false; btn.textContent = 'Generate';
          TaskWidgets.toast(err && err.message ? err.message : 'Error.', 'error');
        })
        .WebAppPublishing_generateDistributeOutputs({
          entitySlug: entity.slug, campaignId: entity.campaignId,
          language: language, targetUrl: targetUrl, contentMarker: marker
        });
    }

    function copyDistUrl() {
      var el = document.getElementById('pv-dist-utm-text');
      if (!el) return;
      try { navigator.clipboard.writeText(el.textContent); TaskWidgets.toast('Copied.', 'success'); }
      catch(e) { TaskWidgets.toast('Copy failed — select manually.', 'error'); }
    }

    function saveCampaignField() {
      var entity = state.currentEntity;
      if (!entity || !entity.slug) return;
      var sel = document.getElementById('pv-drawer-campaign-select');
      var campaignId = sel ? sel.value : '';
      var saveBtn = document.getElementById('pv-drawer-campaign-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
      google.script.run
        .withSuccessHandler(function(res) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
          if (res && res.success) {
            var updated = res.data && res.data.entity;
            if (updated) {
              var newCampaignId = campaignId;
              state.currentEntity.campaignId = newCampaignId;
              document.getElementById('pv-drawer-campaign').textContent = CAMPAIGN_LABELS[newCampaignId] || newCampaignId || '—';
              var libEntity = (state.library || []).find(function(e) { return e.slug === entity.slug; });
              if (libEntity) libEntity.campaignId = newCampaignId;
            }
            TaskWidgets.toast('Campaign updated.', 'success');
          } else {
            TaskWidgets.toast((res && res.error) ? res.error : 'Failed to update campaign.', 'error');
          }
        })
        .withFailureHandler(function(err) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
          TaskWidgets.toast(err && err.message ? err.message : 'Error saving campaign.', 'error');
        })
        .WebAppPublishing_setEntityCampaign({ entityId: entity.slug, campaignId: campaignId });

    function createCampaign() {
      var cid = (document.getElementById('pv-nc-id').value || '').trim();
      var name = (document.getElementById('pv-nc-name').value || '').trim();
      var status = document.getElementById('pv-nc-status').value;
      var goal = (document.getElementById('pv-nc-goal').value || '').trim();

        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = 'Create';
          if (res && res.success) {

    // ===== TASKS TAB =====

    var TASK_COLUMNS = [
      { label: 'Task',     key: 'title' },
      { label: 'Entity',   key: 'entity' },
      { label: 'Assignee', key: 'assignee' },
      { label: 'Status',   key: 'status' },
      { label: 'Due',      key: 'due' },

    ];

    function _renderPvTaskCell(key, t, entity, due, docBtn) {
      var esc = TaskWidgets.escape;
      switch (key) {
        case 'title':    return '<td data-label="Task"><strong>' + esc(t.name || t.typeId) + '</strong></td>';
        case 'entity':   return '<td data-label="Entity"><span class="detail-meta">' + esc(entity ? (entity.title || entity.slug) : (t.entityName || t.entityId || '—')) + '</span></td>';
        case 'assignee': return '<td data-label="Assignee"><span class="detail-meta">' + esc(t.assignedTo || '—') + '</span></td>';
        case 'status':   return '<td data-label="Status"><span class="tw-status-pill ' + TaskWidgets.statusClass(t.status) + '">' + esc(t.status || '—') + '</span></td>';
        case 'due':      return '<td data-label="Due">' + due + '</td>';
        case 'doc':      return '<td data-label="" onclick="event.stopPropagation()">' + docBtn + '</td>';
        default:         return '<td></td>';
      }
    }

    function renderTasks() {
      var container = document.getElementById('pv-tasks-content');
      var isManager = document.body.classList.contains('role-manager');
      var allContentTasks = (state.tasks || []).filter(function(t) {
        if (!t.typeId || t.typeId.indexOf('task.content.') !== 0) return false;
        if (t.status === 'Done' || t.status === 'Cancelled') return false;
        if (isManager && t.assignedTo !== 'Manager') return false;
        return true;
      });
      if (!allContentTasks.length) {
        container.innerHTML = '<div class="pv-empty">No open content tasks.</div>';
        return;
      }

      // Build assignee filter (admin only — manager already sees only their tasks).
      var filterSel = document.getElementById('pv-tasks-assignee-filter');
      var selectedAssignee = filterSel ? filterSel.value : '';
      var contentTasks = selectedAssignee
        ? allContentTasks.filter(function(t) { return t.assignedTo === selectedAssignee; })
        : allContentTasks;

      var libBySlug = {};
      (state.library || []).forEach(function(e) { libBySlug[e.slug] = e; });

      var filterBar = '';
      if (!isManager) {
        var assignees = [];
        allContentTasks.forEach(function(t) {
          if (t.assignedTo && assignees.indexOf(t.assignedTo) === -1) assignees.push(t.assignedTo);
        });
        assignees.sort();
        var opts = '<option value="">All assignees</option>' +
          assignees.map(function(a) {
            return '<option value="' + TaskWidgets.escape(a) + '"' + (a === selectedAssignee ? ' selected' : '') + '>' + TaskWidgets.escape(a) + '</option>';
          }).join('');
        filterBar = '<div class="mb-2"><select id="pv-tasks-assignee-filter" class="form-control form-control-sm" style="max-width:200px" onchange="PublishingView.renderTasks()">' + opts + '</select></div>';
      }

      var html = filterBar + '<table class="pv-cal-table"><thead><tr>' +
        TASK_COLUMNS.map(function(col) { return '<th>' + col.label + '</th>'; }).join('') +
        '</tr></thead><tbody>';
      contentTasks.forEach(function(t) {
        var entity = libBySlug[t.entityId] || null;
        var due = t.dueDate ? TaskWidgets.formatDate(t.dueDate) : '—';
        var docBtn = (entity && entity.docUrl)
          ? '<a class="btn btn-sm btn-light" href="' + TaskWidgets.escape(entity.docUrl) + '" target="_blank" rel="noopener">&#8599; Doc</a>'
          : '';
        html += '<tr style="cursor:pointer" onclick="TaskDetail.open(\'' + TaskWidgets.escape(t.id) + '\')">' +
          TASK_COLUMNS.map(function(col) { return _renderPvTaskCell(col.key, t, entity, due, docBtn); }).join('') +
          '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // ===== LIBRARY TAB =====

    function switchPreset(preset) {
      state.activePreset = preset;
      document.querySelectorAll('.pv-library-presets .tw-chip').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-preset') === preset);
      });
      renderLibrary();
    }

    // Task-derived status for one entity (CALENDAR_LIBRARY_LOOP_PLAN Phase 5) —
    // 'abandoned' stays a distinct, reliably-set flag; everything else is
    // computed live from state.tasks, never read from slb_State.
    function _entityStatus(e) {
      if (!e) return 'done';
      if (e.state === 'abandoned') return 'abandoned';
      var tasksForEntity = (state.tasks || []).filter(function(t) { return t.entityId === e.slug; });
      return TaskWidgets.deriveStatus(tasksForEntity);
    }

    function renderLibrary() {
      var preset = state.activePreset;
      var searchTerm = (document.getElementById('pv-search-library').value || '').toLowerCase();
      var sortBy = document.getElementById('pv-sort-library').value;
      if (preset === 'deficiency') { renderDeficiency(searchTerm); return; }

      var filtered = state.library.filter(function(e) {
        if (preset === 'campaigns') {
          if (['email', 'news', 'mention', 'social'].indexOf(e.contentType) === -1) return false;
        } else if (preset !== 'all' && e.contentType !== preset) {
          return false;
        }
        if (searchTerm) {
          var hay = (String(e.title || '') + ' ' + String(e.slug || '')).toLowerCase();
          if (hay.indexOf(searchTerm) === -1) return false;
        }
        return true;
      });

      // Group bilingual entities (slug ends in -en / -he) into paired rows.
      // Language-neutral entities get their own row.
      var groups = {};    // baseSlug → { en, he, base, type, lastTouched }
      var order = [];     // insertion order for base slugs
      filtered.forEach(function(e) {
        var slug = e.slug || '';
        var isEn = slug.slice(-3) === '-en';
        var isHe = slug.slice(-3) === '-he';
        var base = (isEn || isHe) ? slug.slice(0, -3) : slug;
        if (!groups[base]) { groups[base] = { base: base, en: null, he: null, neutral: null, type: e.contentType, lastTouched: '' }; order.push(base); }
        var g = groups[base];
        if (isEn) g.en = e;
        else if (isHe) g.he = e;
        else g.neutral = e;
        // Track latest lastTouched across the group
        if (e.lastTouched && e.lastTouched > g.lastTouched) { g.lastTouched = e.lastTouched; g.type = e.contentType; }
      });

      order.sort(function(a, b) {
        var ga = groups[a], gb = groups[b];
        var repA = ga.en || ga.neutral || ga.he;
        var repB = gb.en || gb.neutral || gb.he;
        if (sortBy === 'created') return ((repB && repB.createdDate) || '').localeCompare((repA && repA.createdDate) || '');
        if (sortBy === 'title') return ((repA && repA.title) || a).localeCompare((repB && repB.title) || b);
        return (gb.lastTouched || '').localeCompare(ga.lastTouched || '');
      });

      var container = document.getElementById('pv-library-table-wrap');
      if (order.length === 0) {
        container.innerHTML = '<div class="pv-empty">No entities match the current preset / search.</div>';
        return;
      }

      var html = '<table class="pv-library-table responsive-stack"><thead><tr>';
      html += '<th>Title</th><th>Type</th><th>Slug</th><th>EN</th><th>HE</th><th>Last touched</th>';
      html += '</tr></thead><tbody>';

      order.forEach(function(base) {
        var g = groups[base];
        var rep = g.en || g.neutral || g.he;
        if (!rep) return;

        // Title cell: click opens EN (or neutral) drawer; slug shown below
        var titleLink = '<a class="pv-entity-title-link" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(rep.slug) + '\')">' +
          '<strong>' + TaskWidgets.escape(rep.title || base) + '</strong></a>';

        function _docLink(url) {
          return url ? ' <a class="tw-file-link" href="' + TaskWidgets.escape(url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="margin-left:4px">&#8599;</a>' : '';
        }

        var enCell, heCell;
        if (g.neutral) {
          // Language-neutral entity: span both EN+HE columns
          var neutralStatus = _entityStatus(g.neutral);
          enCell = '<span class="tw-status-pill ' + TaskWidgets.statusClass(neutralStatus) + '" style="cursor:pointer;" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(g.neutral.slug) + '\')">' + TaskWidgets.escape(neutralStatus) + '</span>' + _docLink(g.neutral.docUrl);
          heCell = '—';
        } else {
          enCell = g.en
            ? '<span class="tw-status-pill ' + TaskWidgets.statusClass(_entityStatus(g.en)) + '" style="cursor:pointer;" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(g.en.slug) + '\')">' + TaskWidgets.escape(_entityStatus(g.en)) + '</span>' + _docLink(g.en.docUrl)
            : '<span style="color:#adb5bd;">—</span>';
          heCell = g.he
            ? '<span class="tw-status-pill ' + TaskWidgets.statusClass(_entityStatus(g.he)) + '" style="cursor:pointer;" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(g.he.slug) + '\')">' + TaskWidgets.escape(_entityStatus(g.he)) + '</span>' + _docLink(g.he.docUrl)
            : '<span style="color:#adb5bd;">—</span>';
        }

        html += '<tr>';
        html += '<td data-label="Title">' + titleLink + '</td>';
        html += '<td data-label="Type">' + TaskWidgets.escape(g.type || '—') + '</td>';
        html += '<td data-label="Slug"><span style="font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;color:#6c757d;">' + TaskWidgets.escape(base) + '</span></td>';
        html += '<td data-label="EN">' + enCell + '</td>';
        html += '<td data-label="HE">' + heCell + '</td>';
        html += '<td data-label="Touched">' + (g.lastTouched ? TaskWidgets.formatDate(g.lastTouched) : '—') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function renderDeficiency(searchTerm) {
      var now = new Date();
      var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var windowDays = state.deficiencyWindowDays || 56;
      var horizon = new Date(startOfToday.getTime() + windowDays * 86400000);

      var rows = state.library.filter(function(e) {
        if (!e.targetDate) return false;
        var td = new Date(e.targetDate);
        if (isNaN(td.getTime())) return false;
        var overdue = td < startOfToday && _entityStatus(e) !== 'done';
        var inWindow = td >= startOfToday && td <= horizon;
        if (!(overdue || inWindow)) return false;
        if (searchTerm) {
          var hay = (String(e.title || '') + ' ' + String(e.slug || '')).toLowerCase();
          if (hay.indexOf(searchTerm) === -1) return false;
        }
        return true;
      });

      rows.sort(function(a, b) { return (a.targetDate || '').localeCompare(b.targetDate || ''); });

      var container = document.getElementById('pv-library-table-wrap');
      if (rows.length === 0) {
        container.innerHTML = '<div class="pv-empty">No pieces due within ' + windowDays + ' days. Pipeline is clear.</div>';
        return;
      }

      var html = '<table class="pv-library-table responsive-stack"><thead><tr>';
      html += '<th>Target</th><th>Title</th><th>Type</th><th>Lang</th><th>Status</th><th>Tasks</th><th></th>';
      html += '</tr></thead><tbody>';
      rows.forEach(function(e) {
        var td = new Date(e.targetDate);
        var status = _entityStatus(e);
        var overdue = td < startOfToday && status !== 'done';
        var openCount = (state.tasks || []).filter(function(t) {
          return t.entityId === e.slug && t.status !== 'Done' && t.status !== 'Cancelled';
        }).length;
        var taskCell = openCount > 0 ? (openCount + ' open') : '0 open';
        html += '<tr' + (overdue ? ' style="background:#fff3cd;"' : '') + '>';
        html += '<td data-label="Target">' + TaskWidgets.formatDate(e.targetDate) + (overdue ? ' <strong>(overdue)</strong>' : '') + '</td>';
        html += '<td data-label="Title"><a class="pv-entity-title-link" onclick="PublishingView.openEntityDrawer(\'' + TaskWidgets.escape(e.slug) + '\')"><strong>' + TaskWidgets.escape(e.title || e.slug) + '</strong></a>' +
                (e.docUrl ? ' <a class="tw-file-link" href="' + TaskWidgets.escape(e.docUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open Doc" style="margin-left:6px">&#8599; Doc</a>' : '') +
                '<div class="detail-meta">' + TaskWidgets.escape(e.slug) + '</div></td>';
        html += '<td data-label="Type">' + TaskWidgets.escape(e.contentType || '—') + '</td>';
        html += '<td data-label="Lang">' + TaskWidgets.escape(e.language || '—') + '</td>';
        html += '<td data-label="Status"><span class="tw-status-pill ' + TaskWidgets.statusClass(status) + '">' + TaskWidgets.escape(status) + '</span></td>';
        html += '<td data-label="Tasks">' + taskCell + '</td>';
        html += '<td data-label=""><button class="btn btn-sm btn-light" data-roles="admin" onclick="PublishingView.spawnForEntity(\'' + TaskWidgets.escape(e.slug) + '\')" title="Create content tasks for this piece">Spawn</button></td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function spawnForEntity(slug) {
      var e = (state.library || []).find(function(x) { return x.slug === slug; });
      var base = slug.replace(/-(en|he)$/i, '');
      ContentStreamModal.open({ baseSlug: base, entityType: e ? e.contentType : 'blog' });
    }

    // ===== ENTITY DRAWER =====

    function openEntityDrawer(slug) {
      if (!slug) return;
      state.entityStack = [];
      _loadEntityDrawer(slug);
    }

    function backEntityDrawer() {
      if (!state.entityStack.length) return;
      _loadEntityDrawer(state.entityStack.pop());
    }

    function _loadEntityDrawer(slug) {
      state.currentEntitySlug = slug;
      _setDrawerLoading(slug);
      _updateDrawerBackButton();
      ModalOverlay.open('pvEntityDrawer');
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) { TaskWidgets.toast((res && res.error) || 'Drawer load failed', true); return; }
          _renderEntityDrawer(res.data);
        })
        .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Network error', true); })
        .WebAppLibrary_getEntityDetail({ entityId: slug });
    }

    function _updateDrawerBackButton() {
      var btn = document.getElementById('pv-drawer-back');
      if (btn) btn.style.display = state.entityStack.length ? '' : 'none';
    }

    function _setDrawerLoading(slug) {
      document.getElementById('pv-drawer-title').textContent = 'Loading…';
      document.getElementById('pv-drawer-slug').textContent = slug || '—';
      ['pv-drawer-type', 'pv-drawer-language', 'pv-drawer-state', 'pv-drawer-lasttouched', 'pv-drawer-targetdate', 'pv-drawer-campaign'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = '…';
      });
      var ph = '<span class="placeholder">Loading…</span>';
      var attachedEl = document.getElementById('pv-drawer-attached-tasks');
      if (attachedEl) attachedEl.innerHTML = ph;
      var actEl = document.getElementById('pv-drawer-actions');
      if (actEl) actEl.innerHTML = '';
      var distWrap = document.getElementById('pv-drawer-distribute-wrap');
      if (distWrap) distWrap.style.display = 'none';
    }

    function _renderEntityDrawer(data) {
      var entity = (data && data.entity) || {};
      state.currentEntity = entity;
      document.getElementById('pv-drawer-title').textContent = entity.title || entity.slug || 'Entity';
      document.getElementById('pv-drawer-slug').textContent = entity.slug || '—';
      document.getElementById('pv-drawer-type').textContent = entity.contentType || '—';
      document.getElementById('pv-drawer-language').textContent = entity.language || '(none)';
      var derivedStatus = TaskWidgets.deriveStatus((data && data.attached_tasks) || []);
      document.getElementById('pv-drawer-state').innerHTML = entity.state === 'abandoned'
        ? '<span class="tw-status-pill">abandoned</span>'
        : '<span class="tw-status-pill ' + TaskWidgets.statusClass(derivedStatus) + '">' + TaskWidgets.escape(derivedStatus) + '</span>';
      document.getElementById('pv-drawer-targetdate').textContent = entity.targetDate ? TaskWidgets.formatDate(entity.targetDate) : '—';
      document.getElementById('pv-drawer-campaign').textContent = CAMPAIGN_LABELS[entity.campaignId] || entity.campaignId || '—';
      document.getElementById('pv-drawer-lasttouched').textContent = entity.lastTouched ? TaskWidgets.formatDate(entity.lastTouched) : '—';
      var campSel = document.getElementById('pv-drawer-campaign-select');
      if (campSel) {
        campSel.innerHTML = '<option value="">— none —</option>';
        (state.campaigns || []).forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c.campaignId;
          opt.textContent = c.name || c.campaignId;
          if (c.campaignId === entity.campaignId) opt.selected = true;
          campSel.appendChild(opt);
        });
      }

      _renderDrawerActions(entity);
      _renderDistributePanel(entity);
      _renderDrawerAttachedTasks((data && data.attached_tasks) || []);
    }

    function openAttachedTask(id) {
      if (!id) return;
      document.body.style.overflow = '';
      if (document.body.classList.contains('role-manager')) {
        sessionStorage.setItem('selectDashboardTaskId', id);
        if (typeof loadView === 'function') loadView('ManagerDashboard');
      } else {
        sessionStorage.setItem('selectTaskId', id);
        if (typeof loadView === 'function') loadView('AdminTasks');
      }
    }

    function _renderDrawerAttachedTasks(tasks) {
      var el = document.getElementById('pv-drawer-attached-tasks');
      if (!el) return;
      if (!tasks.length) { el.innerHTML = '<span class="placeholder">No tasks attached.</span>'; return; }
      var sorted = tasks.slice().sort(function(a, b) {
        var aDone = (a.status === 'Done' || a.status === 'Cancelled') ? 1 : 0;
        var bDone = (b.status === 'Done' || b.status === 'Cancelled') ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1; if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
      el.innerHTML = sorted.map(function(t) {
        var dueChip = t.dueDate ? '<span class="tw-due-chip ' + TaskWidgets.dueClass(t.dueDate, t.status) + '">' + TaskWidgets.formatDate(t.dueDate) + '</span>' : '';
        return '<div class="pv-drawer-task-row" style="cursor:pointer;" onclick="TaskDetail.open(\'' + TaskWidgets.escape(t.id) + '\')">' +
          '<span class="tw-status-pill ' + TaskWidgets.statusClass(t.status) + '">' + TaskWidgets.escape(t.status || '—') + '</span>' +
          '<span class="pv-drawer-task-title">' + TaskWidgets.escape(t.name || t.typeId) + '</span>' +
          (t.assignedTo ? '<span class="detail-meta">' + TaskWidgets.escape(t.assignedTo) + '</span>' : '') +
          dueChip + '</div>';
      }).join('');
    }

    function closeEntityDrawer() {
      ModalOverlay.close('pvEntityDrawer');
      state.entityStack = [];
      state.currentEntitySlug = null;
      state.currentEntity = null;
    }

    function _renderDrawerActions(entity) {
      var el = document.getElementById('pv-drawer-actions');
      if (!el) return;
      var buttons = [];
      if (entity && entity.docUrl) {
        buttons.push('<button class="btn btn-sm btn-light" onclick="PublishingView.drawerOpenInDrive()">&#8599; Open Doc</button>');
        buttons.push('<button class="btn btn-sm btn-light" onclick="PublishingView.drawerAttachNewVersion()">Attach new version</button>');
      }
      buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="PublishingView.drawerCreateContentTasks()">Create Content Tasks</button>');
      if (entity && entity.slug && entity.slug.length > 3 && entity.slug.slice(-3) === '-en') {
        var heSlug = entity.slug.slice(0, -3) + '-he';
        if (!(state.library || []).some(function(e) { return e.slug === heSlug; })) {
          buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="PublishingView.drawerCreateHeSibling()">Create HE sibling stub</button>');
        }
      }
      var st = entity ? String(entity.state).toLowerCase() : '';
      if (st === 'published') buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="PublishingView.drawerRequestCorrection()">Request Correction</button>');
      if (entity && entity.slug && st !== 'published' && st !== 'abandoned') buttons.push('<button class="btn btn-sm btn-light" data-roles="admin" onclick="PublishingView.drawerAbandon()">Abandon</button>');
      el.innerHTML = buttons.join('');
    }

    function drawerOpenInDrive() {
      if (state.currentEntity && state.currentEntity.docUrl) window.open(state.currentEntity.docUrl, '_blank', 'noopener');
    }

    // Replace the entity's current Doc from the drawer directly — same
    // WebAppLibrary_attachExistingDoc endpoint TaskPacks uses per-task, called
    // here with the entity slug so it reaches the current version with one click
    // regardless of which (or whether any) task produced it.
    function drawerAttachNewVersion() {
      if (!state.currentEntity) return;
      document.getElementById('pv-drawer-attach-slug').textContent = state.currentEntity.slug;
      document.getElementById('pv-drawer-attach-url').value = '';
      ModalOverlay.open('pvDrawerAttachModal');
    }

    function submitDrawerAttachDoc() {
      if (!state.currentEntity) return;
      var entityId = state.currentEntity.slug;
      var url = document.getElementById('pv-drawer-attach-url').value.trim();
      if (!url) { TaskWidgets.toast('Drive URL required', true); return; }
      var btn = document.getElementById('pv-btn-drawer-attach-submit');
      btn.disabled = true; btn.textContent = 'Attaching...';
      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false; btn.textContent = 'Attach';
          if (!result || !result.ok) {
            TaskWidgets.toast((result && result.error) || 'Failed', true);
            return;
          }
          ModalOverlay.close('pvDrawerAttachModal');
          TaskWidgets.toast(result.superseded ? 'New version attached, previous archived' : 'Doc attached');
          _loadData();
          _loadEntityDrawer(entityId);
        })
        .withFailureHandler(function(err) {
          btn.disabled = false; btn.textContent = 'Attach';
          TaskWidgets.toast(err && err.message ? err.message : 'Failed', true);
        })
        .WebAppLibrary_attachExistingDoc({ entityId: entityId, driveUrl: url });
    }

    function drawerCreateContentTasks() {
      if (!state.currentEntity) return;
      var base = String(state.currentEntity.slug || '').replace(/-(en|he)$/i, '');
      ContentStreamModal.open({ baseSlug: base, entityType: state.currentEntity.contentType });
    }

    function drawerRequestCorrection() {
      if (!state.currentEntity) return;
      var slug = state.currentEntity.slug;
      TaskWidgets.confirm('Spawn a correction edit task for "' + slug + '"?', function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { TaskWidgets.toast((res && res.error) || 'Failed', true); return; }
            TaskWidgets.toast('Correction task created', 'success');
            _loadEntityDrawer(slug);
            _loadData();
          })
          .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Failed', true); })
          .WebAppLibrary_requestCorrection({ entityId: slug });
      });
    }

    function drawerAbandon() {
      if (!state.currentEntity) return;
      var slug = state.currentEntity.slug;
      TaskWidgets.confirm('Mark "' + slug + '" abandoned?', function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { TaskWidgets.toast((res && res.error) || 'Failed', true); return; }
            TaskWidgets.toast('Marked abandoned', 'success');
            _loadEntityDrawer(slug);
            _loadData();
          })
          .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Failed', true); })
          .WebAppLibrary_abandonEntity({ entityId: slug });
      }, { danger: true });
    }

    function drawerCreateHeSibling() {
      if (!state.currentEntity) return;
      var enSlug = state.currentEntity.slug;
      if (!enSlug || enSlug.slice(-3) !== '-en') { TaskWidgets.toast('Not an EN-side entity', true); return; }
      var heSlug = enSlug.slice(0, -3) + '-he';
      TaskWidgets.confirm('Create HE sibling "' + heSlug + '"?', function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { TaskWidgets.toast((res && res.error) || 'Create failed', true); return; }
            TaskWidgets.toast(res.deduplicated ? 'HE peer already exists' : 'HE sibling created', 'success');
            _loadData();
            _loadEntityDrawer(state.currentEntitySlug);
          })
          .withFailureHandler(function(err) { TaskWidgets.toast(err && err.message ? err.message : 'Failed', true); })
          .WebAppLibrary_addEntity({ slug: heSlug, type: state.currentEntity.contentType, language: 'he', title: state.currentEntity.title, references: [enSlug] });
      });
    }

    return {
      init: init,
      renderTasks: renderTasks,
      switchTab: switchTab,
      switchPreset: switchPreset,
      spawnForEntity: spawnForEntity,
      openAttachedTask: openAttachedTask,
      openEntityDrawer: openEntityDrawer,
      backEntityDrawer: backEntityDrawer,
      closeEntityDrawer: closeEntityDrawer,
      drawerOpenInDrive: drawerOpenInDrive,
      drawerAttachNewVersion: drawerAttachNewVersion,
      drawerCreateContentTasks: drawerCreateContentTasks,
      drawerCreateHeSibling: drawerCreateHeSibling,
      drawerRequestCorrection: drawerRequestCorrection,
