<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <h3>Development Tools</h3>
      </div>
      <div class="card-body">
        <div class="d-flex flex-wrap">
          <button class="btn mr-2 mb-2" onclick="runRebuildSysConfig()">Rebuild SysConfig</button>
          <button class="btn mr-2 mb-2" onclick="runProtectHeaders()">Protect Headers</button>
          <button class="btn mr-2 mb-2" onclick="runValidateSchema()">Validate Schema</button>
          <button class="btn mr-2 mb-2" onclick="runDailyHousekeeping()">Daily Housekeeping</button>
          <button class="btn mr-2 mb-2" onclick="runUnitTests()">Run Unit Tests</button>
          <button class="btn mr-2 mb-2" onclick="runRefreshStatusExport()">Push Status Export</button>
          <button class="btn mr-2 mb-2" onclick="runBackfillCampaignActivity()">Backfill Campaign Activity</button>
        </div>
        <div id="dev-tools-results" class="mt-3"></div>
      </div>
    </div>
  </div>
</div>

<!-- Destructive-action confirm: centered overlay (deliberately away from the top
     trigger-button row), Cancel is the default-focused/left button and the
     destructive Confirm is offset to the far right, so a stray second tap/click
     can't blow straight through the way a native or co-located confirm would. -->
<div id="dev-confirm-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1100; justify-content:center; align-items:center; padding:20px;">
  <div style="background:#fff; border-radius:8px; max-width:440px; width:100%; box-shadow:0 6px 24px rgba(0,0,0,0.35); overflow:hidden;">
    <div style="padding:14px 20px; border-bottom:1px solid #eee; font-weight:600;">Please confirm</div>
    <div id="dev-confirm-message" style="padding:20px; font-size:14px; line-height:1.5;"></div>
    <div style="display:flex; justify-content:space-between; padding:14px 20px; border-top:1px solid #eee;">
      <button type="button" id="dev-confirm-cancel" class="btn">Cancel</button>
      <button type="button" id="dev-confirm-ok" class="btn">Confirm</button>
    </div>
  </div>
</div>

<script>
  // Reusable confirm for destructive dev actions. Centered overlay, Cancel
  // default-focused, Confirm offset — see #dev-confirm-overlay markup above.
  function devConfirm(message, onConfirm) {
    const overlay = document.getElementById('dev-confirm-overlay');
    const ok = document.getElementById('dev-confirm-ok');
    const cancel = document.getElementById('dev-confirm-cancel');
    document.getElementById('dev-confirm-message').textContent = message;
    function close() {
      overlay.style.display = 'none';
      ok.onclick = null; cancel.onclick = null; overlay.onclick = null;
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    ok.onclick = function() { close(); onConfirm(); };
    cancel.onclick = close;
    overlay.onclick = function(e) { if (e.target === overlay) close(); }; // backdrop = cancel
    document.addEventListener('keydown', onKey);
    overlay.style.display = 'flex';
    cancel.focus(); // safe default: a reflex Enter/press lands on Cancel, not Confirm
  }

  function runRebuildSysConfig() {
    devConfirm('Rebuild SysConfig from source? Runtime values are preserved.', function() {
      const resultDiv = document.getElementById('dev-tools-results');
      resultDiv.innerHTML = '<p class="text-info">Rebuilding SysConfig...</p>';
      google.script.run
        .withSuccessHandler(message => {
          resultDiv.innerHTML = `<p class="alert alert-success">${message}</p>`;
        })
        .withFailureHandler(err => {
          resultDiv.innerHTML = `<p class="alert alert-danger">${err.message}</p>`;
        })
        .runRebuildSysConfigFromSource();
    });
  }

  function runProtectHeaders() {
    const resultDiv = document.getElementById('dev-tools-results');
    resultDiv.innerHTML = '<p class="text-info">Protecting headers...</p>';
    google.script.run
      .withSuccessHandler(message => {
        resultDiv.innerHTML = `<p class="alert alert-success">${message}</p>`;
      })
      .withFailureHandler(err => {
        resultDiv.innerHTML = `<p class="alert alert-danger">${err.message}</p>`;
      })
      .protectAllSheetHeadersFromUI(); // Backend function name
  }

  function runValidateSchema() {
    const resultDiv = document.getElementById('dev-tools-results');
    resultDiv.innerHTML = '<p class="text-info">Validating schema...</p>';
    google.script.run
      .withSuccessHandler(response => {
        let html = '';
        if (response.status === 'PASSED') {
            html += `<p class="alert alert-success">${response.message}</p>`;
        } else {
            html += `<p class="alert alert-danger">${response.message}</p>`;
            if (response.discrepancies && response.discrepancies.length > 0) {
                html += '<h5>Discrepancies:</h5><ul>';
                response.discrepancies.forEach(disc => {
                    html += `<li><strong>Sheet:</strong> ${disc.sheet}, <strong>Issue:</strong> ${disc.issue}, <strong>Severity:</strong> ${disc.severity}`;
                    if (disc.details) html += `, <strong>Details:</strong> ${disc.details}`;
                    html += `</li>`;
                });
                html += '</ul>';
            }
        }
        resultDiv.innerHTML = html;
      })
      .withFailureHandler(err => {
        resultDiv.innerHTML = `<p class="alert alert-danger">Failed to validate schema: ${err.message}</p>`;
      })
      .validateDatabaseSchemaFromUI(); // Backend function name
  }

  function runDailyHousekeeping() {
    devConfirm('Run full Daily Housekeeping now? (Also runs on schedule.)', function() {
      const resultDiv = document.getElementById('dev-tools-results');
      resultDiv.innerHTML = '<p class="text-info">Running daily housekeeping...</p>';
      google.script.run
        .withSuccessHandler(message => {
          resultDiv.innerHTML = `<p class="alert alert-success">${message || 'Daily housekeeping completed successfully.'}</p>`;
        })
        .withFailureHandler(err => {
          resultDiv.innerHTML = `<p class="alert alert-danger">Error during daily housekeeping: ${err.message}</p>`;
        })
        .runDailyMaintenance();
    });
  }

  function runUnitTests() {
    const resultDiv = document.getElementById('dev-tools-results');
    resultDiv.innerHTML = '<p class="text-info">Running unit tests...</p>';
    google.script.run
      .withSuccessHandler(response => {
        let html = '';
        if (response.success) {
          const results = response.results;
          const statusClass = results.failed > 0 ? 'alert-danger' : 'alert-success';
          html += `<div class="alert ${statusClass}">
                     <strong>Tests Completed:</strong> Total: ${results.total}, Passed: ${results.passed}, Failed: ${results.failed}
                   </div>`;
          
          if (results.details && results.details.length > 0) {
            html += '<ul class="list-group">';
            results.details.forEach(test => {
              const itemClass = test.status === 'PASSED' ? 'list-group-item-success' : 'list-group-item-danger';
              html += `<li class="list-group-item ${itemClass}">
                         <strong>${test.suite}</strong> - ${test.test}: ${test.status}
                         ${test.error ? `<br><small>${test.error}</small>` : ''}
                       </li>`;
            });
            html += '</ul>';
          }
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = `<p class="alert alert-danger">Unit tests failed to run: ${response.error}</p>`;
        }
      })
      .withFailureHandler(err => {
        resultDiv.innerHTML = `<p class="alert alert-danger">Error calling backend: ${err.message}</p>`;
      })
      .WebAppSystem_runUnitTests();
  }

  function runRefreshStatusExport() {
    const resultDiv = document.getElementById('dev-tools-results');
    resultDiv.innerHTML = '<p class="text-info">Pushing status export (health + KPI)...</p>';
    google.script.run
      .withSuccessHandler(response => {
        if (response && response.success) {
          resultDiv.innerHTML = `<p class="alert alert-success">Status export pushed (health + KPI). jlmops-status.md refreshed.</p>`;
        } else {
          resultDiv.innerHTML = `<p class="alert alert-danger">Status export failed: ${response ? response.error : 'no response'}</p>`;
        }
      })
      .withFailureHandler(err => {
        resultDiv.innerHTML = `<p class="alert alert-danger">Error calling backend: ${err.message}</p>`;
      })
      .WebAppSystem_refreshStatusExport();
  }

  function runBackfillCampaignActivity() {
    const resultDiv = document.getElementById('dev-tools-results');
    resultDiv.innerHTML = '<p class="text-info">Pulling campaigns + backfilling activity...</p>';
    google.script.run
      .withSuccessHandler(response => {
        if (response && response.success) {
          resultDiv.innerHTML = `<p class="alert alert-success">Campaign activity backfilled — ${response.created} new rows (${response.skipped} existing skipped, ${response.pulled} campaigns pulled${response.errors ? ', ' + response.errors + ' errors' : ''}).</p>`;
        } else {
          resultDiv.innerHTML = `<p class="alert alert-danger">Backfill failed: ${response ? response.error : 'no response'}</p>`;
        }
      })
      .withFailureHandler(err => {
        resultDiv.innerHTML = `<p class="alert alert-danger">Error calling backend: ${err.message}</p>`;
      })
      .WebAppSystem_backfillCampaignActivity();
  }

</script>
